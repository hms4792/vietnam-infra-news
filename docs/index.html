 its global strategy - deploying the first 10 GW international renewable energy portfolio in Ca", "vi": "Ngày 28/3, Ủy ban Nhân dân tỉnh Gia Lai và Công ty Cổ phần Năng lượng VinEnergo đã ký kết biên bản ghi nhớ hợp tác về việc nghiên cứu và tìm kiếm cơ hội đầu tư dự án Cụm Nhà máy điện gió Gia Lai. VinEnergo công bố chiến lược toàn cầu – triển khai danh mục 10 GW năng lượng tái tạo quốc tế đầu tiên Cà"}, "sector": "Power", "area": "Energy Develop.", "province": "Gia Lai", "source": "VietnamPlus - Kinh te", "date": "2026-03-29", "url": "https://www.vietnamplus.vn/vinenergo-hop-tac-phat-trien-cum-nha-may-dien-gio-gan-8-ty-usd-tai-gia-lai-post1101673.vnp", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-RENEWABLE", "grade": "", "matched": ""}, {"id": 245, "title": {"ko": "다낭: 435헥타르가 넘는 면적의 Tam Anh-An An Hoa 산업단지 착공", "en": "", "vi": "Đà Nẵng: Khởi công khu công nghiệp Tam Anh-An An Hòa rộng hơn 435ha"}, "summary": {"ko": "Tam Anh-An An Hoa 산업단지는 생태산업단지 모델에 따라 총 자본금이 4조 1,520억 VND이며, 전기, 전자, 기계 등 산업이 투자를 유치하고 있습니다. 지원산업. 투자 정책을 승인한 지아라이(Gia Lai) 산업단지 프로젝트에 대한 보상 및 재정착 지원 진행을 가속화합니다.", "en": "Tam Anh-An An Hoa Industrial Park has a total capital of VND 4,152 billion, oriented according to the ecological industrial park model, with industries attracting investment such as electricity, electronics, and mechanics; supporting industry. Accelerate the progress of compensation and resettlement support for Gia Lai industrial park projects that have approved investment policies", "vi": "Khu công nghiệp Tam Anh-An An Hòa có tổng vốn 4.152 tỷ đồng, định hướng theo mô hình khu công nghiệp sinh thái, với các ngành thu hút đầu tư như điện, điện tử, cơ khí; công nghiệp phụ trợ. Đẩy nhanh tiến độ bồi thường, hỗ trợ tái định cư các dự án khu công nghiệp Gia Lai chấp thuận chủ trương đầu tư"}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Da Nang", "source": "VietnamPlus - Kinh te", "date": "2026-03-29", "url": "https://www.vietnamplus.vn/da-nang-khoi-cong-khu-cong-nghiep-t ower", "area": "Energy Develop.", "province": "Vietnam", "source": "CafeBiz", "date": "2026-03-28", "url": "https://cafebiz.vn/fpt-petrovietnam-vingroup-viettel-xuat-ngoai-ruc-ro-ong-tao-duc-thang-kien-nghi-gi-voi-thu-tuong-176260328143222209.chn", "plan_id": "VN-OG-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 249, "title": {"ko": "베트남 원전 건설 계약으로 인한 긍정적 영향", "en": "", "vi": "Tác động tích cực từ thỏa thuận xây dựng dự án Nhà máy điện hạt nhân của Việt Nam"}, "summary": {"ko": "러시아는 전통적인 대용량 원전뿐 아니라 소형모듈형원자로(SMR), 부유식발전소(FPU) 등도 적극 추진하고 있다. 러시아는 문칸화(Moon Khanh Hoa)에 곧 원자력 발전소를 개발할 것으로 예상 유권자들은 원자력 발전소 프로젝트 5차 회의를 기대", "en": "Russia is actively promoting not only traditional large-capacity nuclear power plants, but also small modular reactors (SMRs) and floating power units (FPUs). Russia expects to soon develop a nuclear power plant on the Moon Khanh Hoa voters expect a nuclear power plant project 5th session", "vi": "Nga đang tích cực thúc đẩy không chỉ các nhà máy điện hạt nhân công suất lớn truyền thống, mà còn cả các lò phản ứng mô-đun nhỏ (SMR) và các tổ máy điện nổi (FPU). Nga kỳ vọng sớm phát triển nhà máy điện hạt nhân trên Mặt Trăng Cử tri Khánh Hòa kỳ vọng về dự án nhà máy điện hạt nhân Phiên họp thứ 5"}, "sector": "Power", "area": "Energy Develop.", "province": "Khanh Hoa", "source": "VietnamPlus - Kinh te", "date": "2026-03-28", "url": "https://www.vietnamplus.vn/tac-dong-tich-cuc-tu-thoa-thuan-xay-dung-du-an-nha-may-dien-hat-nhan-cua-viet-nam-post1101607.vnp", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-NUCLEAR", "grade": "", "matched": ""}, {"id": 250, "title": {"ko": "국가 사회 경제적 발전을 지원하기 위한 송전망 인프라 보장", "en": "Ensuring power transmission grid infrastructure to serve national socio-economic development", "vi": ""}, "summary": {"ko": "EVNNPT(National Power Transmission Corporation)는 2026년에 87개 프로젝트의 건설을 시작하고 86개의 송전 프로젝트를 완료 및 활성화한다는 목표를 세웠습니다. National Power Transmission Corporation, 최초의 디지털 변전소 출시 EVN, 주요 전력 프로젝트 출시 EVN kic", "en": "The National Power Transmission Corporation (EVNNPT) has set a target to commence construction on 87 projects and complete and energise 86 power transmission projects in 2026. National Power Transmission Corporation launches first digital transformer station EVN launches major power projects EVN kic", "vi": "Tổng công ty Truyền tải điện Quốc gia (EVNNPT) đặt mục tiêu khởi công 87 dự án và hoàn thành, đóng điện 86 dự án truyền tải điện trong năm 2026. Tổng công ty Truyền tải điện Quốc gia khánh thành trạm biến áp số đầu tiên"}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Nhan Dan English", "date": "2026-03-28", "url": "https://en.nhandan.vn/ensuring-power-transmission-grid-infrastructure-to-serve-national-socio-economic-development-post160486.html", "plan_id": "VN-PWR-PDP8", "grade": "LOW", "matched": "Y"}, {"id": 913, "title": {"ko": "VietnamPlus - Kinh te", "en": "Tác động tích cực từ thỏa thuận xây dựng dự án Nhà máy điện hạt nhân của Việt Nam", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Khanh Hoa", "date": "2026-03-28", "url": "https://www.vietnamplus.vn/tac-dong-tich-cuc-tu-thoa-th", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-NUCLEAR", "grade": "", "matched": "Y"}, {"id": 914, "title": {"ko": "Nhandan - Moi truong", "en": "Reduce emissions, lift the wings", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Environment", "area": "Environment", "province": "", "source": "Vietnam", "date": "2026-03-28", "url": "https://nhandan.vn/giam-phat-thai-nang-nhung-canh-bay-post951492.html", "plan_id": "VN-CARBON-2050", "grade": "", "matched": "Y"}, {"id": 251, "title": {"ko": "Can Tho의 어느 산업 단지 토지가 가장 가치가 있습니까?", "en": "", "vi": "Đất khu công nghiệp nào ở Cần Thơ đang có giá trị nhất?"}, "summary": {"ko": "합병 후 Can Tho시는 산업단지와 산업 클러스터를 포함한 다양한 유형의 토지에 대한 통합 가격표를 발행했습니다.", "en": "After the merger, Can Tho city issued a unified price list for many types of land, including industrial parks and industrial clusters.", "vi": "Sau sáp nhập, thành phố Cần Thơ đã ban hành bảng giá thống nhất cho nhiều loại đất, trong đó có các khu công nghiệp, cụm công nghiệp."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Can Tho", "source": "Thanh Nien - Kinh te", "date": "2026-03-26", "url": "https://thanhnien.vn/dat-khu-cong-nghiep-nao-o-can-tho-dang-co-gia-tri-nhat-18526032616110658.htm", "plan_id": "VN-IP-NORTH-2030", "grade": "", "matched": ""}, {"id": 252, "title": {"ko": "호치민시에서 18조 VND 이상의 LNG 발전소 착공", "en": "", "vi": "Khởi công nhà máy điện LNG hơn 18.000 tỷ đồng ở TP HCM"}, "summary": {"ko": "대규모 화력 발전소에 해당하는 1,200MW 용량을 갖춘 Hiep Phuoc LNG 프로젝트는 호치민시와 남부 지역의 안정적인 전력 공급을 보장하는 데 기여합니다.", "en": "With a capacity of 1,200 MW equivalent to a large thermal power plant, the Hiep Phuoc LNG project contributes to ensuring stable electricity supply for Ho Chi Minh City and the southern region.", "vi": "Công suất 1.200 MW tương đương nhà máy nhiệt điện lớn, dự án LNG Hiệp Phước góp phần đảm bảo cung cấp điện ổn định cho TP HCM và khu vực phía Nam."}, "sector": "Power", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "VnExpress - Thời sự", "date": "2026-03-26", "url": "https://vnexpress.net/khoi-cong-nha-may-dien-lng-hon-18-000-ty-dong-o-tp-hcm-5055277.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 915, "title": {"ko": "Thanh Nien - Kinh te", "en": "Đất khu công nghiệp nào ở Cần Thơ đang có giá trị nhất?", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "", "source": "Can Tho", "date": "2026-03-26", "url": "https://thanhnien.vn/dat-khu-cong-nghiep-nao-o-can-tho-", "plan_id": "VN-IP-NORTH-2030", "grade": "", "matched": "Y"}, {"id": 253, "title": {"ko": "베트남 최초의 양수 수력 발전 프로젝트로 2건의 국제 대출 계약 체결", "en": "Vietnam's first pumped-storage hydropower project secures two int’l loan deals", "vi": ""}, "summary": {"ko": "칸화(Khanh Hoa) 중남부의 박 255, "title": {"ko": "호아빈 수력발전 지역을 통과하는 구간인 다강 하류 수위가 낮다", "en": "", "vi": "Mực nước hạ du sông Đà, đoạn qua khu vực thủy điện Hòa Bình xuống thấp trơ đáy"}, "summary": {"ko": "최근 호아빈 수력발전소 지역을 통과하는 구간인 다강 하류 수위가 낮아지고 강바닥에 얕은 제방이 많이 노출되어 3번 다리 근처 어촌 주민들의 삶에 직접적인 영향을 미치고 있습니다. 후에(Hue) 강의 수위가 낮아져 전력과 물 공급이 시급히 복구되었습니다. Lo역 하우 강의 수위", "en": "In recent days, the water level downstream of the Da River, the section passing through the Hoa Binh Hydroelectric Power Plant area, has been dropping, the river bed has exposed many shallow banks, directly affecting the lives of people in the fishing village near bridge No. 3. Water levels of rivers in Hue have dropped, urgently restoring power and water supply. Water level on Hau River at Lo station", "vi": "Những ngày gần đây, mực nước hạ du sông Đà, đoạn qua khu vực Thủy điện Hòa Bình đang xuống thấp, lòng sông lộ nhiều bãi cạn, ảnh hưởng trực tiếp đến đời sống của người dân làng chài gần cầu số 3. Mực nước các sông tại Huế xuống, khẩn trương khôi phục cấp điện, nước Mực nước trên sông Hậu tại trạm Lo"}, "sector": "Power", "area": "Energy Develop.", "province": "Hoa Binh", "source": "VietnamPlus - Moi truong", "date": "2026-03-25", "url": "https://www.vietnamplus.vn/muc-nuoc-ha-du-song-da-doan-qua-khu-vuc-thuy-dien-hoa-binh-xuong-thap-tro-day-post1100850.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 916, "title": {"ko": "SGGP", "en": "Bảo đảm cung cấp điện tại các khu công nghiệp", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "", "source": "Ho Chi Minh City", "date": "2026-03-25", "url": "https://www.sggp.org.vn/bao-dam-cung-cap-dien-tai-cac-k", "plan_id": "VN-IP-NORTH-2030", "grade": "", "matched": "Y"}, {"id": 917, "title": {"ko": "Tuoi Tre - Kinh doanh", "en": "Khởi công dự án Nhà máy nước Dương Đông 2 ở Phú Quốc", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Water Supply/Drainage", "area": "Environment", "province": " m", "source": "vietnamplus", "date": "2026-03-24", "url": "https://en.vietnamplus.vn/prime-minister-visits-works-with-vietnams-leading-oil-and-gas-partner-in-russia-post339868.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 258, "title": {"ko": "총리는 러시아 대표 가스그룹을 방문해 베트남의 LNG 터미널과 가스발전소 건설을 환영했다.", "en": "", "vi": "Thăm Tập đoàn khí đốt hàng đầu Nga, Thủ tướng hoan nghênh xây kho cảng LNG, nhà máy điện khí ở Việt Nam"}, "summary": {"ko": "이는 천연가스 분야에서 러시아와 세계 최고의 가스 회사로 간주됩니다.", "en": "This is considered the leading gas corporation in Russia and the world in the field of natural gas.", "vi": "Đây được coi là tập đoàn khí đốt hàng đầu Nga và thế giới trong lĩnh vực khí đốt tự nhiên."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "CafeBiz", "date": "2026-03-24", "url": "https://cafebiz.vn/tham-tap-doan-khi-dot-hang-dau-nga-thu-tuong-hoan-nghenh-xay-kho-cang-lng-nha-may-dien-khi-o-viet-nam-176260324191342769.chn", "plan_id": "", "grade": "", "matched": ""}, {"id": 259, "title": {"ko": "동탑성 해안 섬 코뮌은 가뭄과 염분에 적극적으로 대응합니다.", "en": "The coastal island commune of Dong Thap province actively responds to drought and salinity", "vi": ""}, "summary": {"ko": "탄푸동 (Tan Phu Dong) 은 동탑 (Dong Thap) 주의 해안 섬 코뮌입니다. 매년 지역은 기후 변화, 특히 가뭄과 건기 바닷물 침입의 직접적인 영향을 받습니다. 위의 상황에 직면하여 당국과 지역 주민들은 예방과 통제를 위해 많은 해결책을 적극적으로 시행해 왔습니다.", "en": "Tan Phu Dong is a coastal islet commune of Dong Thap province. Every year, localities are directly affected by climate change, especially drought and saltwater intrusion in the dry season. Faced with the above situation, the authorities and local people have actively implemented many solutions to prevent and control.", "vi": "Tân Phú Đông là xã cù lao ven biển của tỉnh Đồng Tháp . Hằng năm, địa phương chịu tác động trực tiếp của biến đổi khí hậu, đặc biệt là tình trạng hạn hán và xâm nhập mặn trong mùa khô. Trước thực trạng trên, chính quyền và người dân địa phương đã chủ động triển khai nhiều giải pháp để phòng, chống. evelop.", "province": "Vietnam", "source": "CafeBiz", "date": "2026-03-18", "url": "https://cafebiz.vn/rui-ro-phap-ly-va-tai-chinh-voi-evn-truoc-nguy-co-bi-nha-dau-tu-nang-luong-tai-tao-khoi-kien-quoc-te-176260318175751002.chn", "plan_id": "", "grade": "", "matched": "Y"}, {"id": 261, "title": {"ko": "베트남, Assystem Group과 원자력 분야 협력 논의", "en": "", "vi": "Việt Nam trao đổi với tập đoàn Assystem về hợp tác trong lĩnh vực điện hạt nhân"}, "summary": {"ko": "Trinh Duc Hai 대사는 공급원 다변화 및 베트남의 장기 에너지 전략 수립 방향에 따라 원자력 협력 가능성에 관해 Assystem 그룹의 리더들과 협력했습니다. 베트남, 원자력 발전에 관한 국제 협력 촉진 슬로베니아는 베트남의 전력 개발을 지원할 준비가 되어 있음", "en": "Ambassador Trinh Duc Hai worked with leaders of Assystem Group on the possibility of nuclear power cooperation, in accordance with the direction of diversifying supply sources and building Vietnam's long-term energy strategy. Vietnam promotes international cooperation on nuclear power Slovenia is ready to support Vietnam in developing electricity", "vi": "Đại sứ Trịnh Đức Hải làm việc với lãnh đạo Tập đoàn Assystem về khả năng hợp tác điện hạt nhân, phù hợp với định hướng đa dạng hóa nguồn cung và xây dựng chiến lược năng lượng dài hạn của Việt Nam. Việt Nam thúc đẩy hợp tác quốc tế về điện hạt nhân Slovenia sẵn sàng hỗ trợ Việt Nam phát triển điện h"}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamPlus - Kinh te", "date": "2026-03-17", "url": "https://www.vietnamplus.vn/viet-nam-trao-doi-voi-tap-doan-assystem-ve-hop-tac-trong-linh-vuc-dien-hat-nhan-post1099362.vnp", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-NUCLEAR", "grade": "", "matched": ""}, {"id": 262, "title": {"ko": "EVNGENCO3, 2026년 건기를 맞이하기 위해 발전소 유지 관리 강화", "en": "", "vi": "EVNGENCO3 tăng cường bảo dưỡng các nhà máy điện đón mùa khô 2026"}, "summary": {"ko": "2026년 건기에는 EVNGENCO3 발전소 수리 서비스 회사(EPS)가 발전 장치의 안전한 작동을 보장하기 위해 동기식 기술 솔루션과 리소스를 조기에 적극적으로 배포했습니다.", "en": "In the 2026 dry season, EVNGENCO3 Power Plant Repair Service Company (EPS) proactively deployed synchronous technical solutions and resources early, to ensure safe operation of the generating units.", "vi": "Vào mùa khô 2026, Công ty Dịch vụ Sửa chữa các nhà máy điện EVNGENCO3 (EPS) đã chủ động triển khai đồng bộ các giải pháp kỹ thuật và nguồn lực từ sớm, nhằm đảm bảo các tổ máy vận hành an toàn."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamNet - Kinh doanh", "date": "2026-03-17", "url": "https://vietnamnet.vn/evngenco3-tang-cuong-bao-duong-cac-nha-may-dien-don-mua-kho-2026-2498025.html", "plan_id": "VN-PWR-PDP8", "grade": "LOW", "matched": "Y"}, {"id": 263, "title": {"ko": "호치민시, Quang Trung Software Park에 대한 전략적 과제 설정", "en": "Ho Chi Minh City sets strategic tasks for Quang Trung Software Park", "vi": ""}, "summary": {"ko": "창립 25주년을 맞아 Quang Trung Software Park는 호치민 인민위원회 Nguyen Van Duoc 위원장으로부터 도시의 디지털 인프라 및 혁신 의제를 추진하기 위한 세 가지 핵심 임무를 부여받았습니다. 정부, 원자력 프로젝트에 대한 투자 정책 평가 명령 Quang Trung Software P", "en": "At its 25th anniversary, Quang Trung Software Park was assigned three key missions to drive the city’s digital infrastructure and innovation agenda by Chairman of the HCMC People's Committee Nguyen Van Duoc. Gov't orders appraisal of investment policy for nuclear power project Quang Trung Software P", "vi": "Nhân kỷ niệm 25 năm thành lập, Chủ tịch UBND TP.HCM Nguyễn Văn Được giao ba nhiệm vụ trọng tâm nhằm thúc đẩy chương trình đổi mới và cơ sở hạ tầng kỹ thuật số của thành phố. Chính phủ chỉ đạo thẩm định chủ trương đầu tư dự án điện hạt nhân Quang Trung Software P"}, "sector": "Power", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "SGGP News English", "date": "2026-03-17", "url": "https://en.sggp.org.vn/ho-chi-minh-city-sets-strategic-tasks-for-quang-trung-software-park-post124638.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 264, "title": {"ko": "베트남, 프랑스 Assystem과 원자력 협력 모색", "en": "Viet Nam explores nuclear power cooperation with France's Assystem", "vi": ""}, "summary": {"ko": "3월 16일 프랑스 주재 베트남 대사 Trinh Duc Hai는 Assystem의 국제 사업 개발 담당 부사장인 Frédéric Cheneau와 원자력 협력에 대해 논의했습니다. 슬로베니아, 베트남의 원자력 발전소 건설 및 운영 지원 의지 베트남이 추진", "en": "Vietnamese Ambassador to France Trinh Duc Hai on March 16 held talks with Frédéric Cheneau, Vice President for International Business Development at Assystem, to discuss cooperation in nuclear power. Slovenia willing to support Viet Nam in building and operating nuclear power plants Vietnam promotes", "vi": "Ngày 16/3, Đại sứ Việt Nam tại Pháp Trịnh Đức Hải đã có cuộc hội đàm với Frédéric Cheneau, Phó Chủ tịch Phát triển Kinh doanh Quốc tế tại Assystem, để thảo luận về hợp tác trong lĩnh vực điện hạt nhân. Slovenia sẵn sàng hỗ trợ Việt Nam xây dựng và vận hành nhà máy điện hạt nhân"}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Nhan Dan English", "date": "2026-03-17", "url": "https://en.nhandan.vn/viet-nam-explores-nuclear-power-cooperation-with-frances-assystem-post160103.html", "plan_id": "VN-PWR-PDP8", "grade": "LOW", "matched": "Y"}, {"id": 265, "title": {"ko": "푸토성은 10억 달러 이상의 FDI 자본을 유치하기 위해 노력하고 있습니다.", "en": "", "vi": "Tỉnh Phú Thọ phấn đấu thu hút trên hơn 1 tỷ USD vốn FDI"}, "summary": {"ko": "푸토는 투자 유치에 있어서 가장 매력적인 지역 중 하나가 되는 것을 목표로 11억 달러 이상의 FDI 자본과 약 70조 VND의 국내 투자 자본을 유치하기 위해 노력하고 있습니다. 2026년 첫 2개월 동안 베트남의 실현 FDI 자본은 8.8% 증가했습니다. 올해 첫 2개월 동안 공공 투자 및 실현 FDI 자본은 증가했습니다.", "en": "Phu Tho strives to attract over 1.1 billion USD of FDI capital and about 70,000 billion VND of domestic investment capital, aiming to become one of the most attractive localities in attracting investment. In the first 2 months of 2026, realized FDI capital in Vietnam increased by 8.8% Public investment and realized FDI capital in the first two months of the year increased", "vi": "Phú Thọ phấn đấu thu hút trên 1,1 tỷ USD vốn FDI và khoảng 70.000 tỷ đồng vốn đầu tư trong nước, hướng tới trở thành một trong những địa phương hấp dẫn hàng đầu về thu hút đầu tư. 2 tháng năm 2026, vốn FDI thực hiện tại Việt Nam tăng 8,8% Đầu tư công và vốn FDI thực hiện trong hai tháng đầu năm tăng"}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Ho Chi Minh City", "source": "VietnamPlus - Kinh te", "date": "2026-03-17", "url": "https://www.vietnamplus.vn/tinh-phu-tho-phan-dau-thu-hut-tren-hon-1-ty-usd-von-fdi-post1099421.vnp", "plan_id": "VN-IP-NORTH-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 920, "title": {"ko": "VietnamPlus - Kinh te", "en": "Việt Nam trao đổi với tập đoàn Assystem về hợp tác trong lĩnh vực điện hạt nhân", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2026-03-17", "url": "https://www.vietnamplus.vn/viet-nam-trao-doi-voi-tap-do", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-NUCLEAR", "grade": "", "matched": "Y"}, {"id": 266, "title": {"ko": "EVNGENCO3는 전력 생산량 계획의 11%를 초과하여 청정 에너지 목표를 가속화했습니다.", "en": "", "vi": "EVNGENCO3 vượt 11% kế hoạch sản lượng điện, tăng tốc mục tiêu năng lượng sạch"}, "summary": {"ko": "EVNGENCO3(Electricity Generation Corporation 3)는 2026년 첫 2개월 동안 41억 3900만kWh에 달하는 전력 생산량을 기록했는데, 이는 2025년 같은 기간에 비해 104%에 해당하며 현대화 및 친환경 전력 인프라를 위한 로드맵을 지속적으로 추진하고 있습니다.", "en": "Electricity Generation Corporation 3 (EVNGENCO3) recorded electricity output reaching 4.139 billion kWh in the first 2 months of 2026, equal to 104% compared to the same period in 2025, continuing to promote the roadmap to modernize and green power infrastructure.", "vi": "Tổng Công ty Phát điện 3 (EVNGENCO3) ghi nhận sản lượng điện đạt 4,139 tỷ kWh trong 2 tháng đầu năm 2026, bằng 104% so với cùng kỳ năm 2025, tiếp tục đẩy mạnh lộ trình hiện đại hóa và xanh hóa hạ tầng điện năng."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamNet - Kinh doanh", "date": "2026-03-16", "url": "https://vietnamnet.vn/evngenco3-vuot-11-ke-hoach-san-luong-dien-tang-toc-muc-tieu-nang-luong-sach-2497725.html", "plan_id": "VN-PWR-PDP8", "grade": "LOW", "matched": "Y"}, {"id": 267, "title": {"ko": "EVNGENCO3는 2026년 전력 생산을 위해 Mong Duong 1 화력 발전소와 협력합니다.", "en": "", "vi": "EVNGENCO3 làm việc với Nhiệt điện Mông Dương 1 về sản xuất điện 2026"}, "summary": {"ko": "2026년 3월 11일, 발전회사 3(EVNGENCO3)의 Le Van Danh 대표는 Mong Duong 화력발전회사와 건기 전력 생산 및 2026년 운영 계획에 관한 회의를 주재했습니다.", "en": "On March 11, 2026, Mr. Le Van Danh, General Director of Power Generation Corporation 3 (EVNGENCO3) chaired a meeting with Mong Duong Thermal Power Company on dry season power production and the 2026 operation plan.", "vi": "Ngày 11/3/2026, ông Lê Văn Danh, Tổng Giám đốc Tổng Công ty Phát điện 3 (EVNGENCO3) chủ trì làm việc với Công ty Nhiệt điện Mông Dương về công tác sản xuất điện mùa khô và kế hoạch vận hành năm 2026."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamNet - Kinh doanh", "date": "2026-03-14", "url": "https://vietnamnet.vn/evngenco3-lam-viec-voi-nhiet-dien-mong-duong-1-ve-san-xuat-dien-2026-2497251.html", "plan_id": "", "grade": "", "matched": "Y"}, {"id": 268, "title": {"ko": "캐나다의 베트남 교수는 북미 최대 전력망의 수명을 연장하기 위해 백만 달러의 보조금을 받았습니다.", "en": "Vietnamese professor in Canada lands million-dollar grant to extend life of North America's largest power grid", "vi": ""}, "summary": {"ko": "캐나다 UQTR(Universite du Quebec a Trois-Rivieres)의 재료 과학 교수인 Nguyen Tri Phuong은 퀘벡 주 전역의 고전압 송전선 구성 요소의 수명을 연장하도록 설계된 차세대 고무 화합물을 개발하기 위해 105만 달러를 받았습니다.", "en": "Nguyen Tri Phuong, a materials science professor at Canada's Universite du Quebec a Trois-Rivieres (UQTR), has received US$1.05 million to develop next-generation rubber compounds designed to extend the lifespan of high-voltage transmission line components across Quebec Province.", "vi": "Nguyễn Tri Phương, giáo sư khoa học vật liệu tại Đại học Quebec a Trois-Rivieres (UQTR) của Canada, đã nhận được 1,05 triệu USD để phát triển các hợp chất cao su thế hệ tiếp theo được thiết kế nhằm kéo dài tuổi thọ của các bộ phận đường dây truyền tải điện áp cao trên toàn tỉnh Quebec."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VnExpress English - News", "date": "2026-03-14", "url": "https://e.vnexpress.net/news/news/education/vietnamese-professor-in-canada-lands-million-dollar-grant-to-extend-life-of-north-america-s-largest-power-grid-5048908.html", "plan_id": "VN-PWR-PDP8-GRID", "grade": "LOW", "matched": "Y"}, {"id": 269, "title": {"ko": "최근 체포된 '다이아몬드 재벌' 추 당 코아(Chu Dang Khoa)가 킴 리엔 호텔(Kim Lien Hotel) 및 지아람(Gia Lam)의 대규모 부동산 프로젝트와 관련이 있다는 사실을 아는 사람은 거의 없습니다.", "en": "", "vi": "Điều ít ai biết \"đại gia kim cương\" Chu Đăng Khoa vừa bị bắt có liên quan đến Khách sạn Kim Liên và một dự án BĐS lớn tại Gia Lâm"}, "summary": {"ko": "Chu Dang Khoa가 많은 대규모 부동산, 에너지 및 산업단지 프로젝트를 주도하는 베트남 가족 사업 생태계의 주요 주주일 것이라고 예상하는 사람은 거의 없습니다.", "en": "Few people would expect that Chu Dang Khoa is a major shareholder in his family's business ecosystem in Vietnam, behind many large-scale real estate, energy and industrial park projects.", "vi": "Ít ai ngờ, Chu Đăng Khoa là cổ đông lớn trong hệ sinh thái kinh doanh của gia đình tại Việt Nam, đứng sau nhiều dự án bất động sản, năng lượng và khu công nghiệp quy mô lớn."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "CafeBiz", "date": "2026-03-13", "url": "https://cafebiz.vn/dieu-it-ai-biet-dai-gia-kim-cuong-chu-dang-khoa-vua-bi-bat-co-lien-quan-den-khach-san-kim-lien-va-mot-du-an-bds-lon-tai-gia-lam-176260313155029721.chn", "plan_id": "", "grade": "", "matched": ""}, {"id": 270, "title": {"ko": "기업인들이 국회의원 선거에 출마한다", "en": "", "vi": "Những lãnh đạo doanh nghiệp ứng cử đại biểu Quốc hội"}, "summary": {"ko": "국회의원에 출마한 기업인 후보 35명 중에는 비엣텔(Viettel), PVN, 비엣콤뱅크(Vietcombank), 아그리뱅크(Agribank), 베트남항공(Vietnam Airlines), 페트롤리멕스(Petrolimex) 등 대기업 및 법인 대표들이 포함됐다.", "en": "Among the 35 business candidates running for National Assembly deputies are leaders of large corporations and corporations such as Viettel, PVN, Vietcombank, Agribank, Vietnam Airlines, Petrolimex.", "vi": "Trong 35 ứng viên doanh nhân ứng cử Đại biểu Quốc hội có lãnh đạo các tập đoàn, tổng công ty lớn như Viettel, PVN, Vietcombank, Agribank, Vietnam Airlines, Petrolimex."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VnExpress - Kinh doanh", "date": "2026-03-13", "url": "https://vnexpress.net/nhung-lanh-dao-doanh-nghiep-ung-cu-dai-bieu-quoc-hoi-5048839.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 271, "title": {"ko": "베트남 우주센터 개관", "en": "", "vi": "Khánh thành Trung tâm Vũ trụ Việt Nam"}, "summary": {"ko": "", "en": "Ngày 13-3, tại Khu Công nghệ cao Hòa Lạc, Hà Nội, Thủ tướng Phạm Minh Chính dự khai mạc Diễn đàn tầm nhìn vũ trụ Việt Nam - Nhật Bản 2026 với chủ đề \"Hợp tác cho kỷ nguyên mới\" và khánh thành Trung tâm Vũ trụ Việt Nam. Hà Nội tăng cường 3 tuyến buýt, mở rộng kết nối tới Khu công nghệ cao Hòa Lạc Viettel đầu tư hơn 1 tỷ USD xây dựng 2 công trình trọng điểm quốc gia", "vi": ""}, "sector": "Transport", "area": "Urban Develop.", "province": "Hanoi", "source": "SGGP", "date": "2026-03-13", "url": "https://www.sggp.org.vn/khanh-thanh-trung-tam-vu-tru-viet-nam-post842689.html", "plan_id": "HN-URBAN-INFRA, HN-URBAN-WEST", "grade": "MEDIUM", "matched": ""}, {"id": 272, "title": {"ko": "베트남 우주센터 개관", "en": "", "vi": "Khánh thành Trung tâm Vũ trụ Việt Nam"}, "summary": {"ko": "베트남 우주 센터는 직경 9.3m 안테나를 갖춘 지상 시스템과 위성 R&D 센터를 갖춘 호아락 하이테크 파크에 문을 열었습니다. 억만장자 Elon Musk의 위성 인터넷은 베트남에서 라이센스를 받았습니다. 또 다른 회사는 베트남에서 위성 인터넷을 시험하기 위한 신청서를 제출했습니다.", "en": "The Vietnam Space Center was inaugurated at Hoa Lac Hi-Tech Park, possessing a ground system with a 9.3m diameter antenna and a satellite R&D center. Billionaire Elon Musk's satellite Internet is licensed in Vietnam. Another company has submitted an application to pilot satellite Internet in Vietnam.", "vi": "Trung tâm Vũ trụ Việt Nam được khánh thành tại Khu công nghệ cao Hòa Lạc, sở hữu hệ thống mặt đất với anten đường kính 9,3m, 유 도입을 준비하고 있다. 전문가들은 전국적인 E10 구현에 대한 동기화된 접근 방식을 요구합니다. Nationwide E10 g", "en": "Petroleum businesses are preparing to introduce E10 gasoline nationwide as early as late March, with the Ministry of Industry and Trade encouraging implementation from May 1 to ensure a smooth market transition. Experts call for synchronized approach to nationwide E10 implementation Nationwide E10 g", "vi": "Các doanh nghiệp xăng dầu đang chuẩn bị giới thiệu xăng E10 trên toàn quốc sớm nhất là vào cuối tháng 3, trong đó Bộ Công Thương khuyến khích thực hiện từ ngày 1/5 để đảm bảo quá trình chuyển đổi thị trường diễn ra suôn sẻ. Chuyên gia kêu gọi cách tiếp cận đồng bộ để triển khai E10 trên toàn quốc Toàn quốc E10 g"}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "SGGP News English", "date": "2026-03-12", "url": "https://en.sggp.org.vn/vietnam-to-roll-out-e10-bioethanol-fuel-ahead-of-schedule-post124532.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 922, "title": {"ko": "Bao Ha Tinh", "en": "Vượt eo biển Hormuz: Tàu chở 63.000 tấn LNG về Việt Nam an toàn", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2026-03-12", "url": "https://baohatinh.vn/vuot-eo-bien-hormuz-tau-cho-63000-", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 275, "title": {"ko": "Acecook Vietnam은 새로운 Vinh Long 공장을 개장했습니다.", "en": "", "vi": "Acecook Việt Nam khánh thành Nhà máy Vĩnh Long mới"}, "summary": {"ko": "2026년 3월 10일, Acecook Vietnam Joint Stock Company는 Hoa Phu 산업단지(Vinh Long성, Phu Quoi 코뮌)에 새로운 Vinh Long 공장을 공식적으로 개장했습니다. 총 투자 자본이 2억 달러 이상인 이 공장은 Acecook의 베트남 최대 공장이자 지역 사업의 핵심 프로젝트입니다.", "en": "On March 10, 2026, Acecook Vietnam Joint Stock Company officially inaugurated the new Vinh Long Factory in Hoa Phu Industrial Park (Phu Quoi commune, Vinh Long province). With a total investment capital of more than 200 million USD, this is Acecook's largest factory in Vietnam and a key project of the business in the region.", "vi": "Ngày 10.3.2026, Công ty cổ phần Acecook Việt Nam chính thức khánh thành Nhà máy Vĩnh Long mới tại Khu công nghiệp Hòa Phú (xã Phú Quới, tỉnh Vĩnh Long). Với tổng vốn đầu tư hơn 200 triệu USD, đây là nhà máy có quy mô lớn nhất của Acecook tại Việt Nam và là dự án trọng điểm của doanh nghiệp tại khu v"}, "sector": "Power", "area": "Energy Develop.", "province": "Vinh Long", "source": "Thanh Nien - Kinh te", "date": "2026-03-11", "url": "https://thanhnien.vn/acecook-viet-nam-khanh-thanh-nha-may-vinh-long-moi-185260311141020932.htm", "plan_id": "", "grade": "", "matched": ""}, {"id": 276, "title": {"ko": "Thi Vai 항구에 정박 중인 63,000톤급 LNG 운반선", "en": "LNG carrier delivering 63,000 tons docks at Thi Vai Port", "vi": ""}, "summary": {"ko": "약 63,000톤의 액화천연가스를 운반하는 LNG 운반선 FAT'H AL KHAIR가 베트남가스공사(PV GAS)가 운영하는 호치민시 티바이 LNG 터미널에 정박했습니다. Phuoc An 다리가 Thi Vai 강 위로 점진적으로 형성됨 Cai Mep에서 모선 처리량 – Thi Vai 18 증가", "en": "LNG carrier FAT’H AL KHAIR has docked at Thi Vai LNG Terminal in Ho Chi Minh City, operated by Vietnam Gas Corporation (PV GAS), carrying approximately 63,000 tons of liquefied natural gas. Phuoc An Bridge gradually takes shape over Thi Vai River Mother vessel throughput at Cai Mep–Thi Vai rises 18", "vi": "Tàu chở LNG FAT’H AL KHAIR vừa cập cảng LNG Thị Vải, TP.HCM do Tổng công ty Khí Việt Nam (PV GAS) khai thác, chở khoảng 63.000 tấn khí tự nhiên hóa lỏng. Cầu Phước An dần thành hình qua sông Thị Vải Sản lượng tàu mẹ tại Cái Mép – Thị Vải tăng 18"}, "sector": "Power", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "SGGP News English", "date": "2026-03-11", "url": "https://en.sggp.org.vn/lng-carrier-delivering-63000-tons-docks-at-thi-vai-port-post124515.html", "plan_id": "VN-PWR-PDP8-LNG", "grade": "LOW", "matched": "Y"}, {"id": 277, "title": {"ko": "63,000톤의 LNG를 운반하는 선박이 Thi Vai 항구에 정박했습니다.", "en": "", "vi": "Tàu chở 63.000 tấn LNG cập cảng Thị Vải"}, "summary": {"ko": "FAT'H AL KHAIR 선박은 약 63,000톤의 LNG를 운반하는 베트남 가스 공사의 Thi Vai LNG 터미널(HCMC)에 정박했습니다. 이는 2026년 PV GAS의 첫 수입 LNG열차로, 국가 전력계통의 연료원 확보에 적극적으로 기여하고 있습니다.", "en": "The ship FAT'H AL KHAIR docked at Thi Vai LNG Terminal (HCMC) of Vietnam Gas Corporation, carrying about 63,000 tons of LNG. This is PV GAS's first imported LNG train in 2026, proactively contributing to ensuring fuel sources for the national power system.", "vi": "Tàu FAT’H AL KHAIR cập cảng Kho cảng LNG Thị Vải (TPHCM) của Tổng Công ty Khí Việt Nam, mang theo khoảng 63.000 tấn LNG. Đây là chuyến tàu LNG nhập khẩu đầu tiên của PV GAS trong năm 2026, góp phần chủ động đảm bảo nguồn nhiên liệu cho hệ thống điện quốc gia."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "SGGP", "date": "2026-03-11", "url": "https://www.sggp.org.vn/tau-cho-63000-tan-lng-cap-cang-thi-vai-post842338.html", "plan_id": "VN-PWR-PDP8-LNG", "grade": "LOW", "matched": "Y"}, {"id": 278, "title": {"ko": "2026년 첫 63,000톤의 LNG가 베트남으로 무사히 돌아왔습니다.", "en": "", "vi": "63.000 tấn LNG đầu tiên trong năm 2026 đã về Việt Nam an toàn"}, "summary": {"ko": "PV GAS에 따르면, 63,000톤의 LNG를 운반한 선박은 이란의 군사적 긴장이 발발하기 전에 중동을 떠나 호르무즈 해협을 통과하여 중단 없는 운송 여정을 보장하는 데 도움이 되었습니다. LNG 시장은 석유보다 더 큰 충격을 받을 위험이 있다. 500kV LNG 라인을 건설하기 위해 1조 4천억 VND 이상을 투자했습니다.", "en": "According to PV GAS, the ship carrying 63,000 tons of LNG left the Middle East and passed through the Strait of Hormuz before military tensions in Iran broke out, helping to ensure an uninterrupted transport journey. The LNG market is at risk of suffering a bigger shock than oil. Investing more than 1,400 billion VND to build a 500kV LNG line.", "vi": "Theo PV GAS, chuyến tàu chở 63.000 tấn LNG đã rời Trung Đông và đi qua eo biển Hormuz trước khi căng thẳng quân sự tại Iran bùng phát, giúp đảm bảo hành trình vận chuyển không bị gián đoạn. Thị trường LNG có nguy cơ chịu cú sốc lớn hơn dầu mỏ Đầu tư hơn 1.400 tỷ đồng xây dựng đường dây 500kV LNG Quả"}, "sector": "Power", "area": "Energy Develop.", "province": "Quang Ninh", "source": "VietnamPlus - Kinh te", "date": "2026-03-11", "url": "https://www.vietnamplus.vn/63000-tan-lng-dau-tien-trong-nam-2026-da-ve-viet-nam-an-toan-post1098233.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 279, "title": {"ko": "총리는 EVN, Petrovietnam 및 Vinacomin에 임무를 할당했습니다.", "en": "", "vi": "Thủ tướng giao nhiệm vụ cho EVN, Petrovietnam và Vinacomin"}, "summary": {"ko": "총리는 어떤 상황에서도 절대 에너지가 부족하지 않게 하는 것이 목표라고 강조했다.", "en": "The Prime Minister emphasized that the goal is to definitely not lack energy under any circumstances.", "vi": "Thủ tướng nhấn mạnh mục tiêu đặt ra là dứt khoát không để thiếu năng lượng trong bất kỳ hoàn cảnh nào."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "CafeBiz", "date": "2026-03-11", "url": "https://cafebiz.vn/thu-tuong-giao-nhiem-vu-cho-evn-petrovietnam-va-vinacomin-176260311161440625.chn", "plan_id": "", "grade": "", "matched": "Y"}, {"id": 280, "title": {"ko": "호치민시, 21억 달러 규모의 AI 데이터센터 개발 계약 체결", "en": "HCMC signs deal to develop US$2.1 billion AI data center", "vi": ""}, "summary": {"ko": "호치민 인민위원회는 3월 11일 Tan Phu Trung 산업단지에서 대규모 인공지능(AI) 데이터센터 프로젝트 구현에 대해 논의하기 위해 투자자 및 국제 파트너 컨소시엄과 함께 실무회의를 열었습니다.", "en": "The HCMC People’s Committee held a working session with a consortium of investors and international partners to discuss the implementation of a large-scale artificial intelligence (AI) data center project at Tan Phu Trung Industrial Park on March 11.", "vi": "Chiều 11/3, UBND TP.HCM đã tổ chức buổi làm việc với liên danh các nhà đầu tư, đối tác quốc tế bàn về việc triển khai dự án trung tâm dữ liệu trí tuệ nhân tạo (AI) quy mô lớn tại Khu công nghiệp Tân Phú Trung."}, "sector": "Power", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "SGGP News English", "date": "2026-03-11", "url": "https://en.sggp.org.vn/hcmc-signs-deal-to-develop-us21-billion-ai-data-center-post124508.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 281, "title": {"ko": "호치민시는 시장에 적절한 연료, 가스 공급을 보장합니다.", "en": "Ho Chi Minh City ensures adequate fuel, gas supply for market", "vi": ""}, "summary": {"ko": "3월 10일, 호치민시 산업통상부는 시장 수요가 급격히 증가함에 따라 도시 전역의 에너지 공급 상황을 검토하기 위해 석유 및 가스 거래 기업과 협력 회의를 열었습니다.", "en": "On March 10, the Ho Chi Minh City Department of Industry and Trade held a working session with petroleum and gas trading enterprises to review the energy supply situation across the city, as market demand has been increasing sharply.", "vi": "Ngày 10/3, Sở Công Thương TP.HCM tổ chức buổi làm việc với các doanh nghiệp kinh doanh xăng dầu, khí đốt nhằm rà soát tình hình cung cấp năng lượng trên toàn thành phố trong bối cảnh nhu cầu thị trường ngày càng tăng mạnh."}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "SGGP News English", "date": "2026-03-11", "url": "https://en.sggp.org.vn/ho-chi-minh-city-ensures-adequate-fuel-gas-supply-for-market-post124504.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 282, "title": {"ko": "베트남 산업단지, Phuc Dien 산업단지 착공 - Hai Phong 프로젝트", "en": "KCN Vietnam breaks ground on KCN Phuc Dien - Hai Phong project", "vi": ""}, "summary": {"ko": "KCN베트남그룹은 하이퐁 케삿면의 푹디엔 확장 산업단지에서 KCN 푹디엔-하이퐁 프로젝트 기공식을 가졌다.", "en": "KCN Vietnam Group has held a groundbreaking ceremony for the KCN Phuc Dien – Hai Phong project at the Phuc Dien Expansion Industrial Park in Ke Sat Commune in Hai Phong.", "vi": "Tập đoàn KCN Việt Nam vừa tổ chức lễ khởi công dự án KCN Phúc Điền – Hải Phòng tại Khu công nghiệp Phúc Điền mở rộng, xã Kẻ Sắt, Hải Phòng."}, "sector": "Power", "area": "Energy Develop.", "province": "Hai Phong", "source": "VnExpress English - Business", "date": "2026-03-11", "url": "https://e.vnexpress.net/news/business/kcn-vietnam-breaks-ground-on-kcn-phuc-dien-hai-phong-project-5048844.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 283, "title": {"ko": "EVNHANOI, 2026년 Earth Hour 지원 위해 전력 강화", "en": "EVNHANOI powers up to support Earth Hour 2026", "vi": ""}, "summary": {"ko": "에너지 절약과 환경 보호에 대한 대중의 인식을 높이기 위해 하노이 전력공사(EVNHANOI)는 2026년 지구촌 전등끄기 캠페인에 대응하여 \"전국이 에너지를 절약하고 효율적으로 사용합니다\" 운동을 시작했습니다. EVN, 주요 전력 프로젝트 개시 PM 태스크 전력 수요 충족을 위한 EVN", "en": "To raise public awareness on energy conservation and environmental protection, the Ha Noi Power Corporation (EVNHANOI) launched the \"Whole Nation Uses Energy Saving and Efficiently\" movement, in respose to the 2026 Earth Hour campaign. EVN launches major power projects PM tasks EVN to meet power dem", "vi": "Nhằm nâng cao nhận thức của người dân về tiết kiệm năng lượng và bảo vệ môi trường, Tổng công ty Điện lực Hà Nội (EVNHANOI) đã phát động phong trào “Cả nước sử dụng năng lượng tiết kiệm và hiệu quả” hưởng ứng chiến dịch Giờ Trái đất 2026. Tập đoàn Điện lực Việt Nam khởi công các dự án điện lớn Thủ tướng giao nhiệm vụ cho Tập đoàn Điện lực Việt Nam"}, "sector": "Power", "area": "Energy Develop.", "province": "Hanoi", "source": "Nhan Dan English", "date": "2026-03-11", "url": "https://en.nhandan.vn/evnhanoi-powers-up-to-support-earth-hour-2026-post159870.html", "plan_id": "VN-PWR-PDP8", "grade": "MEDIUM", "matched": "Y"}, {"id": 923, "title": {"ko": "SGGP News English", "en": "LNG carrier delivering 63,000 tons docks at Thi Vai Port", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Ho Chi Minh City", "date": "2026-03-11", "url": "https://en.sggp.org.vn/lng-carrier-delivering-63000-ton", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 924, "title": {"ko": "SGGP", "en": "Tàu chở 63.000 tấn LNG cập cảng Thị Vải", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2026-03-11", "url": "https://www.sggp.org.vn/tau-cho-63000-tan-lng-cap-cang-", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 284, "title": {"ko": "생계·필수분야 연료 공급 우선", "en": "Priority given to fuel supply for livelihoods, essential sectors", "vi": ""}, "summary": {"ko": "3월 10일, 하노이 인민위원회는 중동 분쟁과 관련된 어려움과 공급 중단 속에서 도시 전역의 석유 거래 및 공급 상황을 검토하기 위해 관련 부서와 회의를 소집했습니다.", "en": "On March 10, the Hanoi People’s Committee convened a meeting with relevant departments to review the situation of petroleum trading ans supply across the city amid challenges and supply disruptions linked to the conflict in the Middle East.", "vi": "Ngày 10/3, UBND TP Hà Nội đã triệu tập cuộc họp với các sở liên quan để rà soát tình hình kinh doanh và cung ứng xăng dầu trên địa bàn thành phố trong bối cảnh thách thức, gián đoạn nguồn cung do xung đột ở Trung Đông."}, "sector": "Power", "area": "Energy Develop.", "province": "Hanoi", "source": "SGGP News English", "date": "2026-03-10", "url": "https://en.sggp.org.vn/priority-given-to-fuel-supply-for-livelihoods-essential-sectors-post124484.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 285, "title": {"ko": "베트남에서 가장 젊은 중앙 운영 도시는 약 226헥타르 규모의 1조 7천억 VND 이상의 가치가 있는 산업 단지를 보유하게 되어 일련의 새로운 일자리 기회를 열어줄 것입니다.", "en": "", "vi": "Thành phố trực thuộc Trung ương trẻ nhất Việt Nam sẽ có khu công nghiệp hơn 1.700 tỷ đồng, quy mô gần 226 ha, mở ra loạt cơ hội việc làm mới"}, "summary": {"ko": "이 프로젝트의 토지 이용 규모는 약 225.6헥타르이며, 총 예상 투자 자본은 약 1조 7,069억 VND, 약 6,827만 달러에 해당합니다.", "en": "The project has a land use scale of about 225.6 hectares, with a total expected investment capital of about 1,706.9 billion VND, equivalent to about 68.27 million USD.", "vi": "Dự án có quy mô sử dụng đất khoảng 225,6 ha, tổng vốn đầu tư dự kiến khoảng 1.706,9 tỷ đồng, tương đương khoảng 68,27 triệu USD."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Vietnam", "source": "CafeBiz", "date": "2026-03-10", "url": "https://cafebiz.vn/thanh-pho-truc-thuoc-trung-uong-tre-nhat-viet-nam-se-co-khu-cong-nghiep-hon-1700-ty-dong-quy-mo-gan-226-ha-mo-ra-loat-co-hoi-viec-lam-moi-176260310153250722.chn", "plan_id": "", "grade": "", "matched": ""}, {"id": 286, "title": {"ko": "닌빈에서 열린 첫 번째 주주총회에서 EVN Finance는 LPBank가 가장 선호하는 장소를 선택하여 역사상 가장 높은 수익 목표를 발표했습니다.", "en": "", "vi": "Lần đầu họp cổ đông tại Ninh Bình, EVN Finance chọn đúng địa điểm ưa thích của LPBank để công bố mục tiêu lợi nhuận cao nhất lịch sử"}, "summary": {"ko": "EVN Finance는 1조 3,250억 VND의 사상 최대 이익 목표로 2026년 닌빈에서 주주총회를 개최하고, 2025년 모든 이익을 유보하여 사업 개발에 재투자하겠다는 계획을 제시할 계획입니다.", "en": "EVN Finance plans to hold a shareholders' meeting in 2026 in Ninh Binh with a record profit target of 1,325 billion VND, and present a plan to retain all profits in 2025 to reinvest in business development.", "vi": "EVN Finance dự kiến tổ chức đại hội cổ đông năm 2026 tại Ninh Bình với mục tiêu lợi nhuận kỷ lục 1.325 tỷ đồng, đồng thời trình phương án giữ lại toàn bộ lợi nhuận năm 2025 để tái đầu tư phát triển kinh doanh."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "CafeBiz", "date": "2026-03-10", "url": "https://cafebiz.vn/lan-dau-hop-co-dong-tai-ninh-binh-evn-finance-chon-dung-dia-diem-ua-thich-cua-lpbank-de-cong-bo-muc-tieu-loi-nhuan-cao-nhat-lich-su-176260310112010327.chn", "plan_id": "", "grade": "", "matched": "Y"}, {"id": 287, "title": {"ko": "페트로베트남, 정부에 원유 수출 중단 제안", "en": "", "vi": "Petrovietnam kiến nghị Chính phủ cho dừng xuất khẩu dầu thô"}, "summary": {"ko": "", "en": "Trước diễn biến phức tạp của tình hình Trung Đông, Tập đoàn Công nghiệp - Năng lượng Quốc gia Việt Nam (Petrovietnam) đã tiếp tục kiến nghị Chính phủ xem xét các biện pháp mạnh hơn trong điều hành nguồn dầu thô, bao gồm dừng xuất khẩu dầu thô để ưu tiên phục vụ nhu cầu chế biến trong nước.", "vi": ""}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Vietnam", "source": "SGGP", "date": "2026-03-10", "url": "https://www.sggp.org.vn/petrovietnam-kien-nghi-chinh-phu-cho-dung-xuat-khau-dau-tho-post842177.html", "plan_id": "VN-OG-2030", "grade": "", "matched": ""}, {"id": 288, "title": {"ko": "PVN은 국내 소비를 보장하기 위해 원유 수출을 중단할 것을 제안했습니다.", "en": "", "vi": "PVN kiến nghị dừng xuất khẩu dầu thô để đảm bảo tiêu dùng trong nước"}, "summary": {"ko": "(Dan Tri) - 현재 호르무즈 해협 사건은 베트남에 영향을 미치지 않고 있다. 그러나 국제 시장의 LNG 가격은 이제 상승했습니다. 따라서 공급을 보장하기 위해 PVN은 원유 수출을 중단할 것을 제안했습니다.", "en": "(Dan Tri) - Currently, the incident in the Strait of Hormuz has not affected Vietnam. However, LNG prices on the international market have now increased. Therefore, to ensure supply, PVN proposed to stop exporting crude oil.", "vi": "(Dân trí) - Hiện sự cố tại eo biển Hormuz chưa ảnh hưởng đến Việt Nam. Tuy nhiên, giá LNG trên thị trường quốc tế hiện đã tăng. Do đó, để đảm bảo nguồn cung, PVN kiến nghị dừng xuất khẩu dầu thô."}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Vietnam", "source": "Dan Tri - Kinh doanh", "date": "2026-03-10", "url": "https://dantri.com.vn/kinh-doanh/pvn-kien-nghi-dung-xuat-khau-dau-tho-de-dam-bao-tieu-dung-trong-nuoc-20260310110349090.htm", "plan_id": "VN-OG-2030", "grade": "", "matched": ""}, {"id": 289, "title": {"ko": "3월 10일 오후 팟캐스트 뉴스: 국내 수요 우선으로 원유 수출 중단 제안", "en": "", "vi": "Podcast bản tin chiều 10-3: Kiến nghị dừng xuất khẩu dầu thô, ưu tiên nhu cầu trong nước"}, "summary": {"ko": "Saigon Giai Phong 신문의 3월 10일 오후 뉴스 팟캐스트에는 다음과 같은 주목할만한 정보가 포함되어 있습니다. Petrovietnam은 정부에 원유 수출 중단을 제안했습니다. 호치민시는 1급 학생을 위한 입학 계획 초안에 대한 의견을 수집합니다. 4월에 석유 수입을 계획하고 있는 기업 문제를 일으킨 오토바이 택시기사를 긴급 검거하세요", "en": "The March 10 afternoon news podcast on Saigon Giai Phong Newspaper contained the following notable information: Petrovietnam proposed to the Government to stop crude oil exports; Ho Chi Minh City collects opinions on the draft admission plan for first-level students; Enterprises ready to plan to import petroleum in April; Urgently arrest the motorbike taxi driver who caused trouble", "vi": "Podcast bản tin chiều 10-3 trên Báo Sài Gòn Giải Phóng có các thông tin đáng chú ý sau: Petrovietnam kiến nghị Chính phủ cho dừng xuất khẩu dầu thô; TPHCM lấy s. Increasing market control, localities ensure stable gasoline supply High gasoline prices force transportation businesses to", "vi": "Petrovietnam kiến nghị Chính phủ xem xét các biện pháp mạnh hơn trong điều hành nguồn dầu thô, bao gồm dừng xuất khẩu dầu thô để ưu tiên phục vụ nhu cầu chế biến trong nước. Tăng kiểm soát thị trường, các địa phương bảo đảm nguồn cung xăng dầu ổn định Giá xăng dầu cao, doanh nghiệp vận tải buộc phải"}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamPlus - Kinh te", "date": "2026-03-09", "url": "https://www.vietnamplus.vn/petrovietnam-som-kich-hoat-giai-phap-ung-pho-bao-dam-an-ninh-nang-luong-post1097813.vnp", "plan_id": "VN-OG-2030", "grade": "", "matched": ""}, {"id": 292, "title": {"ko": "페트로베트남, 정부에 원유 수출 중단 제안", "en": "", "vi": "Petrovietnam kiến nghị Chính phủ cho dừng xuất khẩu dầu thô"}, "summary": {"ko": "중동 상황의 복잡한 발전에 직면한 베트남 국가 에너지 산업 그룹(페트로베트남)은 에너지 안보를 보장하기 위해 일련의 대응 솔루션을 적극적으로 활성화했다고 밝혔습니다.", "en": "Faced with the complicated developments of the Middle East situation, Vietnam National Energy and Industry Group (Petrovietnam) said it has proactively activated a series of response solutions to ensure energy security.", "vi": "Trước diễn biến phức tạp của tình hình Trung Đông, Tập đoàn Công nghiệp - Năng lượng quốc gia Việt Nam (Petrovietnam) cho biết đã chủ động kích hoạt hàng loạt giải pháp ứng phó để đảm bảo an ninh năng lượng."}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Vietnam", "source": "Tuoi Tre - Kinh doanh", "date": "2026-03-09", "url": "https://tuoitre.vn/petrovietnam-kien-nghi-chinh-phu-cho-dung-xuat-khau-dau-tho-20260309205050559.htm", "plan_id": "VN-OG-2030", "grade": "", "matched": ""}, {"id": 293, "title": {"ko": "Southern Power Corporation: 2025년 10가지 뛰어난 이정표", "en": "", "vi": "Tổng công ty Điện lực miền Nam: 10 dấu ấn nổi bật năm 2025"}, "summary": {"ko": "2025년에도 남부전력공사(EVNSPC)는 창조, 혁신, 협력을 통해 과제를 극복하고 과제를 성공적으로 종합적으로 완료하기 위해 지속적으로 노력해 왔습 ực hiện tại Việt Nam tăng 8,8%"}, "summary": {"ko": "2026년 2월 28일 현재 신규 등록 자본금, 조정 등록 자본금, 외국인 투자자의 자본 출자 및 주식 구매 가치를 포함하여 베트남에 등록된 총 외국인 투자 자본은 60억 3천만 달러에 달했습니다. 올해 첫 2개월 동안 이루어진 공공 투자와 FDI 자본은 크게 증가했습니다. DP 그룹: 베트남은 계속되었습니다", "en": "Total foreign investment capital registered in Vietnam as of February 28, 2026 including newly registered capital, adjusted registered capital and value of capital contributions and share purchases by foreign investors reached 6.03 billion USD. Public investment and FDI capital made in the first two months of the year grew strongly DP Group: Vietnam continued", "vi": "Tổng vốn đầu tư nước ngoài đăng ký vào Việt Nam tính đến ngày 28/2/2026 bao gồm vốn đăng ký cấp mới, vốn đăng ký điều chỉnh và giá trị góp vốn, mua cổ phần của nhà đầu tư nước ngoài đạt 6,03 tỷ USD. Đầu tư công và vốn FDI thực hiện trong hai tháng đầu năm tăng trưởng mạnh DP Group: Việt Nam tiếp tục"}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Vietnam", "source": "VietnamPlus - Kinh te", "date": "2026-03-09", "url": "https://www.vietnamplus.vn/2-thang-nam-2026-von-fdi-thuc-hien-tai-viet-nam-tang-88-post1097768.vnp", "plan_id": "VN-IP-NORTH-2030", "grade": "LOW", "matched": "Y"}, {"id": 929, "title": {"ko": "VietnamPlus - Kinh te", "en": "Petrovietnam sớm kích hoạt giải pháp ứng phó, bảo đảm an ninh năng lượng", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2026-03-09", "url": "https://www.vietnamplus.vn/petrovietnam-som-kich-hoat-g", "plan_id": "VN-OG-2030", "grade": "", "matched": "Y"}, {"id": 930, "title": {"ko": "Nhan Dan English", "en": "Nghe An steps up efforts to remove bottlenecks and attract FDI", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "", "source": "Dong Nai", "date": "2026-03-09", "url": "https://en.nhandan.vn/nghe-an-steps-up-efforts-to-remov", "plan ad of the Management Board of HCMC Hi-Tech Park, the park has continued to uphold its position as one of the major driving forces for the city’s high-tech industrial growth in recent years.", "vi": "Theo ông Nguyễn Kỳ Phụng, Trưởng Ban Quản lý Khu công nghệ cao TP.HCM, khu này tiếp tục giữ vững vị thế là một trong những động lực chính thúc đẩy tăng trưởng công nghiệp công nghệ cao của thành phố trong những năm gần đây."}, "sector": "Power", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "SGGP News English", "date": "2026-03-05", "url": "https://en.sggp.org.vn/hcmc-hi-tech-park-makes-efforts-to-enhance-investment-environment-post124347.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 298, "title": {"ko": "세계 유가 상승 우려: 정유소용 원유 공급원 찾기", "en": "", "vi": "Lo ngại trước tình trạng giá dầu thế giới tăng: Tìm kiếm các nguồn dầu thô cho nhà máy lọc dầu"}, "summary": {"ko": "정유소에서 생산할 원유 공급원을 확보하기 위해 베트남 국가 산업 에너지 그룹(페트로베트남)은 Nghi Son 정유소와 석유화학 회사에 프로젝트에 참여하는 외국 당사자와 협력하여 백업 석유를 긴급 공급하도록 지시했습니다.", "en": "To ensure the source of crude oil for production at oil refineries, Vietnam National Industry and Energy Group (Petrovietnam) has directed Nghi Son Refinery and Petrochemical Company to work with foreign parties participating in the project to urgently supply backup oil.", "vi": "Để đảm bảo nguồn dầu thô cho sản xuất tại các nhà máy lọc dầu, Tập đoàn Công nghiệp - Năng lượng quốc gia Việt Nam (Petrovietnam) đã chỉ đạo tại Công ty lọc hóa dầu Nghi Sơn làm việc với các bên nước ngoài tham gia dự án cung cấp khẩn dầu dự phòng."}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Vietnam", "source": "Tuoi Tre - Kinh doanh", "date": "2026-03-05", "url": "https://tuoitre.vn/lo-ngai-truoc-tinh-trang-gia-dau-the-gioi-tang-tim-kiem-cac-nguon-dau-tho-cho-nha-may-loc-dau-20260304231546866.htm", "plan_id": "VN-OG-2030", "grade": "", "matched": ""}, {"id": 299, "title": {"ko": "스마트 시티와 디지털 산업단지를 강화하기 위한 5G 출시 가속화", "en": "5G rollout accelerated  "2026-03-02", "url": "https://en.sggp.org.vn/hcmc-to-create-favorable-conditions-for-enterprises-to-expand-investment-post124271.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 308, "title": {"ko": "베트남 푸꾸옥, APEC 지도자 도착 전 4,750만 달러 규모의 물 및 폐기물 처리장 건설 경쟁", "en": "Vietnam's Phu Quoc races to build $47.5M water and waste plants before APEC leaders arrive", "vi": ""}, "summary": {"ko": "내년 APEC 2027이 개최되기 전 인프라 격차를 해소하기 위해 2월 27일 푸꾸옥에서 총 1조 2380억 VND (4750만 달러) 규모의 3개 물 및 폐기물 처리 프로젝트가 착공됐다.", "en": "Three water and waste treatment projects worth a combined VND1.238 trillion (US$47.5 million) broke ground in Phu Quoc on Feb. 27 to close the gap in infrastructure before the island hosts APEC 2027 next year.", "vi": "Ba dự án xử lý nước và chất thải trị giá tổng cộng 1,238 nghìn tỷ đồng (47,5 triệu USD) đã được khởi công tại Phú Quốc vào ngày 27 tháng 2 để thu hẹp khoảng cách về cơ sở hạ tầng trước khi hòn đảo đăng cai APEC 2027 vào năm tới."}, "sector": "Power", "area": "Energy Develop.", "province": "Kien Giang", "source": "VnExpress English - News", "date": "2026-03-01", "url": "https://e.vnexpress.net/news/news/vietnam-s-phu-quoc-races-to-build-47-5m-water-and-waste-plants-before-apec-leaders-arrive-5044893.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 309, "title": {"ko": "Stavian Hung Yen 산업 클러스터는 여러 기업과 인프라 임대 계약을 체결했습니다.", "en": "Stavian Hung Yen Industrial Cluster signs infrastructure lease agreements with multiple enterprises", "vi": ""}, "summary": {"ko": "Stavian Industrial Park JSC는 이번 달 Airpac Packaging JSC, Divico Vietnam Co., Ltd. 및 HLC VET JSC를 포함하여 Stavian Hung Yen 산업 클러스터의 여러 기업과 인프라 및 토지 사용 임대 계약을 체결했습니다.", "en": "Stavian Industrial Park JSC has signed infrastructure and land-use lease agreements this month with several enterprises at the Stavian Hung Yen Industrial Cluster, including Airpac Packaging JSC, Divico Vietnam Co., Ltd., and HLC VET JSC.", "vi": "Công ty Cổ phần Khu công nghiệp Stavian đã ký hợp đồng thuê cơ sở hạ tầng và quyền sử dụng đất trong tháng này với một số doanh nghiệp tại Cụm công nghiệp Stavian Hưng Yên, bao gồm Công ty Cổ phần Bao bì Airpac, Công ty TNHH Divico Việt Nam và Công ty Cổ phần HLC VET."}, "sector": "Power", "area": "Energy Develop.", "province": "Hung Yen", "source": "VnExpress English - Business", "date": "2026-02-26", "url": "https://e.vnexpress.net/news/business/stavian-hung-yen-industrial-cluster-signs-infrastructure-lease-agreements-with-multiple-enterprises-5044043.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 310, "title": {"ko": "베트남 회사, 처음으로 미국에 비료 4만톤 수출 성공", "en": "Vietnamese firm successfully exports first 40,000 tons of fertilizer to US", "vi": ""}, "summary": {"ko": "베트남 국가산업에너지그룹(Petrovietnam)의 자회사인 Petrovietnam Ca Mau Fertilizer Corporation(PVCFC)이 첫 번째 비료 40,000톤을 미국으로 수출하는 데 성공했습니다.", "en": "Petrovietnam Ca Mau Fertilizer Corporation (PVCFC), a subsidiary of Vietnam National Industry – Energy Group (Petrovietnam), has successfully exported its first shipment of 40,000 tons of fertilizer to the US.", "vi": "Tổng công ty Phân bón Dầu khí Cà Mau (PVCFC), đơn vị trực thuộc Tập đoàn Công nghiệp – Năng lượng Việt Nam (Petrovietnam), đã xuất khẩu thành công lô hàng 40.000 tấn phân bón đầu tiên sang Mỹ."}, "sector": "Power", "area": "Energy Develop.", "province": "Ca Mau", "source": "SGGP News English", "date": "2026-02-25", "url": "https://en.sggp.org.vn/vietnamese-firm-successfully-exports-first-40000-tons-of-fertilizer-to-us-post124147.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 311, "title": {"ko": "베트남, 디지털 경제를 위한 최초의 국가 블록체인 인프라 출시", "en": "Vietnam launches first national blockchain infrastructure for digital economy", "vi": ""}, "summary": {"ko": "베트남은 데이터 검증, 자산화 및 전국적인 디지털 전환을 위한 안전하고 투명한 디지털 인프라를 제공하기 위해 국가 블록체인 플랫폼 NDAChain을 배포하고 있습니다.", "en": "Vietnam is deploying its National Blockchain Platform NDAChain to provide a secure and transparent digital infrastructure for data verification, assetization, and nationwide digital transformation.", "vi": "Việt Nam đang triển khai Nền tảng Blockchain quốc gia NDAChain để cung cấp cơ sở hạ tầng kỹ thuật số an toàn và minh bạch để xác minh dữ liệu, tài sản hóa và chuyển đổi kỹ thuật số trên toàn quốc."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "SGGP News English", "date": "2026-02-25", "url": "https://en.sggp.org.vn/vietnam-launches-first-national-blockchain-infrastructure-for-digital-economy-post124150.html", "plan_id": "VN-SC-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 312, "title": {"ko": "남부전력공사 : 2026년 설 연휴 직후 업무 배치", "en": "", "vi": "Tổng công ty Điện lực miền Nam: Triển khai nhiệm vụ ngay sau kỳ nghỉ Tết Nguyên đán 2026"}, "summary": {"ko": "2월 23일(설 7일) 오전, 남부발전공사(EVNSPC)가 연초 회의를 열고 2026년 업무과제를 전개했다. 회의는 직접 진행됐으며, 전 회원 단위에 온라인으로 방송됐다.", "en": "On the morning of February 23 (the 7th day of the Lunar New Year), the Southern Power Corporation (EVNSPC) held a meeting at the beginning of the year and deployed work tasks for 2026. The meeting was held in person and broadcast online to all member units.", "vi": "Sáng 23-2 (mồng 7 Tết Bính Ngọ), Tổng công ty Điện lực miền Nam (EVNSPC) tổ chức gặp mặt đầu năm và triển khai nhiệm vụ công tác năm 2026. Buổi gặp mặt tổ chức theo hình thức trực tiếp và truyền hình trực tuyến đến tất cả đơn vị thành viên."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "SGGP", "date": "2026-02-24", "url": "https://www.sggp.org.vn/tong-cong-ty-dien-luc-mien-nam-trien-khai-nhiem-vu-ngay-sau-ky-nghi-tet-nguyen-dan-2026-post839739.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 313, "title": {"ko": "부총리는 PVN, EVN, Vinachem, Petrolimex에 중요한 업무를 할당했습니다.", "en": "", "vi": "Phó Thủ tướng giao nhiệm vụ quan trọng cho PVN, EVN, Vinachem, Petrolimex"}, "summary": {"ko": "(Dan Tri) - 부총리는 PVN, EVN, Vinachem, Petrolimex에게 두 자릿수 성장 목표 설정, 에너지 안보 보장, 지역 및 글로벌 가치 사슬에 깊이 참여할 것을 요청했습니다.", "en": "(Dan Tri) - The Deputy Prime Minister requested PVN, EVN, Vinachem, Petrolimex to set a double-digit growth target, ensure energy security and deeply participate in the regional and global value chain.", "vi": "(Dân trí) - Phó Thủ tướng yêu cầu PVN, EVN, Vinachem, Petrolimex đặt mục tiêu tăng trưởng 2 con số, bảo đảm an ninh năng lượng và tham gia sâu chuỗi giá trị khu vực, toàn cầu."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Dan Tri - Kinh doanh", "date": "2026-02-24", "url": "https://dantri.com.vn/kinh-doanh/pho-thu-tuong-giao-nhiem-vu-quan-trong-cho-pvn-evn-vinachem-petrolimex-20260224073852577.htm", "plan_id": "", "grade": "", "matched": "Y"}, {"id": 314, "title": {"ko": "부총리는 EVN에 전력 공급량을 15% 이상 늘릴 것을 요청했습니다.", "en": "", "vi": "Phó thủ tướng yêu cầu EVN tăng nguồn điện trên 15%"}, "summary": {"ko": "10% 이상의 경제성장 목표를 달성하고 반도체, 인공지능 등 신산업의 전력공급 수요를 충족시키기 위해 부이 탄 손(Bui Thanh Son) 부총리는 베트남전력그룹(EVN)이 15% 이상의 전력 성장을 달성하기 위해 노력할 것을 제안했다.", "en": "In order to serve the goal of economic growth of over 10% and meet the power supply needs of new industries such as semiconductors, artificial intelligence... Deputy Prime Minister Bui Thanh Son proposed that Vietnam Electricity Group (EVN) strive to achieve power growth of over 15%.", "vi": "Nhằm phục vụ mục tiêu tăng trưởng kinh tế trên 10% và đáp ứng nhu cầu cấp điện cho các ngành công nghiệp mới như bán dẫn, trí tuệ nhân tạo... Phó thủ tướng Bùi Thanh Sơn đề nghị Tập đoàn Điện lực Việt Nam (EVN) phấn đấu đạt mức tăng trưởng nguồn điện trên 15%."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Thanh Nien - Kinh te", "date": "2026-02-24", "url": "https://thanhnien.vn/pho-thu-tuong-yeu-cau-evn-tang-nguon-dien-tren-15-185260224090221492.htm", "plan_id": "", "grade": "", "matched": "Y"}, {"id": 315, "title": {"ko": "호아락 하이테크파크 460ha 확장 — 베트남 실리콘밸리 2026", "en": "Hoa Lac Hi-Tech Park 460ha expansion — Vietnam Silicon Valley 2026", "vi": ""}, "summary": {"ko": "호아락 하이테크파크 460ha 확장 토지수용 2026년 완료.  intelligence (AI), semiconductors, logistics, healthcare and high-tech agriculture.", "vi": "Đại sứ Việt Nam tại Pháp Trịnh Đức Hải cho biết Việt Nam muốn Pháp đầu tư chất lượng cao vào cơ sở hạ tầng giao thông, thành phố thông minh, năng lượng tái tạo, trí tuệ nhân tạo (AI), chất bán dẫn, hậu cần, y tế và nông nghiệp công nghệ cao."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Vietnam News - Economy", "date": "2026-02-21", "url": "https://vietnamnews.vn/economy/1766076/viet-nam-eyes-deeper-economic-partnership-with-france-in-key-future-industries.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 318, "title": {"ko": "산업통상부는 Viettel, VNPT, FPT, VNG 및 CMC의 긴급 전기 가격 제안에 대해 밝혔습니다.", "en": "", "vi": "Bộ Công Thương lên tiếng về kiến nghị khẩn giá điện của Viettel, VNPT, FPT, VNG, CMC"}, "summary": {"ko": "산업통상자원부는 EVN에 데이터센터의 전기 생산 가격 적용에 대한 과학기술부의 의견을 연구하도록 요청했다고 밝혔습니다.", "en": "The Ministry of Industry and Trade said it had asked EVN to study the opinion of the Ministry of Science and Technology on the application of electricity production prices for data centers.", "vi": "Bộ Công Thương cho biết đã đề nghị EVN nghiên cứu ý kiến của Bộ Khoa học và Công nghệ về việc áp dụng giá điện sản xuất cho trung tâm dữ liệu."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "CafeBiz - Home", "date": "2026-02-16", "url": "https://cafebiz.vn/bo-cong-thuong-len-tieng-ve-kien-nghi-khan-gia-dien-cua-viettel-vnpt-fpt-vng-cmc-176260216162945814.chn", "plan_id": "", "grade": "", "matched": ""}, {"id": 319, "title": {"ko": "EVN은 2026년 설날 동안 전력 공급을 보장할 준비가 되어 있습니다.", "en": "", "vi": "EVN sẵn sàng đảm bảo cung ứng điện trong dịp tết Nguyên đán Bính Ngọ 2026"}, "summary": {"ko": "베트남전력그룹(EVN)은 2026년 빈응오(Binh Ngo)의 9일간의 설 연휴 동안 전력회사에 24시간 Tet 의무를 조직하고 정전을 수행하지 않도록 요구합니다.", "en": "Vietnam Electricity Group (EVN) requires electricity units to organize 24-hour Tet duty and not perform power cuts during the 9-day Lunar New Year holiday of Binh Ngo 2026.", "vi": "Tập đoàn Điện lực Việt Nam (EVN) yêu cầu các đơn vị điện lực tổ chức trực tết 24/24 giờ và không thực hiện cắt điện trong 9 ngày nghỉ tết Nguyên đán Bính Ngọ 2026."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Thanh Nien - Kinh te", "date": "2026-02-15", "url": "https://thanhnien.vn/evn-san-sang-dam-bao-cung-ung-dien-trong-dip-tet-nguyen-dan-binh-ngo-2026-18526021509531608.htm", "plan_id": "", "grade": "", "matched": "Y"}, {"id": 320, "title": {"ko": "전력업계 수조조 재수출 이익, 누가 크게 승리할까?", "en": "", "vi": "Lãi nghìn tỉ tái xuất trong ngành điện, ai đang thắng lớn?"}, "summary": {"ko": "2025년 4분기 발전그룹의 수익구조는 많은 긍정적인 변화를 기록했습니다. PV Power, EVNGENCO 3, NT2 등 일련의 사업체는 모두 자본 가격 냉각 및 금융 비용 절감으로 인해 이익이 증가했다고 보고했습니다.", "en": "The power generation group's profit picture in the fourth quarter of 2025 recorded many positive changes. A series of businesses such as PV Power, EVNGENCO 3, NT2... all reported increased profits thanks to cooling capital prices and reduced financial costs.", "vi": "Bức tranh lợi nhuận quý 4-2025 của nhóm phát điện ghi nhận nhiều chuyển biến tích cực. Hàng loạt doanh nghiệp như PV Power, EVNGENCO 3, NT2... đồng loạt báo lãi tăng nhờ giá vốn hạ nhiệt và chi phí tài chính giảm."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Tuoi Tre - Kinh doanh", "date": "2026-02-15", "url": "https://tuoitre.vn/lai-nghin-ti-tai-xuat-trong-nganh-dien-ai-dang-thang-lon-20260215191538123.htm", "plan_id": "", "grade": "", "matched": ""}, {"id": 321, "title": {"ko": "호치민시, 서부 관문 혼잡 완화를 위해 도로 확장에 2억 7천만 달러 투자", "en": "Ho Chi Minh City to pour $270M into road expansion to ease western gateway congestion", "vi": ""}, "summary": {"ko": "호치민시에서 가장 혼잡한 서부 관문 중 하나에서 수년간의 정체가 여러 산업 지역에 서비스를 제공하는 주요 동맥인 Vinh Loc Road를 확장하기 위해 시가 거의 7조 VND (2억 7천만 달러)를 승인한 후 마침내 완화될 수 있었습니다.", "en": "Years of gridlock at one of Ho Chi Minh City's most congested western gateways could finally ease after the city approved nearly VND7 trillion (US$270 million) to widen Vinh Loc Road, a key artery serving multiple industrial zones.", "vi": "Nhiều năm tắc nghẽn tại một trong những cửa ngõ phía Tây ùn tắc nhất của Thành phố Hồ Chí Minh cuối cùng cũng có thể giảm bớt sau khi thành phố phê duyệt gần 7 nghìn tỷ đồng (270 triệu USD) để mở rộng đường Vĩnh Lộc, tuyến đường huyết mạch phục vụ nhiều khu công nghiệp."}, "sector": "Power", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "VnExpress English - News", "date": "2026-02-12", "url": "https://e.vnexpress.net/news/news/traffic/ho-chi-minh-city-to-pour-270m-into-road-expansion-to-ease-western-gateway-congestion-5039697.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 322, "title": {"ko": "Southern Electric은 Tet을 가난한 사람들에게 제공합니다.", "en": "", "vi": "Điện lực miền Nam mang Tết đến với người nghèo"}, "summary": {"ko": "남부 8개 성 및 도시의 많은 빈곤층, 극빈층 가구 및 정책 가족이 남부전력공사(EVNSPC)로부터 의미 있는 Tet 선물을 받았습니다.", "en": "Many poor, near-poor households, and policy families in 8 southern provinces and cities received meaningful Tet gifts from the Southern Power Corporation (EVNSPC).", "vi": "Nhiều hộ nghèo, cận nghèo, gia đình chính sách ở 8 tỉnh, thành phố phía Nam đón nhận những phần quà Tết nghĩa tình của Tổng công ty Điện lực miền Nam (EVNSPC)."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Tuoi Tre - Tin mới", "date": "2026-02-12", "url": "https://tuoitre.vn/dien-luc-mien-nam-mang-tet-den-voi-nguoi-ngheo-20260212125006527.htm", "plan_id": "", "grade": "", "matched": ""}, {"id": 323, "title": {"ko": "호치민시, 투티엠 지분 양도에 대한 롯데의 승인 검토", "en": "HCMC weighs approval for Lotte to transfer stake in Thu Thiem", "vi": ""}, "summary": {"ko": "호치민시는 투티엠(Thu Thiem)에서 오랫동안 지연된 에코 스마트 시티 프로젝트의 속도를 높이기 위해 롯데가 외부 투자자에게 최대 35%의 지분을 매각하도록 허용하는 것을 고려하고 있습니다. 호치민시, 롯데가 에코 스마트 시티 프로젝트 투티엠 신도시 지역을 호치민시로 발전시키는 데 장애물을 제거할 것을 약속", "en": "Ho Chi Minh City is considering allowing Lotte to sell up minal, third runway at Long Thanh airport", "vi": ""}, "summary": {"ko": "베트남의 하수 처리 프로젝트. 항공 여행 수요가 예상보다 빠르게 증가할 것으로 전망됨에 따라, 베트남은 롱탄 국제공항을 확장해 제3 활주로와 제2 여객 터미널을 추가하는 계획을 추진 중이다.", "en": "Waste Water project in Vietnam. Vietnam is moving ahead with plans to expand Long Thanh International Airport, adding a third runway and a second passenger terminal as air travel demand is set to grow faster than expected.", "vi": "Dự án xử lý nước thải tại Việt Nam. Việt Nam đang triển khai kế hoạch mở rộng Sân bay Quốc tế Long Thành, bao gồm việc xây dựng đường băng thứ ba và nhà ga hành khách thứ hai, do nhu cầu đi lại bằng đường hàng không dự kiến sẽ tăng trưởng nhanh hơn dự kiến."}, "sector": "Transport", "area": "Urban Develop.", "province": "Vietnam", "source": "VnExpress English", "date": "2026-01-15", "url": "https://e.vnexpress.net/news/news/traffic/vietnam-moves-to-build-second-terminal-third-runway-at-long-thanh-airport-5005688.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 347, "title": {"ko": "2호선 지하철 착공, 유럽의 첨단 기술 도입", "en": "", "vi": "Metro số 2 khởi công, lựa chọn công nghệ hiện đại của châu Âu"}, "summary": {"ko": "베트남 하수 처리 프로젝트. 2호선 지하철 착공, 유럽의 첨단 기술 채택", "en": "Wastewater Project in Vietnam. Construction Begins on Metro Line 2, Featuring State-of-the-Art European Technology", "vi": "Waste Water project in Vietnam. Metro số 2 khởi công, lựa chọn công nghệ hiện đại của châu Âu"}, "sector": "Transport", "area": "Urban Develop.", "province": "Vietnam", "source": "nhadautu.vn", "date": "2026-01-15", "url": "https://nhadautu.vn/metro-so-2-khoi-cong-lua-chon-cong-nghe-hien-dai-cua-chau-au-d102330.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 348, "title": {"ko": "컨테이너가 붕앙으로 돌아오다: 맥스타, 새로운 물류 흐름의 시작", "en": "", "vi": "Container trở lại Vũng Áng: Macstar kích hoạt nhịp logistics mới"}, "summary": {"ko": "베트남 폐수 처리 프로젝트. 컨테이너가 붕앙으로 돌아오다: 맥스타, 새로운 물류 흐름 시작", "en": "Wastewater Project in Vietnam. Containers Return to Vung Ang: Macstar Launches a Ne
