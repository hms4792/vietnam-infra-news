<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnam Infrastructure News Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { font-family: 'Noto Sans KR', sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #94A3B8; border-radius: 3px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-highlight {
            0%, 100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); transform: scale(1); }
            50% { box-shadow: 0 0 25px 8px rgba(20, 184, 166, 0.5); transform: scale(1.02); }
        }
        @keyframes speaking { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        .highlight-pulse { animation: pulse-highlight 0.8s ease-in-out infinite; border: 2px solid #14B8A6 !important; }
        .speaking-text { background: #FEF3C7; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .tts-active { animation: speaking 0.5s infinite; }
        .lang-btn.active { background: linear-gradient(135deg, #0F766E, #14B8A6); color: white; }
        .filter-btn.active { background: #0F766E; color: white; }
        .page-btn.active { background: #0F766E; color: white; }
        .sector-env    { background: linear-gradient(135deg, #059669, #10B981); }
        .sector-energy { background: linear-gradient(135deg, #D97706, #F59E0B); }
        .sector-urban  { background: linear-gradient(135deg, #7C3AED, #8B5CF6); }
        .action-btn { transition: all 0.15s; }
        .action-btn:hover { transform: scale(1.15); }
        .news-row:hover { background: rgba(20,184,166,0.04) !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-teal-50/30 min-h-screen">

<!-- ═══ Header ════════════════════════════════════════════════ -->
<header class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 py-2">
        <div class="flex items-center justify-between flex-wrap gap-2">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-gradient-to-br from-teal-600 to-emerald-500 rounded-lg flex items-center justify-center">
                    <i data-lucide="building-2" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-800">Vietnam Infra News</h1>
                    <p class="text-xs text-slate-500" id="header-date"></p>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <!-- ★ v7.2 추가: MI Dashboard 전환 버튼 ★ -->
                <a href="mi_dashboard.html"
                   style="display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;color:#fff;background:linear-gradient(135deg,#0D9488,#059669);text-decoration:none;white-space:nowrap;"
                   title="마스터플랜 MI 대시보드로 이동">
                    <svg style="width:13px;height:13px;flex-shrink:0;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
                    </svg>
                    MI Dashboard
                </a>

                <div class="flex bg-slate-100 rounded-lg p-0.5">
                    <button onclick="setLang('ko')" class="lang-btn active px-2.5 py-1 rounded text-xs font-medium" data-lang="ko">🇰🇷 한국어</button>
                    <button onclick="setLang('en')"  class="lang-btn px-2.5 py-1 rounded text-xs font-medium text-slate-600" data-lang="en">🇺🇸 EN</button>
                    <button onclick="setLang('vi')"  class="lang-btn px-2.5 py-1 rounded text-xs font-medium text-slate-600" data-lang="vi">🇻🇳 VI</button>
                </div>

                <div class="relative">
                    <button onclick="toggleVoice()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg">
                        <i data-lucide="settings" class="w-4 h-4 text-slate-600"></i>
                    </button>
                    <div id="voice-panel" class="hidden absolute right-0 top-full mt-1 w-64 bg-white rounded-lg shadow-xl border p-3 z-50">
                        <p class="text-xs font-semibold mb-2">🎙️ TTS 설정</p>
                        <div class="mb-2">
                            <label class="text-xs text-slate-500">음성 선택</label>
                            <select id="voice-select" class="w-full text-xs p-1.5 border rounded mt-1"><option value="auto">자동 (최적 음성)</option></select>
                        </div>
                        <div>
                            <label class="text-xs text-slate-500">속도: <span id="rate-val">1.0</span>x</label>
                            <input type="range" id="voice-rate" min="0.5" max="2" step="0.1" value="1" class="w-full accent-teal-600">
                        </div>
                        <p id="voice-info" class="text-xs text-teal-600 mt-2"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-4">
    <!-- Tabs -->
    <div class="flex gap-1 bg-white rounded-lg p-1 shadow-sm mb-4 w-fit">
        <button onclick="setTab('dashboard')" id="tab-dash" class="px-4 py-1.5 rounded text-sm font-semibold bg-teal-50 text-teal-700">
            <i data-lucide="layout-dashboard" class="w-4 h-4 inline mr-1"></i>Dashboard
        </button>
        <button onclick="setTab('database')" id="tab-db" class="px-4 py-1.5 rounded text-sm font-medium text-slate-600 hover:bg-slate-50">
            <i data-lucide="database" class="w-4 h-4 inline mr-1"></i>Database
        </button>
    </div>

    <!-- ═══ DASHBOARD TAB ═════════════════════════════════════ -->
    <div id="dash-content">
        <section class="bg-white rounded-xl shadow-lg overflow-hidden mb-4">
            <div class="bg-gradient-to-r from-teal-700 to-emerald-600 px-4 py-2.5">
                <div class="flex items-center justify-between flex-wrap gap-2">
                    <div class="flex items-center gap-2">
                        <i data-lucide="newspaper" class="w-5 h-5 text-white"></i>
                        <span class="text-white font-bold" id="news-title">📰 오늘의 뉴스</span>
                        <span class="text-teal-100 text-sm" id="news-date-info"></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <!-- ★ v7.2 추가: Matched Only 토글 ★ -->
                        <button onclick="toggleMatchedOnly()" id="btn-matched"
                                style="display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75);border:1px solid rgba(255,255,255,0.25);cursor:pointer;"
                                title="플랜 매핑 기사만 보기">
                            📌 <span id="btn-matched-text">Matched</span>
                        </button>
                        <div class="flex bg-white/20 rounded p-0.5">
                            <button onclick="setPeriod('today')" id="btn-today" class="px-3 py-1 rounded text-sm font-semibold bg-white text-teal-700">
                                오늘 <span id="cnt-today" class="text-xs bg-teal-100 px-1.5 rounded-full ml-1">0</span>
                            </button>
                            <button onclick="setPeriod('week')" id="btn-week" class="px-3 py-1 rounded text-sm font-medium text-white/80">
                                금주 <span id="cnt-week" class="text-xs bg-white/20 px-1.5 rounded-full ml-1">0</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-1 px-3 py-1.5 bg-slate-100 text-xs font-semibold text-slate-600 border-b">
                <div class="col-span-2">섹터/분야</div>
                <div class="col-span-2">지역</div>
                <div class="col-span-1">날짜</div>
                <div class="col-span-4">기사제목</div>
                <div class="col-span-1">출처</div>
                <div class="col-span-2 text-center">기능</div>
            </div>
            <div id="news-list" class="max-h-[320px] overflow-y-auto"></div>
            <div class="px-3 py-2 bg-slate-50 border-t flex items-center justify-between">
                <span class="text-xs text-slate-500" id="news-showing"></span>
                <div class="flex gap-1" id="news-pages"></div>
            </div>
        </section>

        <!-- AI Briefing -->
        <section class="mb-4" id="briefing-section">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl p-0.5">
                <div class="bg-white rounded-[10px] p-4">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-lg flex items-center justify-center">
                                <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-800 text-sm">🤖 AI 브리핑</h3>
                                <p class="text-xs text-slate-500" id="briefing-subtitle">KPI 및 차트 분석 요약</p>
                            </div>
                        </div>
                        <button onclick="playBriefing()" id="briefing-btn" class="flex items-center gap-1.5 px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white rounded-lg text-sm font-medium transition">
                            <i data-lucide="play" class="w-4 h-4" id="briefing-icon"></i>
                            <span id="briefing-btn-text">브리핑 듣기</span>
                        </button>
                    </div>
                    <div id="briefing-text" class="bg-slate-50 rounded-lg p-3 text-sm text-slate-700 leading-relaxed mb-2 min-h-[60px]"></div>
                    <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden">
                        <div id="briefing-progress" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-300" style="width:0%"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- KPI -->
        <section class="grid md:grid-cols-2 gap-3 mb-4">
            <div class="kpi-box bg-white rounded-xl p-4 shadow border border-slate-100" id="kpi-sector-box">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="font-semibold text-slate-800 text-sm flex items-center gap-2">
                        <i data-lucide="pie-chart" class="w-4 h-4 text-teal-600"></i>
                        섹터별 현황 <span class="text-xs text-slate-400 font-normal">(상위 3개)</span>
                    </h4>
                    <span class="text-xs text-teal-600 font-bold" id="kpi-total-label">전체 0건</span>
                </div>
                <div id="kpi-sector-list" class="space-y-2"></div>
            </div>
            <div class="kpi-box bg-white rounded-xl p-4 shadow border border-slate-100" id="kpi-region-box">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="font-semibold text-slate-800 text-sm flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-4 h-4 text-teal-600"></i>
                        지역별 현황 <span class="text-xs text-slate-400 font-normal">(상위 3개)</span>
                    </h4>
                </div>
                <div id="kpi-region-list" class="space-y-2"></div>
            </div>
        </section>

        <!-- Charts -->
        <section class="grid md:grid-cols-2 gap-3 mb-4">
            <div class="chart-box bg-white rounded-xl p-4 shadow border border-slate-100" id="chart-sector-pie">
                <h4 class="font-semibold text-slate-800 text-sm mb-3 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="w-4 h-4 text-teal-600"></i>연간 섹터별 분포
                </h4>
                <div style="height:200px;position:relative;"><canvas id="sectorPieChart"></canvas></div>
            </div>
            <div class="chart-box bg-white rounded-xl p-4 shadow border border-slate-100" id="chart-region-pie">
                <h4 class="font-semibold text-slate-800 text-sm mb-3 flex items-center gap-2">
                    <i data-lucide="map" class="w-4 h-4 text-teal-600"></i>연간 지역별 분포
                </h4>
                <div style="height:200px;position:relative;"><canvas id="regionPieChart"></canvas></div>
            </div>
            <div class="chart-box bg-white rounded-xl p-4 shadow border border-slate-100" id="chart-sector-trend">
                <h4 class="font-semibold text-slate-800 text-sm mb-3 flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-4 h-4 text-teal-600"></i>월별 섹터 트렌드
                </h4>
                <div style="height:200px;position:relative;"><canvas id="sectorTrendChart"></canvas></div>
            </div>
            <div class="chart-box bg-white rounded-xl p-4 shadow border border-slate-100" id="chart-region-trend">
                <h4 class="font-semibold text-slate-800 text-sm mb-3 flex items-center gap-2">
                    <i data-lucide="activity" class="w-4 h-4 text-teal-600"></i>월별 지역 트렌드
                </h4>
                <div style="height:200px;position:relative;"><canvas id="regionTrendChart"></canvas></div>
            </div>
        </section>

        <!-- Export -->
        <section class="flex flex-wrap gap-2 mb-4">
            <button onclick="showToast('Word 기능 준비중')" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium flex items-center gap-1">
                <i data-lucide="file-text" class="w-4 h-4"></i>Word
            </button>
            <button onclick="showToast('PPT 기능 준비중')" class="px-3 py-1.5 bg-orange-600 hover:bg-orange-700 text-white rounded-lg text-sm font-medium flex items-center gap-1">
                <i data-lucide="presentation" class="w-4 h-4"></i>PPT
            </button>
            <button onclick="showToast('Email 기능 준비중')" class="px-3 py-1.5 bg-violet-600 hover:bg-violet-700 text-white rounded-lg text-sm font-medium flex items-center gap-1">
                <i data-lucide="mail" class="w-4 h-4"></i>Email
            </button>
        </section>
    </div>

    <!-- ═══ DATABASE TAB ═══════════════════════════════════════ -->
    <div id="db-content" class="hidden">
        <div class="bg-white rounded-xl p-3 shadow border mb-3">
            <div class="flex flex-wrap gap-2 mb-2">
                <span class="text-xs text-slate-500 font-medium self-center">빠른선택:</span>
                <button onclick="quickFilter('today')" class="filter-btn px-2.5 py-1 rounded text-xs border border-slate-200">오늘</button>
                <button onclick="quickFilter('week')"  class="filter-btn px-2.5 py-1 rounded text-xs border border-slate-200">주간</button>
                <button onclick="quickFilter('month')" class="filter-btn px-2.5 py-1 rounded text-xs border border-slate-200">월간</button>
                <button onclick="quickFilter('2025')"  class="filter-btn px-2.5 py-1 rounded text-xs border border-slate-200">2025년</button>
                <button onclick="quickFilter('2024')"  class="filter-btn px-2.5 py-1 rounded text-xs border border-slate-200">2024년</button>
                <button onclick="quickFilter('all')"   class="filter-btn active px-2.5 py-1 rounded text-xs border border-slate-200">전체</button>
                <!-- ★ v7.2 추가: Matched Only 토글 ★ -->
                <button onclick="toggleDBMatched()" id="btn-db-matched"
                        style="padding:4px 11px;border-radius:5px;font-size:11px;font-weight:600;background:#FEF3C7;color:#D97706;border:1.5px solid #F59E0B;cursor:pointer;"
                        title="플랜 매핑 기사만 표시">📌 Matched</button>
            </div>
            <div class="flex flex-wrap items-end gap-2">
                <div class="flex-1 min-w-[100px]">
                    <label class="text-xs text-slate-500">🔍 키워드</label>
                    <input type="text" id="db-keyword" placeholder="검색..." class="w-full mt-0.5 px-2 py-1 text-sm border rounded">
                </div>
                <div>
                    <label class="text-xs text-slate-500">📅 시작일</label>
                    <input type="date" id="db-start" class="mt-0.5 px-2 py-1 text-sm border rounded">
                </div>
                <div>
                    <label class="text-xs text-slate-500">📅 종료일</label>
                    <input type="date" id="db-end" class="mt-0.5 px-2 py-1 text-sm border rounded">
                </div>
                <div class="min-w-[100px]">
                    <label class="text-xs text-slate-500">📂 분야</label>
                    <select id="db-area" class="w-full mt-0.5 px-2 py-1 text-sm border rounded">
                        <option value="all">전체</option>
                        <option value="Environment">🌱 환경</option>
                        <option value="Energy Develop.">⚡ 에너지</option>
                        <option value="Urban Develop.">🏙️ 도시개발</option>
                    </select>
                </div>
                <div class="min-w-[100px]">
                    <label class="text-xs text-slate-500">📍 지역</label>
                    <select id="db-province" class="w-full mt-0.5 px-2 py-1 text-sm border rounded">
                        <option value="all">전체</option>
                    </select>
                </div>
                <button onclick="searchDB()" class="px-3 py-1 bg-teal-600 hover:bg-teal-700 text-white rounded text-sm font-medium flex items-center gap-1">
                    <i data-lucide="search" class="w-3.5 h-3.5"></i>검색
                </button>
                <button onclick="resetDB()" class="px-2.5 py-1 bg-rose-100 hover:bg-rose-200 text-rose-700 rounded text-sm font-medium flex items-center gap-1">
                    <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>초기화
                </button>
                <button onclick="exportExcel()" class="px-2.5 py-1 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-sm font-medium flex items-center gap-1">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/><path d="M8 13h2v4H8zm4-2h2v6h-2zm4 1h2v5h-2z"/></svg>
                    Excel
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow border overflow-hidden">
            <div class="px-3 py-2 bg-slate-50 border-b flex items-center justify-between">
                <span class="text-sm font-semibold">검색결과 <span id="db-count" class="text-teal-600">0건</span></span>
                <select id="db-sort" class="text-xs p-1 border rounded" onchange="sortDB()">
                    <option value="newest">최신순</option>
                    <option value="oldest">오래된순</option>
                </select>
            </div>
            <div class="grid grid-cols-12 gap-1 px-3 py-1.5 bg-slate-100 text-xs font-semibold text-slate-600 border-b">
                <div class="col-span-2">섹터/분야</div>
                <div class="col-span-2">지역</div>
                <div class="col-span-1">날짜</div>
                <div class="col-span-4">기사제목</div>
                <div class="col-span-1">출처</div>
                <div class="col-span-2 text-center">기능</div>
            </div>
            <div id="db-list" class="max-h-[400px] overflow-y-auto"></div>
            <div class="px-3 py-2 bg-slate-50 border-t flex items-center justify-between">
                <span class="text-xs text-slate-500" id="db-showing"></span>
                <div class="flex gap-1" id="db-pages"></div>
            </div>
        </div>
    </div>
</main>

<!-- Modal -->
<div id="modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl flex flex-col" style="animation:slideIn 0.25s ease-out;">
        <div class="bg-gradient-to-r from-teal-700 to-emerald-600 px-4 py-3 flex items-center justify-between">
            <h3 class="text-white font-semibold text-sm flex items-center gap-2">
                <i data-lucide="file-text" class="w-4 h-4"></i>기사 요약
            </h3>
            <button onclick="closeModal()" class="text-white/80 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-4">
            <div class="mb-3">
                <span id="m-badge" class="inline-block px-2 py-0.5 rounded text-xs font-semibold text-white mb-1"></span>
                <span id="m-province" class="inline-block px-2 py-0.5 rounded text-xs bg-slate-200 text-slate-700 mb-1 ml-1"></span>
                <!-- ★ v7.2: plan_id 뱃지 동적 삽입 위치 -->
                <h4 id="m-title" class="text-base font-bold text-slate-800 mt-1"></h4>
                <p id="m-meta" class="text-xs text-slate-500 mt-1"></p>
            </div>
            <div class="flex gap-0.5 bg-slate-100 rounded p-0.5 mb-3">
                <button onclick="setModalLang('ko')" class="modal-lang flex-1 py-1 rounded text-xs font-medium bg-white text-teal-700 shadow-sm" data-lang="ko">🇰🇷 한국어</button>
                <button onclick="setModalLang('en')" class="modal-lang flex-1 py-1 rounded text-xs font-medium text-slate-600" data-lang="en">🇺🇸 EN</button>

 30 and May 1, Hanoi Drainage One-Member Co., Ltd. has implemented synchronous plans to operate the drainage system safely and smoothly, ready to respond to situations of heavy rain and natural disasters.", "vi": "Nhằm bảo đảm môi trường đô thị và phục vụ người dân vui chơi, đi lại thuận lợi trong kỳ nghỉ lễ 30/4 và 1/5, Công ty TNHH một thành viên Thoát nước Hà Nội đã triển khai đồng bộ các phương án vận hành hệ thống thoát nước an toàn, thông suốt, sẵn sàng ứng phó với các tình huống mưa lớn và sự cố phát s"}, "sector": "Water Supply/Drainage", "area": "Environment", "province": "", "source": "Moi truong & Cuoc song", "date": "2026-04-30", "url": "https://moitruong.net.vn/ha-noi-chu-dong-van-hanh-he-thong-thoat-nuoc-phong-ngua-ung-ngap-trong-dip-nghi-le-30-4-1-5-99195.html", "plan_id": "HN-URBAN-INFRA", "grade": "MEDIUM", "matched": ""}, {"id": 19, "title": {"ko": "더운 날씨와 전기 부족은 동남아시아에 동시에 압력을 가합니다.", "en": "", "vi": "Nắng nóng và thiếu điện cùng lúc gây sức ép lên Đông Nam Á"}, "summary": {"ko": "동남아시아가 동시에 극심한 더위와 전력 부족으로 인한 압력에 직면하고 있다. 높은 기온으로 인한 전력 수요 증가가 지역의 전력 공급 능력을 초과하면서 에너지 위기가 심화되고 있는 상황이다.", "en": "Workers in many Southeast Asian countries are dealing with a \"dual crisis\" when the region is simultaneously affected by prolonged heat and the risk of energy shortages in the context of complicated world geopolitics.", "vi": "Người lao động tại nhiều quốc gia Đông Nam Á đang phải ứng phó với một “khủng hoảng kép” khi khu vực cùng lúc chịu tác động của nắng nóng kéo dài và nguy cơ thiếu hụt năng lượng trong bối cảnh địa chính trị thế giới diễn biến phức tạp."}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Moi truong & Cuoc song", "date": "2026-04-30", "url": "https://moitruong.net.vn/nang-nong-va-thieu-dien-cung-luc-gay-suc-ep-len-dong-nam-a-99183.html", "plan_id": "VN-PWR-PDP8", "grade": "MEDIUM", "matched": ""}, {"id": 20, "title": {"ko": "인도-미국 합작 벤처기업 니사르 (NISAR) 가 멕시코시티가 놀라운 속도로 가라앉고 있음을 보여줍니다.", "en": "Joint India-US Ventu /FWD-Group-Reports-Strong-First-Quarter-New-Business-Update-Adding-To-Its-Consistent-Track-Record-Of-Financial-Performance", "plan_id": "", "grade": "MEDIUM", "matched": ""}, {"id": 24, "title": {"ko": "DBS의 1분기 이익은 전망을 능가합니다. 2026년 전망은 크게 변하지 않습니다.", "en": "DBS' Q1 profit beats forecast; keeps 2026 outlook largely unchanged", "vi": ""}, "summary": {"ko": "싱가포르: DBS 그룹은 목요일 (4월 30일) 싱가포르 최대 은행이 자산 관리로 인해 1분기 순이익이 1% 증가한 후 소득에 대한 역풍이 크게 완화될 것으로 예상되는 가운데 2026년 전망은 크게 변하지 않았습니다. \"", "en": "SINGAPORE: DBS Group kept its 2026 outlook largely unchanged, with rate headwinds to income expected to be largely mitigated after Singapore's biggest bank on Thursday (Apr 30) posted a 1 per cent rise in first-quarter net profit as wealth management drove earnings.\"While", "vi": "SINGAPORE: Tập đoàn DBS giữ triển vọng năm 2026 phần lớn không thay đổi, với những trở ngại về lãi suất đối với thu nhập dự kiến sẽ được giảm thiểu phần lớn sau khi ngân hàng lớn nhất của Singapore vào thứ Năm (30/4) công bố mức tăng 1% trong lợi nhuận ròng quý đầu tiên khi quản lý tài sản thúc đẩy thu nhập. \"Trong khi đó, các ngân hàng lớn nhất của Singapore vào thứ Năm (30/4) đã công bố mức tăng 1% trong lợi nhuận ròng quý đầu tiên khi quản lý tài sản thúc đẩy thu nhập.\""}, "sector": "Power", "area": "Energy Develop.", "province": "Bac Ninh", "source": "channelnewsasia", "date": "2026-04-29", "url": "https://www.channelnewsasia.com/business/dbs-q1-profit-beats-forecast-keeps-2026-outlook-largely-unchanged-6090656", "plan_id": "", "grade": "MEDIUM", "matched": ""}, {"id": 25, "title": {"ko": "미국 제국주의에 저항하는 청소년 자원봉사 운동", "en": "Youth Volunteer Movement in resistance against US imperialism", "vi": ""}, "summary": {"ko": "미국 제국주의에 대항하는 저항의 가장 어려운 순간에 청소년 자원봉사단은 희생과 투지의 정신으로 1975년 봄에 국가의 역사적 승리에 지대한 공헌을 했다. 청소년 자원봉사자 - “철의 꽃” 처럼 살기", "en": "During the most challenging moments of the resistance against American imperialism, the Youth Volunteer forces - with their spirit of sacrifice and determination - made a profound contribution to the nation's historic victory in the spring of 1975. Youth volunteers - Living like “iron flowers” Forme", "vi": "Trong những thời khắc thách thức nhất của cuộc kháng chiến chống đế quốc Mỹ, lực lượng Thanh niên xung phong - với tinh thần hy sinh và quyết tâm - đã đóng góp sâu sắc vào chiến thắng lịch sử của dân tộc vào mùa xuân năm 1975. Thanh niên xung phong - Sống như “hoa sắt” Forme"}, "sector": "Power", "area": "Energy Develop.", "province": "Quang Ninh", "source": "vietnamplus", "date": "2026-04-29", "url": "https://en.vietnamplus.vn/youth-volunteer-movement-in-resistance-against-us-imperialism-post318163.vnp", "plan_id": "", "grade": "MEDIUM", "matched": ""}, {"id": 26, "title": {"ko": "동나이, 주요 운송 링크를 위한 43억 달러 계획 발표", "en": "Dong Nai rolls out 4.3 billion USD plan for key transport links", "vi": ""}, "summary": {"ko": "동나이 (Dong Nai) 는 호치민시 동나이 (Dong Nai) 와 중부 및 남서부 지역의 주요 경제 지역 간의 연결성을 강화하기 위해 총 자본이 110조 VND (43억 USD) 를 초과하는 3대 교통 프로젝트를 시행할 예정입니다. 문화에 대한 결의", "en": "Dong Nai will implement three major transport projects with a total capital exceeding 110 trillion VND (4.3 billion USD), aimed at strengthening connectivity between Dong Nai, Ho Chi Minh City, and key economic regions in the Central Highlands, central, and southwestern regions. Resolution on cultur", "vi": "Đồng Nai sẽ thực hiện ba dự án giao thông lớn với tổng số vốn vượt quá 110 nghìn tỷ đồng (4,3 tỷ USD), nhằm tăng cường kết nối giữa Đồng Nai, Thành phố Hồ Chí Minh và các vùng kinh tế trọng điểm ở Tây Nguyên, miền Trung và Tây Nam Bộ."}, "sector": "Transport", "area": "Urban Develop.", "province": "Dong Nai", "source": "vietnamplus", "date": "2026-04-29", "url": "https://en.vietnamplus.vn/dong-nai-rolls-out-43-billion-usd-plan-for-key-transport-links-post341953.vnp", "plan_id": "", "grade": "MEDIUM", "matched": ""}, {"id": 27, "title": {"ko": "호치민시, IUU '옐로카드' 해제 결정적 조치 나서", "en": "Ho Chi Minh City steps up decisive action to lift IUU “yellow card”", "vi": ""}, "summary": {"ko": "시는 eCDT 구현을 빠르게 추적하고, Can Gio의 어항 타당성을 연구하며, 선박 이동에 대한 감독을 강화하기 위해 국경 경비대에 계좌를 부여할 것을 제안할 것입니다. 특히 Lam Dong, Da Nang, Quang Tri 및 Ninh Binh,", "en": "The city will fast-track eCDT implementation, study the feasibility of a fishing port in Can Gio, and propose granting accounts to border guard stations to strengthen oversight of vessel movements. Enhanced inter-provincial coordination, particularly with Lam Dong, Da Nang, Quang Tri and Ninh Binh,", "vi": "Thành phố sẽ đẩy nhanh tiến độ thực hiện eCDT, nghiên cứu tính khả thi của cảng cá Cần Giờ và đề xuất cấp tài khoản cho các đồn biên phòng để tăng cường giám sát việc di chuyển của tàu. Tăng cường phối hợp liên tỉnh, đặc biệt với Lâm Đồng, Đà Nẵng, Quảng Trị và Ninh Bình,"}, "sector": "Power", "area": "Energy Develop.", "province": "Da Nang", "source": "vietnamplus", "date": "2026-04-29", "url": "https://en.vietnamplus.vn/ho-chi-minh-city-steps-up-decisive-action-to-lift-iuu-yellow-card-post342005.vnp", "plan_id": "", "grade": "MEDIUM", "matched": ""}, {"id": 28, "title": {"ko": "호치민시, IUU '옐로카드' 해제 결정적 조치 나서", "en": "Ho Chi Minh City steps up decisive action to lift IUU “yellow card”", "vi": ""}, "summary": {"ko": "시는 eCDT 구현을 빠르게 추적하고, Can Gio의 어항 타당성을 연구하며, 선박 이동에 대한 감독을 강화하기 위해 국경 경비대에 계좌를 부여할 것을 제안할 것입니다.", "en": "The city will fast-track eCDT implementation, study the feasibility of a fishing port in Can Gio, and propose granting accounts to border guard stations to strengthen oversight of vessel movements.", "vi": "Thành phố sẽ đẩy nhanh tiến độ thực hiện eCDT, nghiên cứu tính khả thi của cảng cá Cần Giờ và đề xuất cấp tài khoản cho các đồn biên phòng để tăng cường giám sát việc di chuyển của tàu."}, "sector": "Transport", "area": "Urban Develop.", "province": "", "source": "sggp_org_vn", "date": "2026-04-29", "url": "https://en.sggp.org.vn/ho-chi-minh-city-steps-up-decisive-action-to-lift-iuu-yellow-card-post125874.html", "plan_id": "VN-TRAN-2055", "grade": "MEDIUM", "matched": "Y"}, {"id": 29, "title": {"ko": "아르헨티나 친구가 베트남의 발전 성과에 찬사를 보냅니다.", "en": "Argentine friend lauds Vietnam’s development achievements", "vi": ""}, "summary": {"ko": "60년 이상 베트남을 지원하고 동남아시아 국가를 거의 30회 방문한 슈미트는 특히 복수의 자유 무역 협정 참여를 통해 빈곤 감소, 인프라 개발 및 깊은 국제 통합에 대한 베트남의 성과를 강조했습니다.", "en": "Schmidt, who has supported Vietnam for more than six decades and visited the Southeast Asian nation nearly 30 times, highlighted Vietnam’s achievements in poverty reduction, infrastructure development and deep international integration, particularly through participation in multiple free trade agree", "vi": "Schmidt, người đã hỗ trợ Việt Nam trong hơn sáu thập kỷ và đã đến thăm quốc gia Đông Nam Á gần 30 lần, nhấn mạnh những thành tựu của Việt Nam trong xóa đói giảm nghèo, phát triển cơ sở hạ tầng và hội nhập quốc tế sâu rộng, đặc biệt thông qua việc tham gia nhiều hiệp định thương mại tự do"}, "sector": "Transport", "area": "Urban Develop.", "province": "", "source": "vietnamplus", "date": "2026-04-29", "url": "https://en.vietnamplus.vn/argentine-friend-lauds-vietnams-development-achievements-post342017.vnp", "plan_id": "VN-TRAN-2055", "grade": "MEDIUM", "matched": "Y"}, {"id": 30, "title": {"ko": "Phu 'Tho' 는 2026년 Hu 'ng Kings 기념일 동안 약 650만 명의 방문객에게 서비스를 제공합니다.", "en": "Phú Thọ serves nearly 6.5 million visitors during Hùng Kings Commemoration Day 2026", "vi": ""}, "summary": {"ko": "도 문화체육관광부에 따르면, 올해 축제와 조상의 땅 문화 - 관광주간 2026은 후응왕사 유적지와 주변 지역에 걸쳐 다양한 액티비티를 선보였으며, 주요 도시에서 온 순례자와 관광객을 끌어들였다.", "en": "According to the provincial Department of Culture, Sports and Tourism, this year’s festival and the Ancestral Land Culture - Tourism Week 2026 featured a wide range of activities across the Hùng Kings Temple historical relic site and surrounding areas, drawing pilgrims and tourists from major citie", "vi": "Theo Sở Văn hóa, Thể thao và Du lịch tỉnh, lễ hội năm nay và Tuần lễ Văn hóa - Du lịch Tổ quốc 2026 có nhiều hoạt động trên khắp khu di tích lịch sử Đền thờ Vua Hùng và các khu vực xung quanh lectronic equipment, which", "vi": "Cuối tuần qua, UBND thành phố đã cấp giấy chứng nhận đầu tư cho bốn dự án công nghệ cao tại Khu công nghệ cao Sài Gòn (SHTP), với tổng vốn đăng ký đạt 1,23 tỷ USD. Các dự án này tập trung vào các trung tâm dữ liệu, công nghệ y sinh và thiết bị điện tử thông minh,"}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Binh Duong", "source": "vietnamplus", "date": "2026-04-28", "url": "https://en.vietnamplus.vn/ho-chi-minh-city-sees-surge-in-fdi-for-hi-tech-data-infrastructure-post341869.vnp", "plan_id": "VN-IP-NORTH-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 41, "title": {"ko": "베트남, 최초의 종합 수산 기술 박람회 개최", "en": "Vietnam hosts first comprehensive fisheries tech expo", "vi": ""}, "summary": {"ko": "이 행사는 국내외 조직과 기업이 포획 및 양식에서 물류, 가공 및 유통에 이르기까지 전체 가치 사슬을 연결할 수 있는 플랫폼을 제공하는 어업 부문 전체를 아우르는 최초의 전시회입니다. AC로 예상됩니다.", "en": "The event marks the first exhibition of its kind to cover the entire fisheries sector, providing a platform for domestic and international organisations and businesses to connect across the full value chain, from capture and aquaculture to logistics, processing and distribution. It is expected to ac", "vi": "Sự kiện này đánh dấu triển lãm đầu tiên thuộc loại này bao trùm toàn bộ ngành thủy sản, cung cấp một nền tảng cho các tổ chức và doanh nghiệp trong nước và quốc tế kết nối trên toàn bộ chuỗi giá trị, từ khai thác và nuôi trồng thủy sản đến hậu cần, chế biến và phân phối. Dự kiến sẽ điều chỉnh"}, "sector": "Power", "area": "Energy Develop.", "province": "Da Nang", "source": "vietnamplus", "date": "2026-04-28", "url": "https://en.vietnamplus.vn/vietnam-hosts-first-comprehensive-fisheries-tech-expo-post341901.vnp", "plan_id": "", "grade": "MEDIUM", "matched": ""}, {"id": 42, "title": {"ko": "정부는 잠재력과 이점을 최대한 활용하려는 하이퐁의 노력을 촉진합니다: PM", "en": "Government facilitates Hai Phong’s efforts to fully leverage potential, advantages: PM", "vi": ""}, "summary": {"ko": "르 민 훙 (Le Minh Hung) 총리는 정부는 하이퐁시가 잠재력, 강점 및 지위를 극대화 할 수있는 유리한 조건을 조성 할 것이라고 말했다. 하이퐁은 2026년 말까지 액체화물에 대한 항만 인프라 비용을 면제합니다. 하이퐁은 해안, 인슐러 코뮌을 위한 전문 의료 서비스를 발전시킵니다.", "en": "the Government will create favourable conditions for Hai Phong city to maximise its potential, strengths, and position, said Prime Minister Le Minh Hung. Hai Phong waives port infrastructure fees for liquid cargo through end-2026 Hai Phong advances specialised health care for coastal, insular commun", "vi": "thủ tướng Lê Minh Hùng cho biết, Chính phủ sẽ tạo điều kiện thuận lợi để thành phố Hải Phòng phát huy tối đa tiềm năng, thế mạnh và vị thế của mình. Hải Phòng miễn phí cơ sở hạ tầng cảng đối với hàng hóa lỏng đến cuối năm 2026 Hải Phòng tiến hành chăm sóc sức khỏe chuyên biệt cho cộng đồng ven biển, hải đảo"}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "vietnamplus", "date": "2026-04-28", "url": "https://en.vietnamplus.vn/government-facilitates-hai-phongs-efforts-to-fully-leverage-potential-advantages-pm-post341925.vnp", "plan_id": "", "grade": "MEDIUM", "matched": ""}, {"id": 43, "title": {"ko": "베트남은 보다 강력하고 포괄적이며 실용적이며 효과적인 아세안-EU 협력을 지지합니다.", "en": "Vietnam supports stronger comprehensive, practical, effective ASEAN-EU cooperation", "vi": ""}, "summary": {"ko": "베트남은 아세안과 EU가 공동의 과제를 예방, 관리 및 대응하기 위해 전략적 대화, 상호 이해 및 조정을 강화하는 동시에 새로운 협력 방법과 영역에 대한 의견을 교환할 것을 제안한다. EU, 2027년 이후 아세안과 FTA 잠재적 협상 신호 NA CHAI", "en": "Vietnam proposes ASEAN and the EU strengthen strategic dialogue, mutual understanding, and coordination in preventing, managing and responding to common challenges, while exchanging views on new methods and areas of cooperation. EU signals potential negotiations for FTA with ASEAN after 2027 NA Chai", "vi": "Việt Nam đề xuất ASEAN và EU tăng cường đối thoại chiến lược, hiểu biết lẫn nhau và phối hợp trong việc ngăn chặn, quản lý và ứng phó với các thách thức chung, đồng thời trao đổi quan điểm về các phương pháp và lĩnh vực hợp tác mới. EU báo hiệu các cuộc đàm phán tiềm năng cho FTA với ASEAN sau năm 2027 NA chai"}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "vietnamplus", "date": "2026-04-28", "url": "https://en.vietnamplus.vn/vietnam-supports-stronger-comprehensive-practical-effective-asean-eu-cooperation-post341930.vnp", "plan_id": "", "grade": "MEDIUM", "matched": ""}, {"id": 44, "title": {"ko": "베트남 외국인직접투자이익속도", "en": "Foreign direct investment gains pace in Vietnam", "vi": ""}, "summary": {"ko": "2026년 초부터 베트남으로의 FDI 유입은 규모가 커졌을 뿐만 아니라 첨단 산업, 데이터 및 친환경 제조업으로 빠르게 이동하고 있습니다. 이러한 변화는 글로벌 가치 사슬에서 베트남의 역할을 강화하는 동시에 INCO의 품질을 제고해야 할 시급한 필요성을 불러일으킬 수 있는 기회를 제공합니다.", "en": "Since early 2026, FDI inflows into Vietnam have not only grown in size but are also quickly moving toward high-tech industries, data, and green manufacturing. This shift offers a chance to boost Vietnam’s role in the global value chain, while also creating an urgent need to raise the quality of inco", "vi": "Kể từ đầu năm 2026, dòng vốn FDI vào Việt Nam không chỉ tăng trưởng về quy mô mà còn nhanh chóng chuyển sang các ngành công nghiệp công nghệ cao, dữ liệu và sản xuất xanh. Sự thay đổi này mang đến cơ hội thúc đẩy vai trò của Việt Nam trong chuỗi giá trị toàn cầu, đồng thời tạo ra nhu cầu cấp thiết để nâng cao chất lượng của tổ chức"}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "", "source": "vietnamplus", "date": "2026-04-28", "url": "https://longform.vietnamplus.vn/foreign-direct-investment-gains-pace-in-vietnam-1233.html", "plan_id": "VN-IP-NORTH-2030", "grade": "MEDIUM", "matched": ""}, {"id": 45, "title": {"ko": "4월 28일 ☕ 오후 브리핑", "en": "☕ Afternoon briefing on April 28", "vi": ""}, "summary": {"ko": "다음은 베트남 통신사가 보도한 당일 행사에 대한 간략한 리뷰입니다. 4월 24일 ☕ ☕ 오후 브리핑 4월 23일 ☕ 오후 브리핑 4월 22일 오후 브리핑", "en": "The following is a brief review of the day’s events as reported by the Vietnam News Agency. ☕ Afternoon briefing on April 24 ☕ Afternoon briefing on April 23 ☕ Afternoon briefing on April 22", "vi": "Sau đây là đánh giá ngắn gọn "id": 161, "title": {"ko": "2026년 1분기 베트남에 등록된 외국인 직접투자(FDI) 총액은 42.9% 증가했다", "en": "", "vi": "Tổng vốn FDI đăng ký vào Việt Nam tăng 42,9% trong quý 1 năm 2026"}, "summary": {"ko": "2026년 1분기, 외국인 투자자의 신규 등록 자본금, 조정 등록 자본금 및 출자·주식 매입액은 152억 달러를 기록하여 전년 동기 대비 42.9% 증가했다. 푸토성은 2026년 2월까지 10억 달러 이상의 외국인 직접투자(FDI) 유치 목표를 세웠으며, 베트남 내 FDI 실행액은 8.8% 증가했다. 투자", "en": "Trong quý 1 năm 2026, vốn đăng ký cấp mới, vốn đăng ký điều chỉnh và giá trị góp vốn, mua cổ phần của nhà đầu tư nước ngoài đạt 15,20 tỷ USD, tăng 42,9% so với cùng kỳ năm trước. Tỉnh Phú Thọ phấn đấu thu hút trên hơn 1 tỷ USD vốn FDI 2 tháng năm 2026, vốn FDI thực hiện tại Việt Nam tăng 8,8% Đầu tư công và vốn FDI thực hiện trong hai tháng đầu năm tăng trưởng mạnh", "vi": "Trong quý 1 năm 2026, vốn đăng ký cấp mới, vốn đăng ký điều chỉnh và giá trị góp vốn, mua cổ phần của nhà đầu tư nước ngoài đạt 15,20 tỷ USD, tăng 42,9% so với cùng kỳ năm trước. Tỉnh Phú Thọ phấn đấu thu hút trên hơn 1 tỷ USD vốn FDI 2 tháng năm 2026, vốn FDI thực hiện tại Việt Nam tăng 8,8% Đầu tư công và vốn FDI thực hiện trong hai tháng đầu năm tăng trưởng mạnh"}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Phu Tho", "source": "VietnamPlus - Kinh te", "date": "2026-04-10", "url": "https://www.vietnamplus.vn/tong-von-fdi-dang-ky-vao-viet-nam-tang-429-trong-quy-1-nam-2026-post1104144.vnp", "plan_id": "VN-IP-NORTH-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 162, "title": {"ko": "칸호아성, 57조 동이 넘는 카나 LNG 화력발전소 프로젝트 착수", "en": "Khanh Hoa is implementing the Ca Na LNG Thermal Power Plant project, valued at over 57 trillion dong", "vi": ""}, "summary": {"ko": "4월 10일, 칸호아성 인민위원회와 중남(Trung Nam) 그룹-사이로스 리버(Sideros River) 컨소시엄은 총 투자액 57조 동이 넘는 1,500MW급 카나(Cà Ná) LNG 화력발전소 프로젝트의 투자·사업 계약 체결식을 개최했다.", "en": "On April 10, the People’s Committee of Khanh Hoa Province and the consortium of Trung Nam Group and Sideros River held a signing ceremony for the investment and operation contract of the 1,500-MW Ca Na LNG Thermal 생시켜 환경과 주민들의 생활에 영향을 미치고 있다. 성 인민위원회는 해당 지방 당국에 오염이 장기화되지 않도록 신속하고 철저하게 대처할 것을 지시했다.", "en": "A fire at a landfill in Quang Ninh Commune, Quang Tri Province, has been burning for several days, releasing toxic smoke that has affected the environment and the daily lives of local residents. The Provincial People’s Committee has instructed local authorities to take urgent and thorough measures to resolve the issue and prevent the pollution from persisting.", "vi": "Đám cháy tại bãi rác trên địa bàn xã Quảng Ninh, tỉnh Quảng Trị kéo dài nhiều ngày, phát tán khói độc ảnh hưởng môi trường và đời sống người dân. UBND tỉnh đã yêu cầu địa phương khẩn trương xử lý triệt để, không để ô nhiễm kéo dài."}, "sector": "Solid Waste", "area": "Environment", "province": "Quang Ninh", "source": "Moi truong & Cuoc song", "date": "2026-04-09", "url": "https://moitruong.net.vn/quang-tri-xu-ly-triet-de-vu-chay-bai-rac-keo-dai-gay-o-nhiem-nghiem-trong-98762.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 168, "title": {"ko": "롱탄 공항 연결 도로 프로젝트의 공사 진척을 가속화하다", "en": "Accelerate the progress of road projects connecting Long Thành Airport", "vi": ""}, "summary": {"ko": "동나이성 인민위원회 지도부는 주요 교통 프로젝트, 특히 롱탄 공항과 연결되는 도로들의 공사 속도를 높이고 진척을 앞당길 것을 지시했다. [사진] 롱탄 공항을 연결하는 10차선 도로의 모습 롱탄 공항 연결 도로 두 곳의 추가 지연을 허용하지 않겠다", "en": "Leaders of the Dong Nai Provincial People’s Committee have called for accelerated construction and faster progress on key transportation projects, particularly the roads connecting to Long Thanh Airport. [Photo] A close-up view of the 10-lane road connecting to Long Thanh Airport. No further delays are to be allowed on the two roads connecting to Long Thanh Airport.", "vi": "Lãnh đạo Ủy ban nhân dân tỉnh Đồng Nai yêu cầu tăng tốc thi công, đẩy nhanh tiến độ các dự án giao thông trọng điểm, đặc biệt là các tuyến đường kết nối với sân bay Long Thành . [Ảnh] Cận cảnh đường 10 làn xe kết nối sân bay Long Thành Không để tiếp tục chậm trễ hai đường kết nối sân bay Long Thành Cần sớm hoàn thành các đường giao thông kết nối sân bay Long Thành Triển khai tuyến metro kết nối với sân bay Long Thành"}, "sector": "Transport", "area": "Urban Develop.", "province": "Dong Nai", "source": "Nhan Dan - Kinh te", "date": "2026-04-09", "url": "https://nhandan.vn/day-nhanh-tien-do-cac-du-an-duong-ket-noi-san-bay-long-thanh-post954344.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 169, "title": {"ko": "푸옌 산업단지 착공, 기술 투자 유치", "en": "", "vi": "Khởi công Dự án Khu công nghiệp Phúc Yên, thu hút vốn đầu tư công nghệ"}, "summary": {"ko": "푸옌 산업단지 건설 투자 프로젝트는 푸토성에 특히 첨단 기술 및 전자 분야 기업들을 중심으로 많은 양질의 투자를 유치할 것으로 기대된다. 호치민시: 2026년 1분기 산업단지가 7억 7,200만 달러 이상의 투자를 유치했다. 타이닌성은 발전을 통해 새로운 경쟁 우위를 창출하고 있다.", "en": "Dự án đầu tư xây dựng Khu công nghiệp Phúc Yên được kỳ vọng thu hút nhiều nguồn đầu tư chất lượng cao, đặc biệt từ các doanh nghiệp trong lĩnh vực công nghệ cao và điện tử cho tỉnh Phú Thọ. TP Hồ Chí Minh: Khu công nghiệp thu hút hơn 772 triệu USD trong quý 1/2026 Tây Ninh tạo lợi thế mới từ phát triển khu công nghiệp gắn với logistics Đẩy nhanh tiến độ bồi thường, hỗ trợ tái định cư các dự án khu công nghiệp", "vi": "Dự án đầu tư xây dựng Khu công nghiệp Phúc Yên được kỳ vọng thu hút nhiều nguồn đầu tư chất lượng cao, đặc biệt từ các doanh nghiệp trong lĩnh vực công nghệ cao và điện tử cho tỉnh Phú Thọ. TP Hồ Chí Minh: Khu công nghiệp thu hút hơn 772 triệu USD trong quý 1/2026 Tây Ninh tạo lợi thế mới từ phát triển khu công nghiệp gắn với logistics Đẩy nhanh tiến độ bồi thường, hỗ trợ tái định cư các dự án khu công nghiệp"}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Ho Chi Minh City", "source": "VietnamPlus - Kinh te", "date": "2026-04-09", "url": "https://www.vietnamplus.vn/khoi-cong-du-an-khu-cong-nghiep-phuc-yen-thu-hut-von-dau-tu-cong-nghe-post1103890.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 170, "title": {"ko": "EVN, 전력망 내 BESS 구축 추진", "en": "", "vi": "EVN thúc đẩy triển khai BESS trên lưới điện"}, "summary": {"ko": "베트남 전력공사(EVN)의 경영진은 배터리 에너지 저장 시스템(BESS)이 전력 시스템의 운영 및 발전에 있어 중요한 해결책 중 하나라고 밝혔다. EVN은 관련 기관들과 협력하여 산업통상자원부에 제도 및 정책상의 걸림돌을 해소해 줄 것을 요청함으로써 BESS를 대대적으로 도입할 계획이다.", "en": "Lãnh đạo Tập đoàn Điện lực Việt Nam (EVN) cho biết Hệ thống Pin lưu trữ (BESS) là một trong những giải pháp quan trọng trong vận hành và phát triển hệ thống điện. EVN sẽ phối hợp với các đơn vị liên quan kiến nghị Bộ Công thương tháo gỡ vướng mắc về cơ chế, chính sách để triển khai BESS trên diện rộng.", "vi": "Lãnh đạo Tập đoàn Điện lực Việt Nam (EVN) cho biết Hệ thống Pin lưu trữ (BESS) là một trong những giải pháp quan trọng trong vận hành và phát triển hệ thống điện. EVN sẽ phối hợp với các đơn vị liên quan kiến nghị Bộ Công thương tháo gỡ vướng mắc về cơ chế, chính sách để triển khai BESS trên diện rộng."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Thanh Nien - Kinh te", "date": "2026-04-09", "url": "https://thanhnien.vn/evn-thuc-day-trien-khai-bess-tren-luoi-dien-185260408155517092.htm", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-GRID", "grade": "", "matched": ""}, {"id": 171, "title": {"ko": "2026년 4월 말에 랑손에서 카마우까지 이어지는 북남 고속도로가 개통될 예정이다", "en": "The North-South Expressway from Lang Son to Ca Mau is scheduled to open at the end of April 2026", "vi": ""}, "summary": {"ko": "2026년 4월 말 개통 예정인 중부 지역을 통과하는 북남 고속도로의 4개 구간이 완공되면, 치랑(랑선)에서 카마우까지 이어지는 고속도로 노선이 완성될 것이다.", "en": "Four sections of the North-South Expressway passing through Central Vietnam, scheduled to open at the end of April 2026, will complete the expressway route from Chi Lăng (Lang Son) to Ca Mau.", "vi": "4 dự án thành phần đường cao tốc Bắc - Nam qua miền Trung được đưa vào khai thác cuối tháng 4-2026 sẽ nối thông tuyến cao tốc này từ Chi Lăng (Lạng Sơn) đến Cà Mau."}, "sector": "Power", "area": "Energy Develop.", "province": "Lang Son", "source": "Tuoi Tre News", "date": "2026-04-09", "url": "https://tuoitre.vn/cuoi-thang-4-2026-se-thong-duong-cao-toc-bac-nam-tu-lang-son-den-ca-mau-20260409173220773.htm", "plan_id": "VN-TRAN-2055", "grade": "MEDIUM", "matched": "Y"}, {"id": 172, "title": {"ko": "베트남 경제는 성장세를 이어가고 있으며, 외국인 직접 투자(FDI)는 여전히 긍정적인 요인으로 작용하고 있다", "en": "", "vi": "Kinh tế Việt Nam duy trì đà tăng trưởng, FDI tiếp tục là điểm sáng"}, "summary": {"ko": "4월 9일, 호치민시에서 호치민시 무역투자진흥센터(ITPC)는 UOB 베트남 은행과 공동으로 “2026년 세계 및 지역 경제 전망: 기회 극대화 및 위험 파악”을 주제로 기업 원탁 회의를 개최했다.", "en": "Ngày 9-4, tại TPHCM, Trung tâm Xúc tiến Thương mại và Đầu tư TPHCM (ITPC) phối hợp Ngân hàng UOB Việt Nam tổ chức bàn tròn doanh nghiệp với chủ đề “Triển vọng kinh tế toàn cầu và khu vực 2026: Tối ưu cơ hội và nhận diện rủi ro”.", "vi": "Ngày 9-4, tại TPHCM, Trung tâm Xúc tiến Thương mại và Đầu tư TPHCM (ITPC) phối hợp Ngân hàng UOB Việt Nam tổ chức bàn tròn doanh nghiệp với chủ đề “Triển vọng kinh tế toàn cầu và khu vực 2026: Tối ưu cơ hội và nhận diện rủi ro”."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Vietnam", "source": "SGGP", "date": "2026-04-09", "url": "https://www.sggp.org.vn/kinh-te-viet-nam-duy-tri-da-tang-truong-fdi-tiep-tuc-la-diem-sang-post847130.html", "plan_id": "VN-IP-NORTH-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 173, "title": {"ko": "호치민시에서 애국적 경쟁 운동이 획기적인 발전을 이끌고 있다", "en": "Patriotic emulation movements catalyze breakthroughs in HCMC", "vi": ""}, "summary": {"ko": "호치민시의 2025년 모범 운동은 지역사회의 참여를 성공적으로 이끌어 디지털 전환과 의료 혁신을 가속화함으로써, 공공 서비스의 효율성을 크게 높이고 시민들의 전반적인 삶의 질을 향상시켰습니다.", "en": "HCMC’s 2025 emulation movements successfully mobilized community participation to accelerate digital transformation and medical innovation, significantly enhancing public service efficiency and citizens’ overall quality of life.", "vi": "Các phong trào thi đua năm 2025 của TP.HCM đã huy động thành công sự tham gia của cộng đồng nhằm đẩy nhanh quá trình chuyển đổi số và đổi mới y tế, từ đó nâng cao đáng kể hiệu quả của các dịch vụ công và chất lượng cuộc sống tổng thể của người dân."}, "sector": "Power", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "SGGP News English", "date": "2026-04-09", "url": "https://en.sggp.org.vn/patriotic-emulation-movements-catalyze-breakthroughs-in-hcmc-post125281.html", "plan_id": "VN-SC-2030", "grade": "LOW", "matched": "Y"}, {"id": 893, "title": {"ko": "Thanh Nien - Kinh te", "en": "EVN thúc đẩy triển khai BESS trên lưới điện", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2026-04-09", "url": "https://thanhnien.vn/evn-thuc-day-trien-khai-bess-tren-", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-GRID", "grade": "", "matched": "Y"}, {"id": 174, "title": {"ko": "PV GAS, 티바이 LNG 터미널 처리 능력 확대", "en": "PV GAS increases capacity of Thi Vai LNG terminal", "vi": ""}, "summary": {"ko": "페트로베트남 가스(PV GAS)는 4월 7일, 자사의 물류 자회사가 티바이(Thi Vai) 액화천연가스(LNG) 터미널의 재기화 용량을 확대하기 위한 시험 가동을 성공적으로 마쳤다고 발표했다.", "en": "Petrovietnam Gas PV GAS on April 7 announced that its logistics subsidiary has successfully completed a trial run to increase regasification capacity of its Thi Vai liquefied natural gas LNG terminal", "vi": "Ngày 7 tháng 4, Petrovietnam Gas (PV GAS) thông báo rằng công ty con chuyên về hậu cần của họ đã hoàn tất thành công đợt chạy thử nhằm nâng cao công suất tái hóa khí tại cảng khí tự nhiên hóa lỏng (LNG) Thi Vai."}, "sector": "Power", "area": "Energy Develop.", "province": "Ba Ria - Vung Tau", "source": "NewsData/Waste Water", "date": "2026-04-08", "url": "https://vir.com.vn/pv-gas-increases-capacity-of-thi-vai-lng-terminal-150173.html", "plan_id": "VN-PWR-PDP8-LNG", "grade": "HIGH", "matched": "Y"}, {"id": 175, "title": {"ko": "PVOIL과 BSR, 가치 사슬 강화 및 바이오연료 개발 촉진", "en": "PVOIL BSR strengthen value chain and promote biofuel development", "vi": ""}, "summary": {"ko": "4월 6일 다낭에서 페트로베트남 석유공사(PVOIL)와 빈손 정유·석유화학 주식회사(BSR)는 2026년 1분기 석유 제품 공급 계약 이행 현황을 점검하고, 공급 안정화 및 가치 사슬 통합 강화를 위한 방안을 논의하기 위해 공동 회의를 개최했다.", "en": "On April 6 in Da Nang PetroVietnam Oil Corporation PVOIL and Binh Son Refining and Petrochemical Joint Stock Company BSR jointly held a conference to review the implementation of the petroleum product offtake contract in Q1 2026 while discussing solutions to stabilize supply enhance value chain integration and accelerate biofuel development contributing to national energy security", "vi": "Ngày 6 tháng 4 tại Đà Nẵng, Tổng công ty Dầu khí Việt Nam (PVOIL) và Công ty Cổ phần Lọc hóa dầu Bình Sơn (BSR) đã phối hợp tổ chức hội nghị để rà soát việc thực hiện hợp đồng mua bán sản phẩm dầu khí trong quý 1 năm 2026, đồng thời thảo luận các giải pháp nhằm ổn định nguồn cung và nâng cao giá trị chuỗi giá trị."}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Da Nang", "source": "NewsData/Da Nang", "date": "2026-04-08", "url": "https://petrovietnam.petrotimes.vn/pvoil-bsr-strengthen-value-chain-and-promote-biofuel-development-739622.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 176, "title": {"ko": "LNG 27,000톤을 인수", "en": "", "vi": "Tiếp nhận 27.000 tấn khí hóa lỏng LNG"}, "summary": {"ko": "4월 8일, 베트남 가스공사(PV Gas)는 에너지 시장의 급격한 변동 속에서 생산 및 발전용 가스 공급을 확보하기 위해 27,000톤의 액화천연가스(LNG)를 실은 선박을 인수했다. PV Gas는 주요 발전 단지를 위한 LNG 공급망을 확대하고 있으며, PV Gas는 이를 위해", "en": "Ngày 8/4, Tổng công ty Khí Việt Nam - PV Gas - đã tiếp nhận tàu chở 27.000 tấn khí hóa lỏng LNG để bảo đảm nguồn khí cung cấp cho sản xuất và phát điện trong bối cảnh thị trường năng lượng có nhiều biến động. PV GAS mở rộng chuỗi cung ứng LNG cho các trung tâm điện lực trọng điểm PV GAS triển khai đồng bộ giải pháp ổn định nguồn cung khí trong nước Tàu chở 63.000 tấn LNG cập cảng Thị Vải, Thành phố Hồ Chí Minh an toàn", "vi": "Ngày 8/4, Tổng công ty Khí Việt Nam - PV Gas - đã tiếp nhận tàu chở 27.000 tấn khí hóa lỏng LNG để bảo đảm nguồn khí cung cấp cho sản xuất và phát điện trong bối cảnh thị trường năng lượng có nhiều biến động. PV GAS mở rộng chuỗi cung ứng LNG cho các trung tâm điện lực trọng điểm PV GAS triển khai đồng bộ giải pháp ổn định nguồn cung khí trong nước Tàu chở 63.000 tấn LNG cập cảng Thị Vải, Thành phố Hồ Chí Minh an toàn"}, "sector": "Power", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "Nhan Dan - Kinh te", "date": "2026-04-08", "url": "https://nhandan.vn/tiep-nhan-27000-tan-khi-hoa-long-lng-post954123.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 177, "title": {"ko": "베트남에서 건조한 최신형 해상 풍력 발전 지원선이 진수되었다", "en": "Launching of a modern offshore wind service vessel newly built by Vietnamese shipbuilders", "vi": ""}, "summary": {"ko": "베트남 엔지니어와 노동자들이 현대적인 기술을 활용해 새로 건조한 해상 풍력 발전 지원선은 제조 및 운영 과정에서 높은 수준의 안정성, 안전성, 정밀성을 요구합니다. 조선업계는 일감이 넘쳐나지만, 여전히 구조조정 이후의 ‘모습’을 기다리고 있습니다. 정부는 이 산업을 위한 발전 전략을 마련해야 합니다.", "en": "Offshore wind power service vessels are newly built by a team of Vietnamese engineers and workers using modern technology, with high standards for stability, safety, and precision in both construction and operation. The shipbuilding industry is swamped with work but is still waiting to see what shape it will take after the restructuring; the government needs a development strategy for the sector.", "vi": "Tàu dịch vụ điện gió ngoài khơi do đội ngũ kỹ sư, người lao động Việt Nam đóng mới với công nghệ hiện đại, yêu cầu cao về độ ổn định, an toàn và độ chính xác trong chế tạo và vận hành. Ngành đóng tàu làm không hết việc, vẫn ngóng “hình hài” hậu tái cơ cấu Nhà nước cần có chiến lược phát triển ngành công nghiệp đóng tàu Xoay xở “thoát xác,” kiên cường đón cơ hội phát triển mới"}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamPlus - Giao thong", "date": "2026-04-08", "url": "https://www.vietnamplus.vn/ha-thuy-tau-dich-vu-dien-gio-ngoai-khoi-hien-dai-do-nguoi-viet-dong-moi-post1103751.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 178, "title": {"ko": "하이퐁, 환경 모니터링 점검 강화", "en": "", "vi": "Hải Phòng siết chặt kiểm tra quan trắc môi trường"}, "summary": {"ko": "데이터 조작이나 변조 위험에 대비해 하이퐁시는 오염 위험이 높은 시설의 자동 폐수 및 배기가스 측정 시스템을 전면적으로 점검할 것을 요구했다. 위반 사항, 특히 데이터 조작 행위가 적발될 경우 엄중히 처벌하고 관련 서류를 경찰 당국에 이관할 예정이다.", "en": "Trước nguy cơ can thiệp, làm sai lệch dữ liệu quan trắc, Hải Phòng yêu cầu rà soát toàn diện các hệ thống nước thải, khí thải tự động tại cơ sở có nguy cơ ô nhiễm cao. Trường hợp phát hiện vi phạm, đặc biệt là hành vi gian lận dữ liệu, sẽ bị xử lý nghiêm và chuyển hồ sơ sang cơ quan công an.", "vi": "Trước nguy cơ can thiệp, làm sai lệch dữ liệu quan trắc, Hải Phòng yêu cầu rà soát toàn diện các hệ thống nước thải, khí thải tự động tại cơ sở có nguy cơ ô nhiễm cao. Trường hợp phát hiện vi phạm, đặc biệt là hành vi gian lận dữ liệu, sẽ bị xử lý nghiêm và chuyển hồ sơ sang cơ quan công an."}, "sector": "Power", "area": "Energy Develop.", "province": "Hai Phong", "source": "Moi truong & Cuoc song", "date": "2026-04-08", "url": "https://moitruong.net.vn/hai-phong-siet-chat-kiem-tra-quan-trac-moi-truong-97740.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 179, "title": {"ko": "닌투안 1호 원자력 발전소 건설 사업을 위한 묘지 이전 보상", "en": "Compensation for the relocation of graves in connection with the Ninh Thuan 1 Nuclear Power Plant project", "vi": ""}, "summary": {"ko": "닌투안 1호 원자력 발전소 프로젝트 시행을 위해 이전해야 할 묘지는 총 566기이며, 묘지당 보상 및 지원금은 1,100만~2,400만 동이다. 칸호아: 토지 수용 시 보상, 지원 및 재정착에 관한 새로운 규정 제정; 칸호아: 주민 이주 및 재정착 프로젝트 착수", "en": "The total number of graves that need to be relocated to make way for the project at the Ninh Thuan 1 Nuclear Power Plant is 566, with compensation and support ranging from 11 to 24 million VND per grave. Can Tho issues new regulations on compensation, support, and resettlement for land acquisition Khanh Hoa: Resettlement project launched", "vi": "Tổng số ngôi mộ cần di dời để thực hiện dự án tại Nhà máy điện hạt nhân Ninh Thuận 1 là 566 ngôi mộ, với mức bồi thường, hỗ trợ đối với mỗi ngôi mộ từ 11 đến 24 triệu đồng. Cần Thơ ban hành quy định mới về bồi thường, hỗ trợ, tái định cư khi thu hồi đất Khánh Hòa: Khởi động dự án di dân tái định cư Nhà máy điện hạt nhân Ninh Thuận 1 Thủ tướng: 'Làm ngày không đủ, tranh thủ làm đêm' để thúc đẩy dự án nhà máy điện hạt nhân"}, "sector": "Power", "area": "Energy Develop.", "province": "Can Tho", "source": "VietnamPlus - Kinh te", "date": "2026-04-08", "url": "https://www.vietnamplus.vn/boi-thuong-di-doi-ngoi-mo-phuc-vu-du-an-nha-may-dien-hat-nhan-ninh-thuan-1-post1103660.vnp", "plan_id": "VN-PWR-PDP8", "grade": "MEDIUM", "matched": "Y"}, {"id": 180, "title": {"ko": "하이퐁: 수천 가구가 생활용수 수질에 대해 우려하고 있다", "en": "Hải Phòng: Hàng nghìn hộ dân lo lắng về chất lượng nước sinh hoạt", "vi": "Hải Phòng: Hàng nghìn hộ dân lo lắng về chất lượng nước sinh hoạt"}, "summary": {"ko": "빈틴(Vĩnh Thịnh) 면의 수천 가구가 둥티엔 2(Dũng Tiến 2) 정수장에서 공급되는 생활용수가 위생 기준을 충족하지 못하고, 물이 탁하며, 필터에 진흙이 낀 것처럼 더럽다고 불만을 토로했다. 칸토(Cần Thơ) 연안 지역 주민들은 깨끗한 물을 갈망하며, 밤새 물 한 방울을 기다리며 지새우고 있다. 농촌의 깨끗한 물: 현재 약 68%의 주민만이", "en": "Hàng nghìn hộ dân tại xã Vĩnh Thịnh bày tỏ bức xúc khi nước sinh hoạt do Nhà máy nước Dũng Tiến 2 cung cấp, không đảm bảo vệ sinh, nước vẩn đục, cục lọc bẩn như bám bùn nhão. Người dân vùng ven biển Cần Thơ \"khát\" nước sạch, thức đêm canh từng giọt nước Nước sạch nông thôn: Mới có khoảng 68% người dân được sử dụng nước đạt chuẩn TP Hồ Chí Minh: Tiếp tục duy trì thực hiện 100% hộ dân được cung cấp nước sạch", "vi": "Hàng nghìn hộ dân tại xã Vĩnh Thịnh bày tỏ bức xúc khi nước sinh hoạt do Nhà máy nước Dũng Tiến 2 cung cấp, không đảm bảo vệ sinh, nước vẩn đục, cục lọc bẩn như bám bùn nhão. Người dân vùng ven biển Cần Thơ \"khát\" nước sạch, thức đêm canh từng giọt nước Nước sạch nông thôn: Mới có khoảng 68% người dân được sử dụng nước đạt chuẩn TP Hồ Chí Minh: Tiếp tục duy trì thực hiện 100% hộ dân được cung cấp nước sạch"}, "sector": "Power", "area": "Energy Develop.", "province": "Ho Chi Minh City", "source": "VietnamPlus - Moi truong", "date": "2026-04-08", "url": "https://www.vietnamplus.vn/hai-phong-hang-nghin-ho-dan-lo-lang-ve-chat-luong-nuoc-sinh-hoat-post1103643.vnp", "plan_id": "", "grade": "MEDIUM", " next-generation-fdi-post340620.vnp", "plan_id": "VN-IP-NORTH-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 188, "title": {"ko": "건기 전력 수요 급증에 대응하기 위해 티바이 LNG 발전소 발전 용량 증설", "en": "Increasing the capacity of the Thi Vai LNG plant to meet peak electricity demand during the dry season", "vi": ""}, "summary": {"ko": "베트남 가스공사(PV Gas)의 발표에 따르면, 티바이 LNG 저장소의 재기화 용량을 시간당 288톤으로 증설하는 작업을 완료했다고 한다.", "en": "According to information from Vietnam Gas Corporation (PV Gas), the company has recently completed the expansion of the regasification capacity at the Thi Vai LNG terminal to 288 tons per hour.", "vi": "Thông tin từ Tổng công ty Khí Việt Nam (PV Gas) cho hay vừa hoàn thành nâng công suất tái hóa kho LNG Thị Vải lên mức 288 tấn/giờ."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Tuoi Tre - Kinh doanh", "date": "2026-04-07", "url": "https://tuoitre.vn/nang-cong-suat-khi-lng-thi-vai-dap-ung-nhu-cau-cao-diem-dien-mua-kho-20260407182959902.htm", "plan_id": "VN-PWR-PDP8-LNG", "grade": "MEDIUM", "matched": "Y"}, {"id": 189, "title": {"ko": "하노이의 아침 기온이 38도까지 오를 전망, EVN이 중요 공지 발표", "en": "", "vi": "Hà Nội nắng nóng sớm có khi vượt 38 độ C, EVN phát đi thông báo quan trọng"}, "summary": {"ko": "(Dân trí) - 폭염이 일찍 찾아와 기온이 여러 차례 38도 이상으로 치솟으면서 하노이의 전력 수요가 급증할 우려가 있다. EVN은 시민들에게 전력을 절약하고, 피크 시간대에는 고전력 기기 사용을 자제할 것을 당부했다.", "en": "(Dân trí) - Nắng nóng đến sớm, nhiều thời điểm vượt 38 độ C khiến nhu cầu điện tại Hà Nội có nguy cơ tăng mạnh. EVN khuyến cáo người dân tiết kiệm điện, hạn chế dùng thiết bị công suất lớn giờ cao điểm.", "vi": "(Dân trí) - Nắng nóng đến sớm, nhiều thời điểm vượt 38 độ C khiến nhu cầu điện tại Hà Nội có nguy cơ tăng mạnh. EVN khuyến cáo người dân tiết kiệm điện, hạn chế dùng thiết bị công suất lớn giờ cao điểm."}, "sector": "Power", "area": "Energy Develop.", "province": "Hanoi", "source": "Dan Tri - Kinh doanh", "date": "2026-04-07", "url": "https://dantri.com.vn/kinh-doanh/ha-noi-nang-nong-som-co-khi-vuot-38-do-c-evn c giải pháp toàn diện nhằm đảm bảo hệ thống lưới điện vận hành an toàn, liên tục và ổn định, góp phần duy trì"}, "sector": "Power", "area": "Energy Develop.", "province": "Central Region", "source": "Nhan Dan English", "date": "2026-04-07", "url": "https://en.nhandan.vn/ensuring-stable-and-safe-operation-of-transmission-grid-during-peak-dry-season-post160819.html", "plan_id": "VN-PWR-PDP8", "grade": "LOW", "matched": "Y"}, {"id": 192, "title": {"ko": "호치민시에서 들려온 반가운 소식: 외국인 직접투자(FDI) 220% 증가, 틱톡과 대형 기업들이 잇달아 투자", "en": "", "vi": "Tin vui từ TP.HCM: FDI tăng trưởng 220%, TikTok và các tập đoàn lớn dồn dập rót vốn"}, "summary": {"ko": "2026년 1분기 호치민시 경제는 8.27% 성장하며 지난 5년 동안 가장 높은 성장률을 기록했는데, 특히 외국인 직접투자(FDI)가 220% 증가했고 틱톡(TikTok)을 비롯한 여러 국제 기업들의 대규모 프로젝트가 추진된 점이 두드러졌다.", "en": "Kinh tế TP.HCM quý I/2026 tăng trưởng 8,27%, mức cao nhất trong 5 năm qua với điểm nhấn là vốn FDI tăng 220% cùng sự hiện diện của các dự án lớn từ TikTok và nhiều tập đoàn quốc tế.", "vi": "Kinh tế TP.HCM quý I/2026 tăng trưởng 8,27%, mức cao nhất trong 5 năm qua với điểm nhấn là vốn FDI tăng 220% cùng sự hiện diện của các dự án lớn từ TikTok và nhiều tập đoàn quốc tế."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Ho Chi Minh City", "source": "CafeBiz", "date": "2026-04-07", "url": "https://cafebiz.vn/tin-vui-tu-tphcm-fdi-tang-truong-220-tiktok-va-cac-tap-doan-lon-don-dap-rot-von-1762604071344515.chn", "plan_id": "VN-IP-NORTH-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 193, "title": {"ko": "하노이, 전기차 배터리 교환망 구축에 박차를 가하고 있다", "en": "Hanoi prioritizes rapid electric vehicle battery-swapping network", "vi": ""}, "summary": {"ko": "저공해 구역 도입 노력의 일환으로, 하노이는 충전 인프라 구축을 가속화하는 한편, 전기차 이용자들이 단 2~3분 만에 배터리를 교체할 수 있도록 하는 밀집형 배터리 교환 네트워크 구축을 최우선 과제로 삼고 있다.", "en": "As part of efforts to implement low-emission zones, Hanoi is accelerating the development of charging infrastructure while prioritizing a compact battery-swapping network, enabling electric vehicle users to replac n thành và vận hành an toàn 2 nhà máy điện hạt nhân Ninh Thuận vào năm 2035, góp phần bảo đảm an ninh năng lượng và phát triển bền vững. Khánh Hòa bố trí nhà ở, hỗ trợ người bị thu hồi đất làm dự án điện hạt nhân Tác động tích cực từ thỏa thuận xây dựng dự án Nhà máy điện hạt nhân của Việt Nam Tổ chức thẩm định điều chỉnh chủ trương đầu tư Dự án điện hạt nhân Ninh Thuận 1", "vi": "Chiến lược năng lượng nguyên tử đặt mục tiêu hoàn thành và vận hành an toàn 2 nhà máy điện hạt nhân Ninh Thuận vào năm 2035, góp phần bảo đảm an ninh năng lượng và phát triển bền vững. Khánh Hòa bố trí nhà ở, hỗ trợ người bị thu hồi đất làm dự án điện hạt nhân Tác động tích cực từ thỏa thuận xây dựng dự án Nhà máy điện hạt nhân của Việt Nam Tổ chức thẩm định điều chỉnh chủ trương đầu tư Dự án điện hạt nhân Ninh Thuận 1"}, "sector": "Power", "area": "Energy Develop.", "province": "Khanh Hoa", "source": "VietnamPlus - Kinh te", "date": "2026-04-05", "url": "https://www.vietnamplus.vn/muc-tieu-den-nam-2035-van-hanh-an-toan-2-nha-may-dien-hat-nhan-ninh-thuan-post1102967.vnp", "plan_id": "", "grade": "", "matched": "Y"}, {"id": 205, "title": {"ko": "EVN은 2026년 전기 공급을 보장하기 위해 남부 지방과 적극적으로 협력합니다.", "en": "EVN actively works with the southern province to ensure electricity supply in 2026", "vi": ""}, "summary": {"ko": "강렬한 더위가 세 지역 모두에서 일찍 찾아와 전기 수요가 증가했습니다. 베트남 전력 (EVN) 은 2026년 전기 공급을 보장하기 위해 현지와 적극적으로 협력하여 솔루션을 교환했습니다.", "en": "The intense heat came early in all three regions, causing the demand for electricity to increase. Electricity of Vietnam (EVN) has actively worked with localities to exchange solutions to ensure electricity supply in 2026.", "vi": "Nắng nóng gay gắt đến sớm ở cả 3 miền khiến nhu cầu tiêu thụ điện tăng cao. Tập đoàn Điện lực Việt Nam (EVN) đã chủ động làm việc với các địa phương nhằm trao đổi các giải pháp đảm bảo cung ứng điện năm 2026."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Thanh Nien - Kinh te", "date": "2026-04-05", "url": "h hếc Tếa đàm “Nâng cao vai trò cếa phếa nế trong các doanh nghiệp ngành nươc Việt Nam”. Chương trình nhếm tôn vinh nhếng đóng góp thếm lếng cếa phế nế đải vếi ngành cếp nưếc.", "en": "Ngày 3-4, Tổng công ty Cấp nước Sài Gòn (SAWACO) và Báo Phụ nữ TPHCM phối hợp tổ chức Tọa đàm “Nâng cao vai trò của phụ nữ trong các doanh nghiệp ngành nước Việt Nam”. Chương trình nhằm tôn vinh những đóng góp thầm lặng của phụ nữ đối với ngành cấp nước.", "vi": "Ngày 3-4, Tổng công ty Cấp nước Sài Gòn (SAWACO) và Báo Phụ nữ TPHCM phối hợp tổ chức Tọa đàm “Nâng cao vai trò của phụ nữ trong các doanh nghiệp ngành nước Việt Nam”. Chương trình nhằm tôn vinh những đóng góp thầm lặng của phụ nữ đối với ngành cấp nước."}, "sector": "Water Supply/Drainage", "area": "Environment", "province": "Vietnam", "source": "SGGP", "date": "2026-04-03", "url": "https://www.sggp.org.vn/phat-huy-vai-tro-phu-nu-trong-nganh-cap-nuoc-post846147.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 220, "title": {"ko": "Canh Vinh의 오염된 가축 시설에 대한 처리가 필요합니다.", "en": "It is necessary to treat polluting livestock facilities in Canh Vinh", "vi": ""}, "summary": {"ko": "(GLO) - Economic Village (Canh Vinh Commune, Gia Lai Province) 의 가축 활동으로 인한 환경 오염으로 인해 많은 가정이 혼란에 빠지고 있습니다. 장기간에 걸친 악취, 처리되지 않은 폐수는 일상 생활에 영향을 미칠 뿐만 아니라 농업 생산과 사람들의 건강에도 직접적인 영향을 미칩니다.", "en": "(GLO)- Environmental pollution from livestock activities in Economic Village (Canh Vinh Commune, Gia Lai Province) is causing many households to be upset. Prolonged odor, untreated wastewater not only affects daily life but also directly affects agricultural production and people's health.", "vi": "(GLO)- Tình trạng ô nhiễm môi trường từ hoạt động chăn nuôi tại thôn Kinh Tế (xã Canh Vinh, tỉnh Gia Lai) đang khiến nhiều hộ dân bức xúc. Mùi hôi kéo dài, nước thải chưa được xử lý triệt để không chỉ ảnh hưởng đến sinh hoạt mà còn tác động trực tiếp đến sản xuất nông nghiệp và sức khỏe người dân. Ô nhiễm môi trường tại làng nghề bánh, bún An Thái Xưởng xay cà phê của Công ty Cà phê Ia Sao 1 gây ô nhiễm môi trường Nguy cơ ô nhiễm, mất an toàn từ những “xóm phế liệu” ở Phù Cát"}, "sector": "Power", "area": "Energy Develop.", "province": "Gia Lai", "source": "Bao Binh Dinh", "date": "2026-04-03", "url": "https://baogialai.com.vn/can-xu-ly-cac-co-so-chan-nuoi-gay-o-nhiem-o-canh-vinh-post583875.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 221, "title": {"ko": "다낭은 폐기물 공장의 진행 속도를 높이고 환경 사고를 예방할 것을 요청했습니다.", "en": "Da Nang asked to speed up the progress of waste factories, prevent environmental incidents", "vi": ""}, "summary": {"ko": "다낭시 지도자들은 국내 고형폐기물 처리 실태 점검 후 지역 내 폐기물 수거에 대한 압력을 줄이고 공사 진행 속도를 높일 것을 당부했다.", "en": "Da Nang City leaders asked waste factories in the area to speed up the construction progress to put into operation, reduce pressure on waste collection in the area after the actual inspection of domestic solid waste treatment.", "vi": "Lãnh đạo TP Đà Nẵng yêu cầu các nhà máy rác trên địa bàn sớm đẩy nhanh tiến độ xây dựng để đưa vào vận hành, giảm áp lực cho việc thu gom rác thải trên địa bàn sau buổi kiểm tra thực tế công tác xử lý chất thải rắn sinh hoạt."}, "sector": "Power", "area": "Energy Develop.", "province": "Da Nang", "source": "Bao Xay Dung", "date": "2026-04-03", "url": "https://baoxaydung.vn/da-nang-yeu-cau-day-nhanh-tien-do-cac-nha-may-rac-khong-de-xay-ra-su-co-moi-truong-192260403105044428.htm", "plan_id": "", "grade": "", "matched": ""}, {"id": 222, "title": {"ko": "베트남, 에너지 절약 및 녹색 전환 강화", "en": "Viet Nam steps up energy conservation and green transition", "vi": ""}, "summary": {"ko": "베트남은 증가하는 에너지 수요로 인한 압박에 직면해 있으며, 특히 글로벌 시장의 변동성이 심화되고 있습니다. 이처럼 친환경 에너지로의 전환을 가속화하면서 전기와 석유를 절약하는 것이 국가 에너지 확보를 위한 근본적인 해결책으로 지목되고 있다.", "en": "Viet Nam is facing mounting pressure from rising energy demand, particularly amid heightened volatility in global markets. As such, conserving electricity and petroleum while accelerating the transition to green energy has been identified as a fundamental solution for ensuring national energy security. Geopolitical conflicts underscore the urgent need for energy security and autonomy PM stresses need to diversify oil supply at Nghi Son refinery for energy security Ha Noi responds to earth hour 2026: Joining hands for a sustainable energy future Gov't leader orders sufficient energy supplies for production, business, consumption", "vi": "Việt Nam đang phải đối mặt với áp lực gia tăng từ nhu cầu năng lượng ngày càng tăng, đặc biệt là trong bối cảnh biến động tăng cao trên thị trường toàn cầu. Như vậy, bảo tồn điện và dầu mỏ đồng thời đẩy nhanh quá trình chuyển đổi sang năng lượng xanh đã được xác định là một giải pháp cơ bản để đảm bảo an ninh năng lượng quốc gia"}, "sector": "Power", "area": "Energy Develop.", "province": "Hanoi", "source": "Nhan Dan English", "date": "2026-04-03", "url": "https://en.nhandan.vn/viet-nam-steps-up-energy-conservation-and-green-transition-post160668.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 223, "title": {"ko": "PM, Dung Quat 석유 정제 및 에너지 센터 프로젝트 정책 구축 요청", "en": "PM requests building of policies for Dung Quat oil refining and energy centre project", "vi": ""}, "summary": {"ko": "Pham Minh Chinh 총리는 Quang Ngai 중부 지방의 Dung Quat Economic Zone (EZ) 에서 국가 석유 정제 및 에너지 센터 프로젝트를 신속하게 추진하기 위해 신속한 조치와 제로 망설임을 요구했으며, 신속하고 효과적인 결과를 제공하기 위해 명확한 로드맵과 사용 가능한 모든 자원을 촉구했습니다.", "en": "Prime Minister Pham Minh Chinh has demanded rapid action and zero hesitation to expedite the National Oil Refining and Energy Centre project at Dung Quat Economic Zone (EZ) in the central province of Quang Ngai, urging a clear roadmap and all available resources to deliver fast and effective results. Prime Minister pushes construction of Nghi Son crude oil storage Large oil field discovered off the coast of Viet Nam", "vi": "Thủ tướng Phạm Minh Chính đã yêu cầu hành động nhanh chóng và không do dự để xúc tiến dự án Trung tâm Năng lượng và Lọc dầu Quốc gia tại Khu kinh tế Dung Quất (EZ) ở tỉnh Quảng Ngãi, thúc giục một lộ trình rõ ràng và tất cả các nguồn lực sẵn có để mang lại kết quả nhanh chóng và hiệu quả"}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Quang Ngai", "source": "Nhan Dan English", "date": "2026-04-03", "url": "https://en.nhandan.vn/pm-requests-building-of-policies-for-dung-quat-oil-refining-and-energy-centre-project-post160686.html", "plan_id": "VN-OG-2030", "grade": "MEDIUM", "matched": ""}, {"id": 903, "title": {"ko": "Nhan Dan English", "en": "PM requests building of policies for Dung Quat oil refining and energy centre project", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "", "source": "Quang Ngai", "date": "2026-04-03", "url": "https://en.nhandan.vn/pm-requests-building-of-policies-", "plan_id": "VN-OG-2030", "grade": "", "matched": "Y"}, {"id": 224, "title": {"ko": "", "en": "", "vi": "Hà Nội rào chắn loạt tuyến phố, phân luồng giao thông để thi công chống ngập"}, "summary": {"ko": "Nhếm ph ´ c v ´ thi công D ´ án đếu tư xây dếng chảng úng ngếp cếc bế cho mết sđ điếm thuếc khu vếc nếi đô, S ´ Xây d ´ nng thếc hiện phương án phân luơng t ´ ch ´ c giao thông đ đm bảo an toàn thi công. Hà Nải phân luếng mết sạ tuyến đưếng phếc vế thi công dế án chảng ngếp úng Hà Nếi gếp rút triến khai 10 c", "en": "Nhằm phục vụ thi công Dự án đầu tư xây dựng chống úng ngập cục bộ cho một số điểm thuộc khu vực nội đô, Sở Xây dựng thực hiện phương án phân luồng tổ chức giao thông để đảm bảo an toàn thi công. Hà Nội phân luồng một số tuyến đường phục vụ thi công dự án chống ngập úng Hà Nội gấp rút triển khai 10 công trình thoát nước-chống ngập trước mùa mưa 2026 Chủ tịch UBND thành phố Hà Nội kiểm tra tiến độ các dự án chống ngập trọng điểm", "vi": "Nhằm phục vụ thi công Dự án đầu tư xây dựng chống úng ngập cục bộ cho một số điểm thuộc khu vực nội đô, Sở Xây dựng thực hiện phương án phân luồng tổ chức giao thông để đảm bảo an toàn thi công. Hà Nội phân luồng một số tuyến đường phục vụ thi công dự án chống ngập úng Hà Nội gấp rút triển khai 10 công trình thoát nước-chống ngập trước mùa mưa 2026 Chủ tịch UBND thành phố Hà Nội kiểm tra tiến độ các dự án chống ngập trọng điểm"}, "sector": "Transport", "area": "Urban Develop.", "province": "Hanoi", "source": "VietnamPlus - Giao thong", "date": "2026-04-02", "url": "https://www.vietnamplus.vn/ha-noi-rao-chan-loat-tuyen-pho-phan-luong-giao-thong-de-thi-cong-chong-ngap-post1102580.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 225, "title": {"ko": "호치민시의 산업단지는 1분기에 미화 7억 7,200만 달러 ($) 를 유치했습니다.", "en": "Ho Chi Minh City’s industrial parks draw over US$772 million in Q1", "vi": ""}, "summary": {"ko": "HCMC의 산업 단지 및 수출 처리 구역은 2026년 1분기에 새로 등록된 프로젝트와 확장된 프로젝트를 포함하여 미화 7,721만 4천 달러의 투자를 확보하여 시 연간 목표인 미화 42억 5천만 달러의 18.17% 를 달성했습니다.", "en": "Industrial parks and export processing zones in HCMC secured US$772.14 million in investment in the first quarter of 2026, including both newly registered and expanded projects, fulfilling 18.17 percent of the city’s annual target of US$4.25 billion.", "vi": "Các khu công nghiệp và khu chế xuất tại Tp.HCM đã đảm bảo đầu tư 772,14 triệu $ trong quý đầu tiên của năm 2026, bao gồm cả các dự án mới đăng ký và mở rộng, hoàn thành 18,17% mục tiêu hàng năm của thành phố là 4,25 tỷ$."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Ho Chi Minh City", "source": "SGGP News English", "date": "2026-04-01", "url": "https://en.sggp.org.vn/ho-chi-minh-citys-industrial-parks-draw-over-us772-million-in-q1-post125057.html", "plan_id": "VN-IP-NORTH-2030", "grade": "LOW", "matched": "Y"}, {"id": 226, "title": {"ko": "HCMC는 폐기물 처리 시설에 자동 계량 시스템을 배치합니다.", "en": "HCMC deploys automated weighing system at waste treatment facilities", "vi": ""}, "summary": {"ko": "호치민시는 4월 1일부터 4개의 고형 폐기물 처리장에 자동 계량 소프트웨어 시스템을 공식 출시하여 폐기물 운송 및 정산 디지털 관리로 전환했습니다. 다푸옥 (Da Phuoc) 매립지는 HCMC가 잔고를 피하기 위해 이동함에 따라 낭비 시간을 줄입니다. 벤 트레 (Ben Tre) 는", "en": "From April 1, Ho Chi Minh City official tăng trưởng"}, "summary": {"ko": "3월 29일 오전, 다낭시 인민위원회는 다낭시 해방절(1975년 3월 29일 ~ 2026년 3월 29일) 51주년을 기념하여 땀안(Tam Anh) – 안안화(An An Hoa) 산업단지(땀안(Tam Anh) 면) 건설 투자 프로젝트 기공식을 거행했습니다.", "en": "On the morning of March 29, the People's Committee of Da Nang City held a groundbreaking ceremony for the investment project to build the Tam Anh - An An Hoa industrial park (Tam Anh commune), celebrating the 51st anniversary of the Liberation Day of Da Nang City (March 29, 1975 - March 29, 2026).", "vi": "Sáng 29/3, UBND TP Đà Nẵng tổ chức khởi công dự án đầu tư xây dựng khu công nghiệp Tam Anh - An An Hòa (xã Tam Anh), chào mừng kỷ niệm 51 năm Ngày giải phóng TP Đà Nẵng (29/3/1975 - 29/3/2026)."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Da Nang", "source": "Bao Xay Dung", "date": "2026-03-29", "url": "https://baoxaydung.vn/da-nang-khoi-cong-khu-cong-nghiep-hon-4100-ty-dong-quyet-tam-doi-moi-mo-hinh-tang-truong-192260329112533709.htm", "plan_id": "VN-IP-NORTH-2030", "grade": "", "matched": ""}, {"id": 240, "title": {"ko": "VinEnergo는 Gia Lai 풍력 발전소 클러스터 프로젝트에 대한 투자를 연구하기 위한 MOU를 체결했습니다.", "en": "", "vi": "VinEnergo ký MOU nghiên cứu đầu tư dự án Cụm Nhà máy điện gió Gia Lai"}, "summary": {"ko": "2026년 3월 28일, Gia Lai 지방 인민위원회와 VinEnergo 에너지 합작회사는 Gia Lai 풍력 발전소 클러스터 프로젝트에 대한 연구 및 투자 기회 모색에 관한 협력 양해각서(MOU)를 체결했습니다.", "en": "On March 28, 2026, Gia Lai Provincial People's Committee and VinEnergo Energy Joint Stock Company signed a memorandum of cooperation (MOU) on researching and seeking investment opportunities for the Gia Lai Wind Power Plant Cluster project.", "vi": "Ngày 28/3/2026, UBND tỉnh Gia Lai và Công ty Cổ phần Năng lượng VinEnergo đã ký kết biên bản ghi nhớ hợp tác (MOU) về việc nghiên cứu và tìm kiếm cơ hội đầu tư dự án Cụm Nhà máy điện gió Gia Lai."}, "sector": "Power", "area": "Energy Develop.", "province": "Gia Lai", "source": "VietnamNet - Kinh doanh", "date": "2026-03-29", "url": "https://vietnamnet.vn/vinenergo-ky-mou-nghien-cuu-dau-tu-du-an-cum-nha-may-dien-gio-gia-lai-2501391.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 241, "title": {"ko": "VinEnergo는 Gia Lai 풍력 발전소 클러스터에 80억 달러를 투자했습니다.", "en": "", "vi": "VinEnergo đầu tư 8 tỷ USD vào cụm nhà máy điện gió Gia Lai"}, "summary": {"ko": "VinEnergo Energy Joint Stock Company는 3월 28일 Gia Lai에 80억 달러 규모의 풍력 발전소 클러스터 건설에 투자하는 것을 목표로 잠재력을 조사하고 조사하기 위해 Gia Lai 지방 인민위원회와 협력 계약을 체결했습니다.", "en": "VinEnergo Energy Joint Stock Company signed a cooperation agreement with Gia Lai Provincial People's Committee to research and survey the potential, aiming to invest in building an 8 billion USD wind power plant cluster in Gia Lai, March 28.", "vi": "Công ty Cổ phần Năng lượng VinEnergo ký hợp tác UBND tỉnh Gia Lai nhằm nghiên cứu, khảo sát tiềm năng, hướng đến đầu tư xây dựng cụm nhà máy điện gió 8 tỷ USD tại Gia Lai, ngày 28/3."}, "sector": "Power", "area": "Energy Develop.", "province": "Gia Lai", "source": "VnExpress - Kinh doanh", "date": "2026-03-29", "url": "https://vnexpress.net/vinenergo-dau-tu-8-ty-usd-vao-cum-nha-may-dien-gio-gia-lai-5056019.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 242, "title": {"ko": "다낭 남부 성장 극에 4조 1,500억 VND 이상의 산업 단지 건설 시작", "en": "", "vi": "Khởi công khu công nghiệp hơn 4.150 tỉ đồng ở cực tăng trưởng nam Đà Nẵng"}, "summary": {"ko": "3월 29일 오늘 아침 건설을 시작한 다낭 남부 성장 극에 있는 땀안(Tam Anh)-안안화(An An Hoa) 산업단지 프로젝트는 지역에서 계획한 1,545헥타르 규모의 산업 부지 중 마지막 두 부분 중 하나입니다.", "en": "The Tam Anh - An An Hoa Industrial Park project at the southern growth pole of Da Nang, which started construction this morning, March 29, is one of the last two pieces of the 1,545 hectares of industrial land planned by the locality.", "vi": "Dự án Khu công nghiệp Tam Anh - An An Hòa tại cực tăng trưởng nam Đà Nẵng khởi công sáng nay 29.3 là một trong 2 mảnh ghép cuối cùng trong 1.545 ha đất công nghiệp đã được quy hoạch của địa phương."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Da Nang", "source": "Thanh Nien -
