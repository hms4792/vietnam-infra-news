.2 billion) broke ground on Jan. 15, a move expected to ease chronic congestion and strengthen transport links between Ho Chi Minh City and neighb", "vi": "Dự án xử lý nước thải tại Thành phố Hồ Chí Minh. Hai cây cầu lớn có tổng trị giá hơn 32 nghìn tỷ đồng (1,2 tỷ USD) đã chính thức khởi công vào ngày 15 tháng 1, một bước đi được kỳ vọng sẽ giảm bớt tình trạng ùn tắc giao thông kéo dài và củng cố kết nối giao thông giữa Thành phố Hồ Chí Minh và các tỉnh lân cận"}, "sector": "Transport", "area": "Urban Develop.", "province": "Ho Chi Minh City", "source": "VnExpress English", "date": "2026-01-15", "url": "https://e.vnexpress.net/news/news/traffic/vietnam-breaks-ground-on-1-2b-bridges-to-cut-travel-time-between-hcmc-and-long-thanh-airport-5006056.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 351, "title": {"ko": "팜 민 정 총리가 세계 유수의 반도체 기업 대표단을 접견했다", "en": "", "vi": "Thủ tướng Phạm Minh Chính tiếp lãnh đạo tập đoàn bán dẫn hàng đầu thế giới"}, "summary": {"ko": "베트남의 폐수 처리 프로젝트. 총리는 베트남 정부가 ASML을 비롯한 외국 기업들이 베트남에서 장기적으로 성공적으로 투자하고 사업을 영위할 수 있도록 항상 함께하며 모든 유리한 조건을 마련해 주겠다는 의지를 재확인했다. 베트남", "en": "Wastewater Project in Vietnam. The Prime Minister reaffirmed that the Vietnamese government is committed to supporting and creating favorable conditions for foreign companies, including ASML, to invest and operate successfully in Vietnam over the long term.Viet N", "vi": "Waste Water project in Vietnam. Thủ tướng khẳng định Chính phủ Việt Nam cam kết luôn đồng hành và tạo mọi điều kiện thuận lợi để các doanh nghiệp nước ngoài, trong đó có ASML, đầu tư kinh doanh thành công lâu dài tại Việt Nam.Việt N"}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamPlus", "date": "2026-01-15", "url": "https://www.vietnamplus.vn/thu-tuong-pham-minh-chinh-tiep-lanh-dao-tap-doan-ban-dan-hang-dau-the-gioi-post1088682.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 352, "title": {"ko": "팜 민 정 총리가 네덜란드 ASML 그룹의 경영진을 접견했다", "en": "", "vi": "Thủ tướng Phạm Minh Chính tiếp lãnh đạo Tập đoàn ASML của Hà Lan"}, "summary": {"ko": "베트남의 폐수 처리 프로젝트. 2026년 1월 15일 오후, 하노이에서 팜 민 정 총리는 ASML 그룹(네덜란드)의 에두아르드 스티프아웃 수석 부회장을 접견했다. 베트남-네덜란드, 물류 협력 및 녹색 전환 강화 협력 베트남", "en": "Wastewater Project in Vietnam. On the afternoon of January 15, 2026, in Hanoi, Prime Minister Pham Minh Chinh received Mr. Eduard Stiphout, Senior Vice President of ASML Group (Netherlands). Vietnam and the Netherlands are stepping up cooperation in logistics and green transition. Vietnam-Netherlands cooperation", "vi": "Waste Water project in Vietnam. Chiều 15/1/2026, tại Hà Nội, Thủ tướng Phạm Minh Chính tiếp ông Eduard Stiphout - Phó Chủ tịch Cấp cao Tập đoàn ASML (Hà Lan).Việt Nam-Hà Lan đẩy mạnh hợp tác logistics và chuyển đổi xanhHợp tác Việt"}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamPlus", "date": "2026-01-15", "url": "https://www.vietnamplus.vn/thu-tuong-pham-minh-chinh-tiep-lanh-dao-tap-doan-asml-cua-ha-lan-post1088675.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 353, "title": {"ko": "베트남, 아시아 외국인 직접 투자(FDI) 성공의 대표적인 사례로 부상", "en": "Việt Nam emerges as typical case of Asia’s FDI success", "vi": ""}, "summary": {"ko": "베트남의 산업단지 프로젝트. 베트남은 정치적 안정, 탄탄한 인프라, 그리고 글로벌 공급망과의 긴밀한 연계에 힘입어 아시아를 대표하는 외국인 직접 투자(FDI) 유치지로 부상했습니다.", "en": "Industrial Parks project in Vietnam. Việt Nam has emerged as a leading FDI destination in Asia, driven by political stability, strong infrastructure and deep integration into global supply chains.", "vi": "Dự án khu công nghiệp tại Việt Nam. Việt Nam đã vươn lên trở thành một trong những điểm đến hàng đầu thu hút đầu tư trực tiếp nước ngoài (FDI) tại châu Á, nhờ vào sự ổn định chính trị, hệ thống hạ tầng vững mạnh và sự hội nhập sâu rộng vào các chuỗi cung ứng toàn cầu."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamNews", "date": "2026-01-14", "url": "https://vietnamnews.vn/economy/1763703/viet-nam-emerges-as-typical-case-of-asia-s-fdi-success.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 354, "title": {"ko": "호치민시, 향후 5년 내 지하철 노선 5개 추가 예정", "en": "Ho Chi Minh City to add 5 metro lines in next 5 years", "vi": ""}, "summary": {"ko": "호치민시의 하수 처리 프로젝트. 호치민시는 현재 운행 중인 벤탄-수오이티엔 노선에 5개 노선을 추가하여, 2030년까지 지하철 노선 총 연장 거리를 187km로 늘리는 것을 목표로 하고 있다.", "en": "Waste Water project in Ho Chi Minh City. Ho Chi Minh City aims to increase the total length of its metro network to 187 km by 2030 with the addition of five more routes to the operational Ben Thanh–Suoi Tien line.", "vi": "Dự án xử lý nước thải tại Thành phố Hồ Chí Minh. Thành phố Hồ Chí Minh đặt mục tiêu nâng tổng chiều dài mạng lưới tàu điện ngầm lên 187 km vào năm 2030 thông qua việc bổ sung thêm năm tuyến mới vào tuyến Ben Thanh–Suoi Tien đang đi vào hoạt động."}, "sector": "Transport", "area": "Urban Develop.", "province": "Ho Chi Minh City", "source": "VnExpress English", "date": "2026-01-14", "url": "https://e.vnexpress.net/news/news/traffic/ho-chi-minh-city-to-add-5-metro-lines-in-next-5-years-5005577.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 355, "title": {"ko": "꽝닌성, 2026년까지 30억 달러의 외국인 직접투자 유치 위해 장애물 해소", "en": "", "vi": "Quảng Ninh gỡ điểm nghẽn để thu hút 3 tỷ USD vốn FDI năm 2026"}, "summary": {"ko": "베트남 산업단지 프로젝트. 두 자릿수 성장을 목표로 하는 꽝닌성은 계획, 절차 및 토지 확보와 관련된 걸림돌을 해소하기 위해 전력을 다하고 있으며, 2026년까지 30억 달러의 외국인 직접투자(FDI)와 약 569조 동 규모의 국내 투자를 유치할 것으로 전망된다.", "en": "Industrial Parks project in Vietnam. With a target of double-digit growth, Quang Ninh is determined to address bottlenecks in planning, procedures, and land availability, aiming to attract $3 billion in FDI and nearly 569 trillion VND in domestic investment by 2026.", "vi": "Industrial Parks project in Vietnam. Với mục tiêu tăng trưởng hai con số, Quảng Ninh quyết tâm gỡ điểm nghẽn về quy hoạch, thủ tục và quỹ đất, dự kiến thu hút 3 tỷ USD vốn FDI và gần 569.000 tỷ đồng vốn đầu tư trong nước trong năm 2026.'"}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamPlus", "date": "2026-01-13", "url": "https://www.vietnamplus.vn/quang-ninh-go-diem-nghen-de-thu-hut-3-ty-usd-von-fdi-nam-2026-post1088238.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 356, "title": {"ko": "미국 판사, 트럼프 행정부의 풍력 발전 프로젝트 관련 결정을 무효화하다", "en": "", "vi": "Thẩm phán Mỹ vô hiệu hóa quyết định của chính quyền Trump về dự án điện gió"}, "summary": {"ko": "미국 연방 지방법원의 로이스 램버스 판사는 레볼루션 윈드의 요청을 승인하며, 미국 내무부가 로드아일랜드주 해상 풍력 발전 프로젝트에 대해 내린 중단 조치를 뒤집었다. 이번 결정으로 해당 해상 풍력 발전 프로젝트는 다시 진행될 수 있게 되었다.", "en": "US Federal District Judge Royce Lamberth approved Revolution Wind's request, overturning the US Department of Interior's suspension of the offshore wind project in Rhode Island. This decision allows the offshore wind power project to resume operations.", "vi": "Thẩm phán Tòa án Liên bang Hoa Kỳ Royce Lamberth đã chấp thuận yêu cầu của Revolution Wind, hủy bỏ quyết định đình chỉ dự án điện gió ngoài khơi tại Rhode Island của Bộ Nội vụ Hoa Kỳ. Quyết định này cho phép dự án điện gió ngoài khơi tiếp tục hoạt động."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamPlus", "date": "2026-01-13", "url": "https://www.vietnamplus.vn/tham-phan-my-vo-hieu-hoa-quyet-dinh-cua-chinh-quyen-trump-ve-du-an-dien-gio-post1088145.vnp", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-RENEWABLE", "grade": "", "matched": ""}, {"id": 936, "title": {"ko": "VietnamPlus", "en": "Thẩm phán Mỹ vô hiệu hóa quyết định của chính quyền Trump về dự án điện gió", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2026-01-13", "url": "https://www.vietnamplus.vn/tham-phan-my-vo-hieu-hoa-quy", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-RENEWABLE", "grade": "", "matched": "Y"}, {"id": 357, "title": {"ko": "개혁 개방 40년: 동나이가 전국 최고의 산업 중심지로 부상하다", "en": "", "vi": "40 năm đổi mới: Đồng Nai vươn lên thành trung tâm công nghiệp hàng đầu cả nước"}, "summary": {"ko": "베트남 최초의 산업단지가 위치한 동나이성은 3만 9천 헥타르가 넘는 부지에 81개의 산업단지가 조성되어 베트남을 대표하는 산업 중심지로 발전했다. 이러한 변화는 지난 40년간의 개혁 정책이 이룬 중요한 성과이다.", "en": "Dong Nai province, home to Vietnam's first industrial park, has developed into the nation's leading industrial center with 81 planned industrial parks covering over 39,000 hectares. This transformation represents a significant achievement of the 40-year renovation policy.", "vi": "Tỉnh Đồng Nai, nơi có khu công nghiệp đầu tiên của Việt Nam, đã phát triển thành trung tâm công nghiệp hàng đầu cả nước với 81 khu công nghiệp được quy hoạch, có tổng diện tích hơn 39.000 ha. Sự chuyển mình này là một thành tựu đáng kể của chính sách đổi mới trong 40 năm qua."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamPlus", "date": "2026-01-12", "url": "https://www.vietnamplus.vn/40-nam-doi-moi-dong-nai-vuon-len-thanh-trung-tam-cong-nghiep-hang-dau-ca-nuoc-post1087986.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 358, "title": {"ko": "EVNNPC, 과학기술 전시회 및 세미나 개최", "en": "", "vi": "EVNNPC tổ chức triển lãm và hội thảo khoa học công nghệ"}, "summary": {"ko": "1월 12일, 북부전력공사(EVNNPC)는 ‘배전망 운영 관리에서의 과학기술 응용 및 디지털 전환’을 주제로 ‘Techshow EVNNPC 2026 과학기술 전시회’와 과학기술 세미나를 개최했다.", "en": "On January 12, the Northern Power Corporation (EVNNPC) hosted the EVNNPC Techshow 2026 Science and Technology Exhibition and a Science and Technology Seminar on the theme “Science and Technology Applications and Digital Transformation in the Operation and Management of Distribution Grids.”", "vi": "Ngày 12/1, Tổng công ty Điện lực miền Bắc (EVNNPC) tổ chức Triển lãm Khoa học Công nghệ Techshow EVNNPC 2026 và Hội thảo Khoa học Công nghệ với chủ đề “Các ứng dụng khoa học công nghệ và chuyển đổi số trong quản lý vận hành lưới điện phân phối”."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamNet - Kinh doanh", "date": "2026-01-12", "url": "https://vietnamnet.vn/evnnpc-to-chuc-trien-lam-va-hoi-thao-khoa-hoc-cong-nghe-2481178.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 359, "title": {"ko": "호치민시, 산업단지 투자액 헥타르당 800만~1,000만 달러 목표", "en": "HCM City eyes $8-10 million per hectare in industrial park investment", "vi": ""}, "summary": {"ko": "호치민시는 산업단지의 평균 투자 집약도를 헥타르당 800만~1,000만 달러로 높이는 것을 목표로 하고 있다. 특히 첨단 기술, 고부가가치 및 친환경 산업에 중점을 둘 예정이다.", "en": "Ho Chi Minh City aims to increase the average investment intensity in industrial parks to $8-10 million per hectare. The focus will be on high-tech, high-value-added and environmentally friendly industries.", "vi": "Thành phố Hồ Chí Minh đặt mục tiêu nâng mức đầu tư bình quân tại các khu công nghiệp lên 8-10 triệu USD/ha. Trọng tâm sẽ được đặt vào các ngành công nghiệp công nghệ cao, có giá trị gia tăng cao và thân thiện với môi trường."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Vietnam", "source": "VietnamNews", "date": "2026-01-12", "url": "https://vietnamnews.vn/economy/1763555/hcm-city-eyes-8-10-million-per-hectare-in-industrial-park-investment.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 360, "title": {"ko": "LNG 발전소가 처음으로 전력망에 연결되어 남부 전력망에 1.6GW가 추가되었다", "en": "", "vi": "Điện khí LNG lần đầu lên lưới, thêm 1,6GW cho hệ thống điện phía Nam"}, "summary": {"ko": "논트라크 3호 및 4호 발전소가 1월 초에 정식 상업 운전을 시작했다. 이는 베트남에서 대규모 LNG 화력 발전 프로젝트가 가동된 첫 사례이다.", "en": "Nhon Trach 3 and 4 power plants officially began commercial operation in early January. This marks the first time a large-scale LNG gas power project has become operational in Vietnam.", "vi": "Nhà máy điện Nhơn Trạch 3 và 4 đã chính thức đi vào hoạt động thương mại vào đầu tháng 1. Đây là lần đầu tiên một dự án điện khí LNG quy mô lớn được đưa vào vận hành tại Việt Nam."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Tuoi Tre", "date": "2026-01-09", "url": "https://tuoitre.vn/dien-khi-lng-lan-dau-len-luoi-them-1-6-gw-cho-he-thong-dien-phia-nam-20260109090848473.htm", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": ""}, {"id": 937, "title": {"ko": "Tuoi Tre", "en": "Điện khí LNG lần đầu lên lưới, thêm 1,6GW cho hệ thống điện phía Nam", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2026-01-09", "url": "https://tuoitre.vn/dien-khi-lng-lan-dau-len-luoi-them-1", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 361, "title": {"ko": "호치민시는 산업단지에 헥타르당 800만~1,000만 달러의 투자 유치 목표를 세웠다", "en": "", "vi": "TP Hồ Chí Minh đặt mục tiêu suất đầu tư đạt 8-10 triệu USD mỗi ha vào KCN"}, "summary": {"ko": "호치민시는 산업단지의 헥타르당 평균 투자액을 800만~1,000만 달러로 높이는 것을 목표로 하고 있다. 이는 부가가치가 높고 환경 친화적인 첨단 산업을 육성하는 한편, 공공 투자 및 외국인 직접 투자 자금의 집행 속도를 가속화하기 위한 조치이다.", "en": "Ho Chi Minh City aims to increase the average investment rate to 8-10 million USD per hectare in industrial zones. This targets high-tech industries with high added value and environmental friendliness, while accelerating the disbursement of public investment and FDI capital.", "vi": "Thành phố Hồ Chí Minh đặt mục tiêu nâng mức đầu tư bình quân lên 8-10 triệu USD/ha tại các khu công nghiệp. Mục tiêu này hướng đến các ngành công nghiệp công nghệ cao có giá trị gia tăng cao và thân thiện với môi trường, đồng thời đẩy nhanh tiến độ giải ngân vốn đầu tư công và vốn đầu tư trực tiếp nước ngoài."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "VietnamPlus", "date": "2026-01-07", "url": "https://www.vietnamplus.vn/tp-ho-chi-minh-dat-muc-tieu-suat-dau-tu-dat-8-10-trieu-usd-moi-ha-vao-kcn-post1087107.vnp", "plan_id": "", "grade": "", "matched": ""}, {"id": 362, "title": {"ko": "베트남 한 지방정부가 하루 600톤의 쓰레기를 처리할 수 있는 7천만 달러 규모의 폐기물 에너지화 시설 건설을 승인했다", "en": "Vietnam province approves $70M waste-to-energy plant to treat 600 tons of trash daily", "vi": ""}, "summary": {"ko": "베트남 남부의 카마우성은 하루 600톤의 쓰레기를 처리할 수 있는 7,000만 달러 규모의 쓰레기 소각 발전소 건설을 승인했다. 이 프로젝트는 지역 매립지의 부담을 줄이는 것을 목표로 한다.", "en": "Ca Mau Province in southern Vietnam has approved a $70 million waste-to-energy plant capable of processing 600 tons of garbage daily. The project aims to reduce pressure on local landfills.", "vi": "Tỉnh Cà Mau ở miền Nam Việt Nam đã phê duyệt một nhà máy điện từ rác thải trị giá 70 triệu USD, có công suất xử lý 600 tấn rác thải mỗi ngày. Dự án này nhằm giảm bớt áp lực lên các bãi chôn lấp rác thải địa phương."}, "sector": "Solid Waste", "area": "Environment", "province": "Ca Mau", "source": "VnExpress English", "date": "2026-01-02", "url": "https://e.vnexpress.net/news/news/environment/vietnam-province-approves-70m-waste-to-energy-plant-to-treat-600-tons-of-trash-daily-5000265.html", "plan_id": "VN-SWM-NATIONAL-2030", "grade": "", "matched": ""}, {"id": 938, "title": {"ko": "VnExpress English", "en": "Vietnam province approves $70M waste-to-energy plant to treat 600 tons of trash daily", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Solid Waste", "area": "Environment", "province": "", "source": "Ca Mau", "date": "2026-01-02", "url": "https://e.vnexpress.net/news/news/environment/vietnam-p", "plan_id": "VN-SWM-NATIONAL-2030", "grade": "", "matched": "Y"}, {"id": 363, "title": {"ko": "새해 연휴가 시작되면서 호치민시 진입로에서 3km가 넘는 교통 정체가 발생했다", "en": "Traffic jam stretches more than 3 km at Ho Chi Minh City gateway as New Year holiday begins", "vi": ""}, "summary": {"ko": "1월 1일 오전, 호치민시 동쪽 관문인 호치민-롱탄-다우자이 고속도로에서 3km가 넘는 정체가 발생했다. 교통경찰은 정체를 해소하기 위해 차량 통행 제한 조치를 시행했다.", "en": "A traffic jam stretching over 3 kilometers occurred on the HCMC-Long Thanh-Dau Giay Expressway at Ho Chi Minh City's eastern gateway on the morning of January 1st. Traffic police implemented vehicle restrictions to manage the congestion.", "vi": "Vào sáng ngày 1 tháng 1, một vụ ùn tắc giao thông kéo dài hơn 3 km đã xảy ra trên tuyến đường cao tốc TP.HCM – Long Thành – Đậu Giây tại cửa ngõ phía đông TP.HCM. Lực lượng cảnh sát giao thông đã áp dụng các biện pháp hạn chế lưu thông để giải tỏa tình trạng ùn tắc."}, "sector": "Transport", "area": "Urban Develop.", "province": "Ho Chi Minh City", "source": "VnExpress English", "date": "2026-01-01", "url": "https://e.vnexpress.net/photo/traffic/traffic-jam-stretches-more-than-3-km-at-ho-chi-minh-city-gateway-as-new-year-holiday-begins-5000833.html", "plan_id": "VN-TRAN-2055", "grade": "MEDIUM", "matched": ""}, {"id": 939, "title": {"ko": "VnExpress English", "en": "Traffic jam stretches more than 3 km at Ho Chi Minh City gateway as New Year holiday begins", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Transport", "area": "Urban Develop.", "province": "", "source": "Ho Chi Minh City", "date": "2026-01-01", "url": "https://e.vnexpress.net/photo/traffic/traffic-jam-stret", "plan_id": "VN-TRAN-2055", "grade": "", "matched": "Y"}, {"id": 364, "title": {"ko": "차세대 산업단지 개발, 고품질 외국인 직접투자(FDI) 유치를 위한 기반 마련", "en": "Phát triển khu công nghiệp thế hệ mới, ‘dọn tổ’ đón FDI chất lượng cao", "vi": "Phát triển khu công nghiệp thế hệ mới, ‘dọn tổ’ đón FDI chất lượng cao"}, "summary": {"ko": "탄소국경조정제도(CBAM)와 ESG 기준이 강화되는 가운데, 녹색 인프라와 순환 경제를 갖춘 통합형 생태 산업단지는 우수한 해외 투자자들을 유치하는 새로운 매력이 될 것입니다. 이러한 차세대 산업단지는...", "en": "In the context of tightening carbon border adjustment mechanisms (CBAM) and ESG standards, integrated ecological industrial parks with green infrastructure and circular economy will become new magnets for attracting high-quality international investors. These next-generation industrial parks are eme", "vi": "Trong bối cảnh các cơ chế điều chỉnh biên giới về carbon (CBAM) và các tiêu chuẩn ESG ngày càng được thắt chặt, các khu công nghiệp sinh thái tích hợp với cơ sở hạ tầng xanh và nền kinh tế tuần hoàn sẽ trở thành điểm thu hút mới đối với các nhà đầu tư quốc tế chất lượng cao. Những khu công nghiệp thế hệ mới này là..."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Vietnam", "source": "Tuoi Tre", "date": "2025-12-31", "url": "https://tuoitre.vn/phat-trien-khu-cong-nghiep-the-he-moi-don-to-don-fdi-chat-luong-cao-20251231142923773.htm", "plan_id": "VN-IP-NORTH-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 940, "title": {"ko": "Tuoi Tre", "en": "Phát triển khu công nghiệp thế hệ mới, ‘dọn tổ’ đón FDI chất lượng cao", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "", "source": "Vietnam", "date": "2025-12-31", "url": "https://tuoitre.vn/phat-trien-khu-cong-nghiep-the-he-mo", "plan_id": "VN-IP-NORTH-2030", "grade": "", "matched": "Y"}, {"id": 365, "title": {"ko": "베트남 산업용 부동산은 외국인 직접 투자(FDI)를 유치하는 주요 성장 동력이다", "en": "", "vi": "Bất động sản công nghiệp Việt Nam là điểm sáng ‘hút khách’ FDI"}, "summary": {"ko": "세계 경제의 변동성에도 불구하고, 베트남의 산업용 부동산 시장은 비용, 에너지 가격, 친환경 제조 트렌드 등의 강점을 바탕으로 외국인 직접 투자(FDI)를 유치하는 유망한 분야로 자리 잡고 있습니다. 베트남은 산업단지 개발 분야에서 여전히 경쟁력을 유지하고 있습니다.", "en": "Despite global economic fluctuations, Vietnam's industrial real estate market remains a bright spot attracting FDI investment due to advantages in costs, energy prices, and green manufacturing trends. Vietnam maintains a competitive position in industrial park development.", "vi": "Bất chấp những biến động của nền kinh tế toàn cầu, thị trường bất động sản công nghiệp Việt Nam vẫn là một điểm sáng thu hút đầu tư trực tiếp nước ngoài (FDI) nhờ những lợi thế về chi phí, giá năng lượng và xu hướng sản xuất xanh. Việt Nam vẫn duy trì vị thế cạnh tranh trong lĩnh vực phát triển khu công nghiệp."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Tuoi Tre", "date": "2025-12-29", "url": "https://tuoitre.vn/bat-dong-san-cong-nghiep-viet-nam-la-diem-sang-hut-khach-fdi-20251229152824292.htm", "plan_id": "", "grade": "", "matched": ""}, {"id": 366, "title": {"ko": "CNG 버스 운행 중단 위기: PV GAS D가 입장을 밝혔으나, 업계는 여전히 불안해하고 있다", "en": "", "vi": "Nguy cơ dừng xe buýt CNG: PV GAS D lên tiếng, doanh nghiệp vẫn thấp thỏm"}, "summary": {"ko": "PV GAS D는 앞으로도 가스 공급을 보장하겠다고 밝혔다. 그러나 많은 기업과 호치민시의 CNG 버스 업체들은 2026년부터 발생할 수 있는 공급 차질 위험에 대해 여전히 우려하고 있다.", "en": "PV GAS D affirms it will continue to ensure gas supply. However, many businesses and Ho Chi Minh City CNG buses remain concerned about the risk of supply disruption from 2026.", "vi": "PV GAS D khẳng định sẽ tiếp tục đảm bảo nguồn cung cấp khí đốt. Tuy nhiên, nhiều doanh nghiệp và các xe buýt chạy bằng khí nén (CNG) tại Thành phố Hồ Chí Minh vẫn lo ngại về nguy cơ gián đoạn nguồn cung từ năm 2026."}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Vietnam", "source": "Tuoi Tre", "date": "2025-12-26", "url": "https://tuoitre.vn/nguy-co-dung-xe-buyt-cng-pv-gas-d-len-tieng-doanh-nghiep-van-thap-thom-20251226074854156.htm", "plan_id": "", "grade": "", "matched": ""}, {"id": 367, "title": {"ko": "호치민시의 한 외국인 직접 투자(FDI) 기업이 2,600명 이상의 근로자에게 운영 중단을 통보했다", "en": "", "vi": "Doanh nghiệp FDI hơn 2.600 công nhân tại TP.HCM thông báo ngưng hoạt động"}, "summary": {"ko": "호치민시(구 빈즈엉 지역)의 한 산업단지에 위치한 외국인 직접 투자(FDI) 기업이 주문 감소와 생산 시설 이전으로 인한 어려움으로 생산 및 사업 운영을 중단한다고 발표했다. 이 기업은 2,600명 이상의 근로자를 고용하고 있었다.", "en": "A foreign direct investment (FDI) company in an industrial park in Ho Chi Minh City (former Binh Duong area) has announced the cessation of production and business operations due to difficulties from lack of orders and production relocation. The company employed over 2,600 workers.", "vi": "Một doanh nghiệp có vốn đầu tư trực tiếp nước ngoài (FDI) tại một khu công nghiệp ở Thành phố Hồ Chí Minh (trước đây thuộc khu vực Bình Dương) đã thông báo ngừng sản xuất và hoạt động kinh doanh do gặp khó khăn từ việc thiếu đơn hàng và việc chuyển địa điểm sản xuất. Công ty này có hơn 2.600 công nhân."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "Tuoi Tre", "date": "2025-12-25", "url": "https://tuoitre.vn/doanh-nghiep-fdi-hon-2-600-cong-nhan-tai-tp-hcm-thong-bao-ngung-hoat-dong-2025122510300071.htm", "plan_id": "", "grade": "", "matched": ""}, {"id": 368, "title": {"ko": "PV GAS D, CNG 생산용 천연가스 공급에 관한 정보", "en": "", "vi": "PV GAS D thông tin về việc cung cấp khí thiên nhiên phục vụ sản xuất CNG"}, "summary": {"ko": "PV GAS D는 압축천연가스(CNG) 생산을 위한 천연가스 공급과 관련된 정보를 발표했다. 이는 베트남의 천연가스 인프라 개발과 관련해 중요한 발표로 보인다.", "en": "PV GAS D has announced information regarding the supply of natural gas for compressed natural gas (CNG) production. This appears to be an important announcement related to Vietnam's natural gas infrastructure development.", "vi": "PV GAS D đã công bố thông tin liên quan đến việc cung cấp khí đốt tự nhiên phục vụ sản xuất khí đốt tự nhiên nén (CNG). Đây dường như là một thông báo quan trọng liên quan đến việc phát triển hạ tầng khí đốt tự nhiên của Việt Nam."}, "sector": "Oil & Gas", "area": "Energy Develop.", "province": "Vietnam", "source": "nhadautu.vn", "date": "2025-12-25", "url": "https://nhadautu.vn/pv-gas-d-thong-tin-ve-viec-cung-cap-khi-thien-nhien-phuc-vu-san-xuat-khi-thien-nhien-nen-d101858.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 369, "title": {"ko": "호아락 하이테크파크, 베트남 혁신 허브 도약 — 109개 프로젝트 $4.59B", "en": "Hoa Lac Hi-Tech Park poised to become Vietnam innovation hub — 109 projects $4.59B", "vi": ""}, "summary": {"ko": "호아락 하이테크파크: 109개 투자 프로젝트, $4.59B 등록자본. 2025 개정 수도법 특별 메커니즘. 2045년 글로벌 혁신시스템 핵심 거점.", "en": "Hoa Lac: 109 projects, $4.59B registered capital. 2025 Capital Law special mechanism. Target: global innovation hub by 2045.", "vi": ""}, "sector": "Transport", "area": "Urban Develop.", "province": "Hanoi", "source": "VietnamPlus", "date": "2025-12-20", "url": "https://en.vietnamplus.vn/hoa-lac-hi-tech-park-poised-t", "plan_id": "HN-URBAN-WEST,HN-URBAN-INFRA", "grade": "HIGH", "matched": "Y"}, {"id": 370, "title": {"ko": "꽝찌성, 15억 9천만 달러 규모의 꽝차크 3호 LNG 발전 프로젝트 승인", "en": "Quang Tri approves $1.59 billion Quang Trach III LNG power project", "vi": ""}, "summary": {"ko": "꽝찌성은 발전 용량 1,500MW 규모의 꽝차크 3호 LNG 발전소 건설에 41조 8,300억 동(15억 9,000만 달러)을 승인했다. EVN이 지분의 20%를 출자하고, 비엣콤뱅크가 80%의 대출을 조달한다. 이 발전소는 CCGT 기술을 적용한다.", "en": "Quang Tri approves VND 41.83 trillion ($1.59B) Quang Trach III LNG power plant with 1,500MW capacity. EVN provides 20% equity, Vietcombank arranges 80% loan. Uses CCGT technology.", "vi": "Quảng Trị phê duyệt dự án nhà máy điện khí hóa lỏng (LNG) Quảng Trạch III với tổng vốn đầu tư 41,83 nghìn tỷ đồng (1,59 tỷ USD) và công suất 1.500 MW. Tập đoàn Điện lực Việt Nam (EVN) góp 20% vốn chủ sở hữu, trong khi Ngân hàng Thương mại Nhà nước Việt Nam (Vietcombank) thu xếp 80% khoản vay. Dự án sử dụng công nghệ tuabin khí chu trình kết hợp (CCGT)."}, "sector": "Power", "area": "Energy Develop.", "province": "Quang Tri", "source": "vir.com.vn", "date": "2025-12-15", "url": "https://vir.com.vn/quang-tri-green-lights-159-billion-lng-fired-power-project-142928.html", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": ""}, {"id": 371, "title": {"ko": "정부, 2025~2030년 주요 도시의 스마트 시티 개발을 추진", "en": "Government targets smart city development in major cities 2025-2030", "vi": ""}, "summary": {"ko": "정부는 2025년부터 2030년까지 하노이, 호치민시, 다낭, 하이퐁에 스마트 시티를 조성할 계획이다. 주요 교차로에는 AI 교통 모니터링 시스템이 도입되었다. 스마트 조명을 통해 에너지 비용을 15~20% 절감하고 있다.", "en": "Government aims to develop smart cities in Hanoi, Ho Chi Minh City, Da Nang, Hai Phong during 2025-2030. AI traffic monitoring deployed at key intersections. Smart lighting reduces energy costs 15-20%.", "vi": "Chính phủ đặt mục tiêu phát triển các thành phố thông minh tại Hà Nội, Thành phố Hồ Chí Minh, Đà Nẵng và Hải Phòng trong giai đoạn 2025-2030. Hệ thống giám sát giao thông bằng trí tuệ nhân tạo (AI) đã được triển khai tại các nút giao thông trọng điểm. Hệ thống chiếu sáng thông minh giúp giảm chi phí năng lượng từ 15% đến 20%."}, "sector": "Smart City", "area": "Urban Develop.", "province": "Vietnam", "source": "vietnam.vn", "date": "2025-12-15", "url": "https://www.vietnam.vn/en/phat-trien-do-thi-thong-minh-tu-nen-tang-cntt-va-du-lieu-so", "plan_id": "", "grade": "", "matched": ""}, {"id": 941, "title": {"ko": "vir.com.vn", "en": "Quang Tri approves $1.59 billion Quang Trach III LNG power project", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Quang Tri", "date": "2025-12-15", "url": "https://vir.com.vn/quang-tri-green-lights-159-billion-l", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 372, "title": {"ko": "베트남 최초의 LNG 발전소인 뇽트락 3호 및 4호 발전소가 가동을 시작했다", "en": "Nhon Trach 3 and 4 LNG power plants inaugurated as Vietnam's first", "vi": ""}, "summary": {"ko": "논트락 3호 및 4호 LNG 화력발전소가 준공되었으며, 2026년 초 상업 운전을 시작할 예정이다. GE 9HA.02 터빈을 사용해 총 1,624MW의 용량을 갖추었으며, 62~64%의 효율로 연간 90억 kWh의 전력을 생산할 예정이다.", "en": "Nhon Trach 3 and 4 LNG power plants inaugurated, scheduled for commercial operations early 2026. Combined 1,624 MW capacity using GE 9HA.02 turbines, generating 9 billion kWh annually at 62-64% efficiency.", "vi": "Nhà máy điện khí hóa lỏng Nhơn Trạch 3 và 4 đã chính thức đi vào hoạt động, dự kiến sẽ bắt đầu vận hành thương mại vào đầu năm 2026. Tổng công suất của hai nhà máy là 1.624 MW, sử dụng tuabin GE 9HA.02, với sản lượng điện hàng năm đạt 9 tỷ kWh và hiệu suất từ 62% đến 64%."}, "sector": "Power", "area": "Energy Develop.", "province": "Dong Nai", "source": "theinvestor.vn", "date": "2025-12-14", "url": "https://theinvestor.vn/vietnams-first-lng-fueled-power-plants-inaugurated-d17858.html", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": ""}, {"id": 942, "title": {"ko": "theinvestor.vn", "en": "Nhon Trach 3 and 4 LNG power plants inaugurated as Vietnam's first", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Dong Nai", "date": "2025-12-14", "url": "https://theinvestor.vn/vietnams-first-lng-fueled-power-", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 373, "title": {"ko": "베트남, 2030년까지 18만 1,000헥타르 규모의 산업단지 600개 조성 목표", "en": "Vietnam targets 600 industrial parks with 181,000 ha by 2030", "vi": ""}, "summary": {"ko": "2025년 말까지 베트남에는 총 면적 14만 6,000헥타르에 달하는 478개의 산업단지가 조성될 예정이다. 2030년까지는 산업단지를 600개, 총 면적 18만 1,000헥타르로 확대할 계획이다. 산업 클러스터는 1,100개에서 2,000개로 늘어날 전망이다.", "en": "By end 2025, Vietnam to have 478 industrial parks covering 146,000 ha. Plan to expand to 600 IPs with 181,000 ha by 2030. Industrial clusters to increase from 1,100 to 2,000.", "vi": "Đến cuối năm 2025, Việt Nam sẽ có 478 khu công nghiệp với tổng diện tích 146.000 ha. Kế hoạch mở rộng lên 600 khu công nghiệp với tổng diện tích 181.000 ha vào năm 2030. Số lượng các cụm công nghiệp sẽ tăng từ 1.100 lên 2.000."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Vietnam", "source": "dtinews.dantri.com.vn", "date": "2025-12-13", "url": "https://dtinews.dantri.com.vn/vietnam-today/vietnam-aims-for-181000-ha-of-industrial-parks-by-2030-20251213112917464.htm", "plan_id": "", "grade": "", "matched": ""}, {"id": 374, "title": {"ko": "애플, 2026년까지 베트남 학교 대상 깨끗한 물 공급 프로젝트 확대", "en": "Apple expands clean water project for Vietnam schools through 2026", "vi": ""}, "summary": {"ko": "애플과 그래비티 워터(Gravity Water)가 칸지오(Can Gio)의 롱호아(Long Hoa) 중학교에 빗물 수집 시스템을 완공했다. 2025~2026년에는 메콩 델타 지역 학교들로 사업을 확대할 계획이다. 이전에는 호아빈(Hoa Binh) 지역의 131개 학교를 지원한 바 있다.", "en": "Apple and Gravity Water complete rainwater harvesting system at Long Hoa Middle School in Can Gio. Plans expansion to Mekong Delta schools in 2025-26. Previously supported 131 schools in Hoa Binh.", "vi": "Apple và Gravity Water đã hoàn thành hệ thống thu gom nước mưa tại Trường Trung học Cơ sở Long Hòa, huyện Cần Giờ. Hai đơn vị này có kế hoạch mở rộng dự án đến các trường học ở Đồng bằng sông Cửu Long trong giai đoạn 2025-2026. Trước đó, họ đã hỗ trợ 131 trường học tại tỉnh Hòa Bình."}, "sector": "Power", "area": "Energy Develop.", "province": "Can Gio", "source": "tuoitre.vn", "date": "2025-12-10", "url": "https://news.tuoitre.vn/apple-to-expand-clean-water-project-for-vietnam-schools-through-2026-103251210153846409.htm", "plan_id": "", "grade": "", "matched": ""}, {"id": 375, "title": {"ko": "차세대 외국인 직접 투자를 유치하려면 산업단지의 혁신이 필요하다", "en": "Industrial parks transformation needed for new generation FDI", "vi": ""}, "summary": {"ko": "산업단지에 차세대 외국인 직접투자(FDI)를 유치하기 위한 포럼이 개최되었다. 세 가지 중점 과제는 산업단지의 친환경화, 관리의 디지털화, 서비스 및 인적 자원 개선이다. 스마트 산업단지 모델로 나아가고 있다.", "en": "Forum on attracting new generation FDI into industrial parks held. Three priorities: greening IPs, digitalizing management, improving services and human resources. Moving towards smart IP model.", "vi": "Diễn đàn về thu hút vốn đầu tư trực tiếp nước ngoài (FDI) thế hệ mới vào các khu công nghiệp đã được tổ chức. Ba ưu tiên chính bao gồm: phát triển bền vững các khu công nghiệp, số hóa hoạt động quản lý, nâng cao chất lượng dịch vụ và nguồn nhân lực. Hướng tới mô hình khu công nghiệp thông minh."}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "Vietnam", "source": "vietnam.vn", "date": "2025-11-28", "url": "https://www.vietnam.vn/en/khu-cong-nghiep-can-lot-xac-de-don-lan-song-fdi-the-he-moi", "plan_id": "", "grade": "", "matched": ""}, {"id": 376, "title": {"ko": "LNG 논트락 3·4 발전 단지 프로젝트의 추진 현황 (2025년 11월 21일 업데이트) | 베트남 에너지 매거진", "en": "Implementation status of LNG Nhon Trach 3 and 4 power project clusters (updated November 21, 2025) | Vietnam Energy Magazine", "vi": ""}, "summary": {"ko": "편집부로 문의하기 기존 댓글 댓글, 댓글 댓글 - 전망 댓글 전력 석유 및 가스 석탄 산업 원자력, 재생 에너지 재생 에너지 원자력 과학, 기술, 환경 문화...", "en": "Contact the editorial office Existing comments Comments, Comments Comments - Forecasts Comments Electricity Oil and gas Coal industry Nuclear power, renewable energy Renewable energy Atomic energy Science, technology, environment Culture...", "vi": "Liên hệ với ban biên tập Các bình luận hiện có Bình luận, Bình luận Bình luận - Dự báo Bình luận Điện Dầu khí Ngành than Năng lượng hạt nhân, năng lượng tái tạo Nă tnamenergy.vn", "date": "2025-08-11", "url": "https://vietnamenergy.vn/strengthening-the-members-of-the-steering-committee-for-the-construction-of-vietnams-nuclear-power-plant-34673.html", "plan_id": "", "grade": "", "matched": ""}, {"id": 414, "title": {"ko": "MOIT, 지역 상한 관세로 해상 풍력 가격 책정 프레임워크 설정", "en": "MOIT sets offshore wind pricing framework with regional ceiling tariffs", "vi": ""}, "summary": {"ko": "MOIT는 해상 풍력 가격 체계를 공개합니다: 지역별 VND 3,078.9-3,975.1/kWh. 북부 지역은 VND 3,975.1/kWh로 가장 높습니다. 첫 번째 해상 풍력 프로젝트는 2025년 말까지 착공될 수 있습니다.", "en": "MOIT unveils offshore wind pricing framework: VND 3,078.9-3,975.1/kWh by region. Northern region highest at VND 3,975.1/kWh. First offshore wind project could break ground by year-end 2025.", "vi": "Bộ Công Thương công bố khung giá điện gió ngoài khơi: 3.078,9-3.975,1 đồng/kWh theo vùng. Miền Bắc cao nhất ở mức 3.975,1 đồng/kWh. Dự án điện gió ngoài khơi đầu tiên có thể khởi công vào cuối năm 2025"}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "reccessary.com", "date": "2025-07-15", "url": "https://www.reccessary.com/en/news/vietnam-offshore-wind-rates-eyes-first-project-by-2025", "plan_id": "", "grade": "", "matched": ""}, {"id": 415, "title": {"ko": "BRG-Sumitomo 파트너십으로 북부 하노이 지속 가능한 도시 프로젝트 진행", "en": "North Hanoi sustainable city project progresses with BRG-Sumitomo partnership", "vi": ""}, "summary": {"ko": "BRG Group과 Sumitomo Corporation이 272헥타르 북부 하노이 도시 개발. 총 비용은 약 4,000억 엔입니다. IT산업단지, 의료복합단지, 상업시설 등이 포함됩니다. 2025년 첫 입주 예정", "en": "272-hectare North Hanoi urban development by BRG Group and Sumitomo Corporation. Total cost ~400 billion yen. Includes IT industrial park, medical complex, commercial facilities. First residents expected 2025.", "vi": "Dự án phát triển đô thị Bắc Hà Nội rộng 272 ha do Tập đoàn BRG và Tập đoàn Sumitomo hợp tác phát triển. Tổng chi phí ~ 400 tỷ yên. Bao gồm khu công nghiệp CNTT, tổ hợp y tế, cơ sở thương mại. Cư dân đầu tiên dự kiến ​​vào năm 2025."}, "sector": "Power", "area": "Energy Develop.", "province": "Hanoi", "source": "sumitomocorp.com", "date": "2025-06-15", "url": "https://www.sumitomocorp.com/en/jp/enrich/contents/0001", "plan_id": "", "grade": "", "matched": ""}, {"id": 416, "title": {"ko": "Thu Duc City WWTP는 동남아시아 최대의 폐수 처리장으로 거듭났습니다", "en": "Thu Duc City WWTP becomes Southeast Asia's largest wastewater treatment plant", "vi": "Nhà máy xử lý nước thải Thành phố Thủ Đức trở thành nhà máy xử lý nước thải lớn nhất Đông Nam Á"}, "summary": {"ko": "Thu Duc City에 5억 2,400만 달러를 투자하여 동남아시아 최대 규모의 WWTP를 건설 중입니다. MBBR 기술은 하루 110만m3를 처리하고 8개 구역에 걸쳐 180만 명의 주민에게 서비스를 제공합니다.", "en": "Southeast Asia's largest WWTP under construction in Thu Duc City with $524 million investment. Features MBBR technology, treating 1.1 million m3/day, serving 1.8 million residents across eight districts.", "vi": "Nhà máy xử lý nước thải lớn nhất Đông Nam Á đang được xây dựng tại Thành phố Thủ Đức với vốn đầu tư 524 triệu USD. Sử dụng công nghệ MBBR, xử lý 1,1 triệu m3/ngày, phục vụ 1,8 triệu cư dân trên 8 quận."}, "sector": "Waste Water", "area": "Environment", "province": "Ho Chi Minh City", "source": "trade.gov", "date": "2025-06-15", "url": "https://www.trade.gov/market-intelligence/vietnam-water-and-wastewater-management", "plan_id": "VN-WW-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 949, "title": {"ko": "trade.gov", "en": "Thu Duc City WWTP becomes Southeast Asia's largest wastewater treatment plant", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Waste Water", "area": "Environment", "province": "", "source": "Ho Chi Minh City", "date": "2025-06-15", "url": "https://www.trade.gov/market-intelligence/vietnam-water", "plan_id": "VN-WW-2030", "grade": "", "matched": "Y"}, {"id": 417, "title": {"ko": "25억 6천만 달러 규모의 타이 빈(Thai Binh) LNG 발전소, 2025년 말 착공 예정", "en": "$2.56 billion Thai Binh LNG power plant set for groundbreaking late 2025", "vi": ""}, "summary": {"ko": "Tokyo Gas, Kyuden 및 Truong Thanh Vietnam의 Thai Binh LNG 발전소(25억 6천만 달러)는 2025년 9월 착공합니다. 용량 1,500MW, 2028년 4분기 최초의 터빈 온라인, 연간 120만 톤의 LNG 소비.", "en": "Thai Binh LNG power plant ($2.56B) by Tokyo Gas, Kyuden, and Truong Thanh Vietnam to break ground September 2025. 1,500MW capacity, first turbine online Q4/2028, consuming 1.2M tons LNG annually.", "vi": "Nhà máy điện LNG Thái Bình (2,56 tỷ USD) của Tokyo Gas, Kyuden và Trường Thành Việt Nam sẽ khởi công vào tháng 9 năm 2025. Công suất 1.500MW, tua-bin đầu tiên trực tuyến vào quý 4/2028, tiêu thụ 1,2 triệu tấn LNG hàng năm."}, "sector": "Power", "area": "Energy Develop.", "province": "Thai Binh", "source": "theinvestor.vn", "date": "2025-06-14", "url": "https://theinvestor.vn/25-bln-lng-power-plant-in-northern-vietnam-set-for-groundbreaking-in-late-2025-d16005.html", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": ""}, {"id": 950, "title": {"ko": "theinvestor.vn", "en": "$2.56 billion Thai Binh LNG power plant set for groundbreaking late 2025", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Thai Binh", "date": "2025-06-14", "url": "https://theinvestor.vn/25-bln-lng-power-plant-in-northe", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 418, "title": {"ko": "법령 100은 수입된 LNG 프로젝트에 대해 65% 전력 오프테이크를 보장합니다.", "en": "Decree 100 guarantees 65% power offtake for imported LNG projects", "vi": ""}, "summary": {"ko": "법령 100은 대구에서 최대 10 년 동안 LNG 프로젝트에 대한 최소 65% 의 연간 전력 오프 테이크를 보장하는 프레임 워크를 수립합니다. LNG Quang Ninh, Thai Binh, Hai Lang, Son My 등의 프로젝트를 다룹니다.", "en": "Decree 100 establishes framework guaranteeing at least 65% annual power offtake for LNG projects for up to 10 years from cod. Covers projects including Quang Ninh LNG, Thai Binh, Hai Lang, Son My.", "vi": "Nghị định 100 thiết lập khuôn khổ đảm bảo thu hồi tối thiểu 65% điện năng hàng năm cho các dự án LNG trong tối đa 10 năm kể từ COD. Bao gồm các dự án LNG Quảng Ninh, Thái Bình, Hải Lăng, Sơn Mỹ."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "theinvestor.vn", "date": "2025-05-10", "url": "https://theinvestor.vn/vietnam-guarantees-65-power-offtake-for-imported-lng-to-power-projects-over-10-years-d15604.html", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "HIGH", "matched": ""}, {"id": 951, "title": {"ko": "theinvestor.vn", "en": "Decree 100 guarantees 65% power offtake for imported LNG projects", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2025-05-10", "url": "https://theinvestor.vn/vietnam-guarantees-65-power-offt", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 419, "title": {"ko": "2025년 석유, 가스 및 재생 에너지로의 전환 개요", "en": "Oil, Gas and Transition to Renewables overview for 2025", "vi": ""}, "summary": {"ko": "법령 100/2025 개정 법령 56/2025는 LNG 프로젝트 프레임워크를 명확히 합니다. Hai Su Vang-1X 탐사는 블록 15-2/17에서 1억 7천만 ~ 4억 3천만 배럴을 확인합니다. Song Doc 필드는 베트남 최초의 해체 프로젝트를 표시합니다.", "en": "Decree 100/2025 amending Decree 56/2025 clarifies LNG project framework. Hai Su Vang-1X exploration confirms 170-430 million barrels in Block 15-2/17. Song Doc field marks Vietnam's first decommissioning project.", "vi": "Nghị định 100/2025 sửa đổi Nghị định 56/2025 làm rõ khung dự án LNG. Thăm dò Hải Sư Vàng-1X xác nhận 170-430 triệu thùng ở Lô 15-2/17. Trường Song Đốc đánh dấu dự án ngừng hoạt động đầu tiên của Việt Nam."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "chambers.com", "date": "2025-05-08", "url": "https://practiceguides.chambers.com/practice-guides/oil-gas-and-the-transition-to-renewables-2025/vietnam/trends-and-developments", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "POLICY", "matched": ""}, {"id": 952, "title": {"ko": "chambers.com", "en": "Oil, Gas and Transition to Renewables overview for 2025", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2025-05-08", "url": "https://practiceguides.chambers.com/practice-guides/oil", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 953, "title": {"ko": "The Shiv Energy", "en": "Vietnam Revised PDP8 Decision 768 — offshore wind solar targets raised", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "National / Unspeci", "date": "2025-04-27", "url": "https://the-shiv.com/vietnams-revised-power-development", "plan_id": "VN-PWR-PDP8,VN-PWR-PDP8-RENEWABLE", "grade": "", "matched": "Y"}, {"id": 420, "title": {"ko": "베트남 태양광 발전량은 2030년까지 개정된 PDP8에 따라 73GW 목표에 도달합니다.", "en": "Vietnam solar capacity reaches 73GW target by 2030 under revised PDP8", "vi": ""}, "summary": {"ko": "개정된 PDP8은 2030년까지 태양열 용량을 73GW (12.8GW 목표에서 증가), 2050년까지 296GW로 설정합니다. 육상 풍력은 21GW에서 38GW로 증가했습니다. 그리드 현대화는 재생 가능 통합을 강조했습니다.", "en": "Revised PDP8 sets solar capacity at 73 GW by 2030 (up from 12.8 GW target), 296 GW by 2050. Onshore wind increased to 38 GW from 21 GW. Grid modernization emphasized for renewable integration.", "vi": "PDP8 sửa đổi đặt công suất năng lượng mặt trời ở mức 73 GW vào năm 2030 (tăng từ mục tiêu 12,8 GW), 296 GW vào năm 2050. Điện gió trên bờ tăng lên 38 GW từ 21 GW. Hiện đại hóa lưới điện được nhấn mạnh để tích hợp năng lượng tái tạo."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "solarquarter.com", "date": "2025-04-21", "url": "https://solarquarter.com/2025/04/21/vietnam-ramps-up-wind-and-solar-targets-to-meet-soaring-energy-demand/", "plan_id": "VN-PWR-PDP8", "grade": "", "matched": ""}, {"id": 954, "title": {"ko": "solarquarter.com", "en": "Vietnam solar capacity reaches 73GW target by 2030 under revised PDP8", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2025-04-21", "url": "https://solarquarter.com/2025/04/21/vietnam-ramps-up-wi", "plan_id": "VN-PWR-PDP8", "grade": "", "matched": "Y"}, {"id": 421, "title": {"ko": "개정된 PDP8, 신재생에너지 목표 대폭 상향", "en": "Revised PDP8 raises renewable energy targets significantly", "vi": ""}, "summary": {"ko": "개정된 국가 에너지 계획은 2030년까지 재생 가능 에너지의 28~36%, 2050년까지 최대 75%를 목표로 합니다. 육상 풍력은 2030년까지 26,066MW, 해상 풍력은 6,000~17,032MW에 도달합니다. 태양광 발전 용량은 2030년까지 8,736MW, 2050년까지 189,342MW입니다.", "en": "Revised national energy plan targets 28-36% renewables by 2030, up to 75% by 2050. Onshore wind to reach 26,066 MW by 2030, offshore wind 6,000-17,032 MW. Solar capacity 8,736 MW by 2030, 189,342 MW by 2050.", "vi": "Quy hoạch năng lượng quốc gia sửa đổi đặt mục tiêu sử dụng 28-36% năng lượng tái tạo vào năm 2030, lên 75% vào năm 2050. Năng lượng gió trên bờ đạt 26.066 MW vào năm 2030, gió ngoài khơi 6.000-17.032 MW. Công suất điện mặt trời 8.736 MW vào năm 2030, 189.342 MW vào năm 2050."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "climateinsider.com", "date": "2025-04-17", "url": "https://climateinsider.com/2025/04/17/vietnam-looks-to-more-wind-solar-power-in-revised-energy-plan/", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-RENEWABLE", "grade": "", "matched": ""}, {"id": 955, "title": {"ko": "climateinsider.com", "en": "Revised PDP8 raises renewable energy targets significantly", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2025-04-17", "url": "https://climateinsider.com/2025/04/17/vietnam-looks-to-", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-RENEWABLE", "grade": "", "matched": "Y"}, {"id": 422, "title": {"ko": "결정 768은 더 높은 용량 목표를 가진 개정된 PDP8을 승인합니다.", "en": "Decision 768 approves Revised PDP8 with higher capacity targets", "vi": ""}, "summary": {"ko": "PM은 2025년 4월 15일부터 개정된 PDP8을 승인하는 결정 768을 발표합니다. 총 전력 용량은 2030년까지 183,291-236,363MW, 2050년까지 774,503-838,681MW입니다. 재생 가능 에너지 개발을 강조합니다.", "en": "PM issues Decision 768 approving Revised PDP8 effective April 15, 2025. Total power capacity 183,291-236,363 MW by 2030, 774,503-838,681 MW by 2050. Emphasizes renewable energy development.", "vi": "Thủ tướng ban hành Quyết định 768 phê duyệt PDP8 sửa đổi có hiệu lực từ ngày 15 tháng 4 năm 2025. Tổng công suất điện 183.291-236.363 MW vào năm 2030, 774.503-838.681 MW vào năm 2050. Nhấn mạnh phát triển năng lượng tái tạo."}, "sector": "Power", "area": "Energy Develop.", "province": "Vietnam", "source": "kpmg.com", "date": "2025-04-15", "url": "https://kpmg.com/vn/en/home/insights/2025/07/revised-pdp-8.html", "plan_id": "VN-PWR-PDP8", "grade": "POLICY", "matched": ""}, {"id": 956, "title": {"ko": "kpmg.com", "en": "Decision 768 approves Revised PDP8 with higher capacity targets", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2025-04-15", "url": "https://kpmg.com/vn/en/home/insights/2025/07/revised-pd", "plan_id": "VN-PWR-PDP8", "grade": "", "matched": "Y"}, {"id": 423, "title": {"ko": "Tam Sinh Nghia 폐기물 에너지 소각 공장 건설이 Tay Bac 시설에서 시작됩니다.", "en": "Tam Sinh Nghia waste-to-energy incineration plant construction begins at Tay Bac facility", "vi": ""}, "summary": {"ko": "Tay Bac 시설 내 호치민시 최초의 폐기물 에너지 소각장 건설이 시작되었습니다. 이 프로젝트는 초기에 3억 6,500만kWh를 생산한 후 연간 최대 1,216GWh를 생산하여 100,000~338,000가구에 전력을 공급할 것을 약속합니다.", "en": "Construction began on Ho Chi Minh City's first waste-to-energy incineration plant within Tay Bac facility. The project promises to generate 365 million kWh initially, then up to 1,216 GWh annually, powering 100,000 to 338,000 homes.", "vi": "Khởi công xây dựng nhà máy đốt rác thải thành năng lượng đầu tiên của Thành phố Hồ Chí Minh tại cơ sở Tây Bắc. Dự án hứa hẹn ban đầu sẽ tạo ra 365 triệu kWh, sau đó lên tới 1.216 GWh mỗi năm, cung cấp năng lượng cho 100.000 đến 338.000 ngôi nhà."}, "sector": "Solid Waste", "area": "Environment", "province": "Ho Chi Minh City", "source": "dialogue.earth", "date": "2025-04-08", "url": "https://dialogue.earth/en/pollution/can-incinerators-solve-vietnams-waste-crisis/", "plan_id": "VN-SWM-NATIONAL-2030", "grade": "", "matched": ""}, {"id": 957, "title": {"ko": "dialogue.earth", "en": "Tam Sinh Nghia waste-to-energy incineration plant construction begins at Tay Bac facility", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Solid Waste", "area": "Environment", "province": "", "source": "Ho Chi Minh City", "date": "2025-04-08", "url": "https://dialogue.earth/en/pollution/can-incinerators-so", "plan_id": "VN-SWM-NATIONAL-2030", "grade": "", "matched": "Y"}, {"id": 424, "title": {"ko": "Hoa Binh-Xuan Mai 수자원 프로젝트를 위해 베트남 최초의 20년 만기 녹색채권 발행", "en": "Vietnam's first 20-year green bond issued for Hoa Binh-Xuan Mai water project", "vi": ""}, "summary": {"ko": "GuarantCo는 Hoa Binh-Xuan Mai 깨끗한 물 프로젝트에 1조 1,920억 VND를 보장합니다. 하노이 지역에 공급되는 일일 용량 150,000m3의 물 부문 베트남 최초의 녹색 프로젝트 채권입니다.", "en": "GuarantCo guarantees VND 1,192 billion for Hoa Binh-Xuan Mai clean water project. Vietnam's first green project bond in water sector with 150,000 m3/day capacity, supplying Hanoi region.", "vi": "Công ty bảo lãnh bảo lãnh 1.192 tỷ đồng cho dự án nước sạch Hòa Bình-Xuân Mai Trái phiếu dự án xanh đầu tiên của Việt Nam trong lĩnh vực nước với công suất 150.000 m3/ngày, cung cấp cho khu vực Hà Nội."}, "sector": "Power", "area": "Energy Develop.", "province": "Hoa Binh", "source": "pidg.org", "date": "2025-03-28", "url": "https://pidg.org/vietnams-first-20-year-project-and-green-bond-guaranteed-by-guarantco-and-issued-by-the-xuan-mai-water-supply-system-project/", "plan_id": "", "grade": "", "matched": ""}, {"id": 958, "title": {"ko": "The Investor", "en": "VSIP Thai Binh industrial park breaks ground — PM and Singapore PM present", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Industrial Parks", "area": "Urban Develop.", "province": "", "source": "Thai Binh" ww.aoshearman.com/en/insights/vietnam-impact-on-lng-to-power-projects-of-the-new-electricity-law-guiding-decree-56", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "POLICY", "matched": ""}, {"id": 959, "title": {"ko": "aoshearman.com", "en": "Decree 56 issued guiding Electricity Law implementation for LNG projects", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Power", "area": "Energy Develop.", "province": "", "source": "Vietnam", "date": "2025-03-03", "url": "https://www.aoshearman.com/en/insights/vietnam-impact-o", "plan_id": "VN-PWR-PDP8, VN-PWR-PDP8-LNG", "grade": "", "matched": "Y"}, {"id": 427, "title": {"ko": "Khanh Son 고형 폐기물 소각 발전소 프로젝트, 2025년 1분기 착공", "en": "Khanh Son Solid Waste Incineration Power Plant project breaks ground Q1 2025", "vi": ""}, "summary": {"ko": "베트남 환경 JSC가 Khanh Son 폐기물 에너지 플랜트 건설을 시작합니다. 총 투자액 2조 210억 VND, 처리 용량 650톤/일, Martin Corp. 기계식 화격자 기술을 사용한 18MW 발전.", "en": "Vietnam Environment JSC begins construction of Khanh Son waste-to-energy plant. Total investment VND 2,021 billion, processing capacity 650 tons/day, 18MW power generation using Martin Corp. mechanical grate technology.", "vi": "Công ty Cổ phần Môi trường Việt Nam khởi công xây dựng nhà máy xử lý rác thải thành năng lượng Khánh Sơn Tổng mức đầu tư 2.021 tỷ đồng, công suất chế biến 650 tấn/ngày, phát điện 18MW sử dụng công nghệ ghi cơ khí của Martin Corp."}, "sector": "Solid Waste", "area": "Environment", "province": "Da Nang", "source": "vietnam.vn", "date": "2025-02-15", "url": "https://www.vietnam.vn/en/cong-nghe-tien-tien-cua-nha-may-dien-rac-sap-trien-khai", "plan_id": "VN-SWM-NATIONAL-2030", "grade": "", "matched": ""}, {"id": 960, "title": {"ko": "vietnam.vn", "en": "Khanh Son Solid Waste Incineration Power Plant project breaks ground Q1 2025", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Solid Waste", "area": "Environment", "province": "", "source": "Da Nang", "date": "2025-02-15", "url": "https://www.vietnam.vn/en/cong-n  Phạm Minh Chính yêu cầu Petrovietnam hoàn thành Nhon Trạch 3 và 4 trước tháng 6/2025. Thúc đẩy tháo gỡ vướng mắc trong dự án phát điện khí Cá Voi Xanh cho Trung tâm Điện lực Dung Quất."}, "sector": "Power", "area": "Energy Develop.", "province": "Dong Nai", "source": "offshore-energy.biz", "date": "2025-01-07", "url": "https://www.offshore-energy.biz/pm-wants-vietnams-first-lng-power-plants-online-by-june-as-delays-loom/", "plan_id": "", "grade": "", "matched": ""}, {"id": 430, "title": {"ko": "옌자(Yen Xa) 폐수처리장, 베트남 북부 최대 규모로 시범 가동 시작", "en": "Yen Xa Wastewater Treatment Plant begins trial operation as Northern Vietnam's largest", "vi": "Nhà máy xử lý nước thải Yên Xá bắt đầu vận hành thử nghiệm lớn nhất miền Bắc Việt Nam"}, "summary": {"ko": "베트남 북부 최대 규모의 Yen Xa WWTP가 시범 운영을 시작합니다. 2025년까지 하노이의 폐수 처리율 50-55% 목표에 매우 중요합니다. 시는 현재 4개의 새로운 프로젝트가 계획되어 있으며 처리율은 30%입니다.", "en": "Yen Xa WWTP, Northern Vietnam's largest, begins trial operation. Critical for Hanoi's target of 50-55% wastewater treatment rate by 2025. City currently at 30% treatment rate with 4 new projects planned.", "vi": "Nhà máy xử lý nước thải Yên Xá lớn nhất miền Bắc Việt Nam bắt đầu vận hành thử nghiệm Rất quan trọng đối với mục tiêu tỷ lệ xử lý nước thải 50-55% của Hà Nội vào năm 2025. Thành phố hiện đạt tỷ lệ xử lý 30% với 4 dự án mới được quy hoạch."}, "sector": "Waste Water", "area": "Environment", "province": "Hanoi", "source": "b-company.jp", "date": "2025-01-03", "url": "https://b-company.jp/trial-operation-of-northern-vietnam-largest-wastewater-treatment-plant/", "plan_id": "VN-WW-2030", "grade": "MEDIUM", "matched": "Y"}, {"id": 962, "title": {"ko": "b-company.jp", "en": "Yen Xa Wastewater Treatment Plant begins trial operation as Northern Vietnam's largest", "vi": ""}, "summary": {"ko": "", "en": "", "vi": ""}, "sector": "Waste Water", "area": "Environment", "province": "", "source": "Hanoi", "date": "2025-01-03", "url": "https://b-company.jp/trial-operation-of-northern-vietna", "plan_id": function initTTS() {
    if (!('speechSynthesis' in window)) return;
    const load = () => { voices = speechSynthesis.getVoices(); populateVoiceList(); updateVoiceInfo(); };
    load();
    speechSynthesis.onvoiceschanged = load;
    [500, 1000, 2000].forEach(t => setTimeout(load, t));
    document.getElementById('voice-rate').oninput = e => {
        document.getElementById('rate-val').textContent = e.target.value;
    };
}
function populateVoiceList() {
    const sel = document.getElementById('voice-select');
    if (!sel) return;
    sel.innerHTML = '<option value="auto">🎯 자동 (최적 음성)</option>';
    const grp = { ko:[], en:[], vi:[] };
    voices.forEach((v,i) => {
        const l = v.lang.toLowerCase().replace('_','-');
        if (l.startsWith('ko')) grp.ko.push({v,i});
        else if (l.startsWith('en')) grp.en.push({v,i});
        else if (l.startsWith('vi')) grp.vi.push({v,i});
    });
    [['🇰🇷 한국어','ko'],['🇺🇸 영어','en'],['🇻🇳 베트남어','vi']].forEach(([label,key]) => {
        if (!grp[key].length) return;
        sel.innerHTML += `<optgroup label="${label}">`;
        grp[key].forEach(({v,i}) => sel.innerHTML += `<option value="${i}">${v.name}</option>`);
        sel.innerHTML += '</optgroup>';
    });
}
function getBestVoice(targetLang) {
    if (!voices.length) voices = speechSynthesis.getVoices();
    const kw = {
        ko:['Google','Wavenet','Neural','Microsoft','Heami','Seoyeon','Siri','Premium'],
        en:['Google','Wavenet','Neural','Microsoft','Samantha','Alex','Siri','Premium','Zira'],
        vi:['Google','Wavenet','Neural','Microsoft','Chi','Linh','Premium','Vietnamese'],
    }[targetLang] || [];
    const codes = {ko:['ko-KR','ko'],en:['en-US','en-GB','en'],vi:['vi-VN','vi']}[targetLang] || [];
    for (const k of kw) for (const c of codes) {
        const v = voices.find(v => v.lang.replace('_','-').toLowerCase() === c.replace('_','-').toLowerCase() && v.name.toLowerCase().includes(k.toLowerCase()));
        if (v) return v;
    }
    for (const k of kw) {
        const v = voices.find(v => v.lang.toLowerCase().startsWith(targetLang) && v.name.toLowerCase().includes(k.toLowerCase()));
        if (v) return v;
    }
    for (const c of codes) {
        const v = voices.find(v => v.lang.replace('_','-').toLowerCase().startsWith(targetLang));
        if (v) return v;
    }
    if (targetLang === 'vi') { console.warn('No Vietnamese TTS voice'); return null; }
    return voices.find(v => v.default) || voices[0];
}
function updateVoiceInfo() {
    const el = document.getElementById('voice-info');
    if (!el) return;
    const parts = [];
    ['ko','en','vi'].forEach(l => {
        const v = getBestVoice(l);
        parts.push(v ? `${['🇰🇷','🇺🇸','🇻🇳']['ko,en,vi'.split(',').indexOf(l)]} ${v.name.substring(0,12)}` : `${['🇰🇷','🇺🇸','🇻🇳']['ko,en,vi'.split(',').indexOf(l)]} 없음`);
    });
    el.textContent = parts.join(' | ');
}
function speak(text, targetLang, onEnd) {
    if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
    speechSynthesis.cancel();
    if (!voices.length) voices = speechSynthesis.getVoices();
    const clean = text.replace(/\s+/g,' ').trim();
    if (!clean) { if (onEnd) onEnd(); return; }
    const sel = document.getElementById('voice-select');
    let voice;
    if (sel && sel.value !== 'auto') voice = voices[parseInt(sel.value)];
    if (!voice || !voice.lang.toLowerCase().startsWith(targetLang)) voice = getBestVoice(targetLang);
    if (targetLang === 'vi' && !voice) { showToast('⚠️ 베트남어 TTS 미지원'); if (onEnd) onEnd(); return; }
    if (!voice) { if (onEnd) onEnd(); return; }
    const chunks = [];
    let rem = clean;
    while (rem.length > 0) {
        if (rem.length <= 150) { chunks.push(rem); break; }
        let si = rem.lastIndexOf('. ', 150);
        if (si < 50) si = rem.lastIndexOf(' ', 150);
        if (si < 50) si = 150;
        chunks.push(rem.substring(0, si+1).trim());
        rem = rem.substring(si+1).trim();
    }
    let ci = 0;
    function next() {
        if (ci >= chunks.length) { ttsPlaying=false; if (onEnd) onEnd(); return; }
        const u = new SpeechSynthesisUtterance(chunks[ci]);
        u.voice = voice; u.lang = voice.lang;
        u.rate = parseFloat(document.getElementById('voice-rate')?.value||1) * (targetLang==='vi'?0.9:1);
        u.pitch = 1; u.volume = 1;
        u.onstart = () => { ttsPlaying=true; };
        u.onend   = () => { ci++; if (ci<chunks.length) setTimeout(next,100); else { ttsPlaying=false; if(onEnd)onEnd(); } };
        u.onerror = () => { ttsPlaying=false; if(onEnd)onEnd(); };
        speechSynthesis.speak(u);
    }
    next();
}
function stopTTS() {
    if (window.speechSynthesis) speechSynthesis.cancel();
    ttsPlaying=false; briefingPlaying=false;
}

function updateKPI(news) {
    document.getElementById('kpi-total-label').textContent = `전체 ${news.length}건`;
    const sc={}, rc={};
    news.forEach(n => { sc[n.sector]=(sc[n.sector]||0)+1; if(n.province!=='Vietnam') rc[n.province]=(rc[n.province]||0)+1; });
    const topS = Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const topR = Object.entries(rc).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const colors = {'Waste Water':'bg-green-500','Solid Waste':'bg-emerald-500','Water Supply/Drainage':'bg-teal-500','Power':'bg-amber-500','Oil & Gas':'bg-orange-500','Smart City':'bg-violet-500','Industrial Parks':'bg-purple-500'};
    document.getElementById('kpi-sector-list').innerHTML = topS.length
        ? topS.map(([s,c])=>`<div class="flex items-center justify-between"><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full ${colors[s]||'bg-slate-400'}"></span><span class="text-sm">${s}</span></div><span class="font-bold">${c}건</span></div>`).join('')
        : '<p class="text-sm text-slate-400">데이터 없음</p>';
    document.getElementById('kpi-region-list').innerHTML = topR.length
        ? topR.map(([r,c])=>`<div class="flex items-center justify-between"><span class="text-sm">${r}</span><span class="font-bold">${c}건</span></div>`).join('')
        : '<p class="text-sm text-slate-400">데이터 없음</p>';
}

function generateBriefing(news) {
    const total=news.length;
    const sc={}, rc={};
    news.forEach(n=>{ sc[n.sector]=(sc[n.sector]||0)+1; rc[n.province]=(rc[n.province]||0)+1; });
    const topS=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
    const topR=Object.entries(rc).sort((a,b)=>b[1]-a[1]);
    const top3S=topS.slice(0,3), top3R=topR.slice(0,3);
    const pt={ko:period==='today'?'오늘':'금주',en:period==='today'?'today':'this week',vi:period==='today'?'hôm nay':'tuần này'};
    const scripts={
        ko:[`${pt.ko} 총 ${total}건의 베트남 인프라 뉴스가 수집되었습니다.`,
            topS[0]?`섹터별로는 ${topS[0][0]} 분야가 ${topS[0][1]}건으로 가장 활발합니다.`:'',
            top3S.length>1?`상위 3개 섹터는 ${top3S.map(([s,c])=>`${s} ${c}건`).join(', ')}입니다.`:'',
            topR[0]?`지역별로는 ${topR[0][0]}에서 ${topR[0][1]}건으로 가장 많습니다.`:'',
            top3R.length>1?`주요 지역은 ${top3R.map(([r,c])=>`${r} ${c}건`).join(', ')}입니다.`:'',
            '아래 차트에서 연간 분포와 월별 트렌드를 확인하세요.'],
        en:[`Total ${total} Vietnam infrastructure news collected ${pt.en}.`,
            topS[0]?`By sector, ${topS[0][0]} leads with ${topS[0][1]} articles.`:'',
            top3S.length>1?`Top 3 sectors: ${top3S.map(([s,c])=>`${s} ${c}`).join(', ')}.`:'',
            topR[0]?`By region, ${topR[0][0]} has the most with ${topR[0][1]} articles.`:'',
            top3R.length>1?`Key regions: ${top3R.map(([r,c])=>`${r} ${c}`).join(', ')}.`:'',
            'Check charts below for distribution and trends.'],
        vi:[`Tổng cộng ${total} tin tức hạ tầng Việt Nam được thu thập ${pt.vi}.`,
            topS[0]?`Theo ngành, ${topS[0][0]} dẫn đầu với ${topS[0][1]} bài.`:'',
            top3S.length>1?`Top 3 ngành: ${top3S.map(([s,c])=>`${s} ${c}`).join(', ')}.`:'',
            topR[0]?`Theo vùng, ${topR[0][0]} có nhiều nhất với ${topR[0][1]} bài.`:'',
            top3R.length>1?`Vùng chính: ${top3R.map(([r,c])=>`${r} ${c}`).join(', ')}.`:'',
            'Xem biểu đồ bên dưới.'],
    };
    briefingParts = (scripts[lang]||scripts.ko).filter(Boolean);
    document.getElementById('briefing-text').innerHTML = briefingParts.map((p,i)=>`<span id="bp-${i}" class="inline">${p} </span>`).join('');
}
function playBriefing() {
    if (briefingPlaying) { stopTTS(); resetBriefingUI(); showToast('브리핑 중지'); return; }
    if (!briefingParts.length) { showToast('브리핑 내용이 없습니다'); return; }
    briefingPlaying=true; briefingIdx=0;
    document.getElementById('briefing-btn-text').textContent='중지';
    document.getElementById('briefing-icon').setAttribute('data-lucide','square');
    lucide.createIcons();
    showToast('브리핑 시작');
    playNextBriefingPart();
}
function playNextBriefingPart() {
    if (!briefingPlaying||briefingIdx>=briefingParts.length) { resetBriefingUI(); if(briefingIdx>=briefingParts.length) showToast('브리핑 완료'); return; }
    for(let i=0;i<briefingParts.length;i++){const el=document.getElementById(`bp-${i}`);if(el)el.classList.remove('speaking-text');}
    const curr=document.getElementById(`bp-${briefingIdx}`);
    if(curr){curr.classList.add('speaking-text');curr.scrollIntoView({behavior:'smooth',block:'nearest'});}
    highlightElement(briefingIdx);
    document.getElementById('briefing-progress').style.width=`${((briefingIdx+1)/briefingParts.length)*100}%`;
    speak(briefingParts[briefingIdx],lang,()=>{briefingIdx++;if(briefingPlaying)setTimeout(playNextBriefingPart,500);});
}
function highlightElement(idx) {
    document.querySelectorAll('.kpi-box,.chart-box').forEach(el=>el.classList.remove('highlight-pulse'));
    if(idx===0){document.getElementById('kpi-sector-box')?.classList.add('highlight-pulse');document.getElementById('kpi-region-box')?.classList.add('highlight-pulse');}
    else if(idx===1||idx===2){document.getElementById('kpi-sector-box')?.classList.add('highlight-pulse');document.getElementById('chart-sector-pie')?.classList.add('highlight-pulse');}
    else if(idx===3||idx===4){document.getElementById('kpi-region-box')?.classList.add('highlight-pulse');document.getElementById('chart-region-pie')?.classList.add('highlight-pulse');}
    else{document.getElementById('chart-sector-trend')?.classList.add('highlight-pulse');document.getElementById('chart-region-trend')?.classList.add('highlight-pulse');}
}
function resetBriefingUI() {
    briefingPlaying=false;briefingIdx=0;
    document.getElementById('briefing-btn-text').textContent='브리핑 듣기';
    document.getElementById('briefing-icon').setAttribute('data-lucide','play');
    document.getElementById('briefing-progress').style.width='0%';
    for(let i=0;i<10;i++){const el=document.getElementById(`bp-${i}`);if(el)el.classList.remove('speaking-text');}
    document.querySelectorAll('.kpi-box,.chart-box').forEach(el=>el.classList.remove('highlight-pulse'));
    lucide.createIcons();
}

function quickFilter(type) {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
    let start, end=TODAY_STR;
    switch(type){
        case 'today': start=TODAY_STR; break;
        case 'week':  start=WEEK_START_STR; break;
        case 'month': start=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-01`; break;
        case '2025':  start='2025-01-01'; end='2025-12-31'; break;
        case '2024':  start='2024-01-01'; end='2024-12-31'; break;
        default:      start='2019-01-01'; end=TODAY_STR;
    }
    document.getElementById('db-start').value=start;
    document.getElementById('db-end').value=end;
    searchDB();
}
function searchDB() {
    const kw=document.getElementById('db-keyword').value.toLowerCase().trim();
    const s=document.getElementById('db-start').value;
    const e=document.getElementById('db-end').value;
    const area=document.getElementById('db-area').value;
    const prov=document.getElementById('db-province').value;
    let base = matchedOnlyDB ? BACKEND_DATA.filter(n=>n.plan_id&&n.plan_id.trim()) : BACKEND_DATA;
    dbResults=base.filter(d=>{
        const ts = typeof d.title==='object'?(d.title.ko+' '+d.title.en):d.title;
        if(kw&&!ts.toLowerCase().includes(kw)&&!d.province.toLowerCase().includes(kw)&&!d.sector.toLowerCase().includes(kw)) return false;
        if(s&&d.date<s) return false;
        if(e&&d.date>e) return false;
        if(area!=='all'&&d.area!==area) return false;
        if(prov!=='all'&&d.province!==prov) return false;
        return true;
    });
    dbPage=1; renderDBList();
    showToast(`${dbResults.length}건 검색됨`);
}
function resetDB() {
    document.getElementById('db-keyword').value='';
    document.getElementById('db-start').value='2019-01-01';
    document.getElementById('db-end').value=TODAY_STR;
    document.getElementById('db-area').value='all';
    document.getElementById('db-province').value='all';
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.filter-btn:last-of-type')?.classList.add('active');
    matchedOnlyDB=false;
    const btn=document.getElementById('btn-db-matched');
    if(btn){btn.style.background='#FEF3C7';btn.style.color='#D97706';btn.textContent='📌 Matched';}
    dbResults=[...BACKEND_DATA]; dbPage=1; renderDBList();
    showToast('초기화 완료');
}
function sortDB() {
    const o=document.getElementById('db-sort').value;
    dbResults.sort((a,b)=>o==='newest'?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date));
    renderDBList();
}

                <div class="text-xs text-slate-600 truncate">${n.province||'Vietnam'}</div>
                ${planTag}
            </div>
            <div class="col-span-1 text-xs text-slate-400">${(n.date||'').substring(0,10)}</div>
            <div class="col-span-4 text-xs truncate" style="${titleStyle}" title="${title}">${title}</div>

            <div class="col-span-2 flex justify-center gap-1">
                <button onclick="openModal(${n.id})" class="action-btn w-7 h-7 bg-teal-100 hover:bg-teal-200 rounded flex items-center justify-center" title="요약"><i data-lucide="file-text" class="w-3.5 h-3.5 text-teal-700"></i></button>
                <button onclick="quickSpeak(${n.id})" class="action-btn w-7 h-7 bg-violet-100 hover:bg-violet-200 rounded flex items-center justify-center" title="음성"><i data-lucide="volume-2" class="w-3.5 h-3.5 text-violet-700"></i></button>

            </div>

    }).join('');
    document.getElementById('db-showing').textContent=`${start+1}-${end} / ${dbResults.length}건`;

function exportExcel() {
    if(!dbResults.length){showToast('데이터 없음');return;}

// ============================================================
// PAGINATION
// ============================================================
function renderPages(containerId, current, total, onClick) {
    if (total<=1) { document.getElementById(containerId).innerHTML=''; return; }
    let html=`<button class="page-btn px-2 py-0.5 rounded text-xs ${current===1?'opacity-40':''}" ${current===1?'disabled':''} data-page="${current-1}">◀</button>`;
    let s=Math.max(1,current-2), e=Math.min(total,current+2);
    if(s>1) html+=`<button class="page-btn px-2 py-0.5 rounded text-xs" data-page="1">1</button>`;
    if(s>2) html+='<span class="text-slate-400 text-xs">...</span>';
    for(let i=s;i<=e;i++) html+=`<button class="page-btn px-2 py-0.5 rounded text-xs ${i===current?'active':''}" data-page="${i}">${i}</button>`;
    if(e<total-1) html+='<span class="text-slate-400 text-xs">...</span>';
    if(e<total) html+=`<button class="page-btn px-2 py-0.5 rounded text-xs" data-page="${total}">${total}</button>`;
    html+=`<button class="page-btn px-2 py-0.5 rounded text-xs ${current===total?'opacity-40':''}" ${current===total?'disabled':''} data-page="${current+1}">▶</button>`;
    const container=document.getElementById(containerId);
    container.innerHTML=html;
    container.querySelectorAll('button[data-page]').forEach(btn=>{btn.onclick=()=>onClick(parseInt(btn.dataset.page));});
}

    currentArticle=n; modalLang=lang;
    document.getElementById('m-badge').className=`inline-block px-2 py-0.5 rounded text-xs font-semibold text-white ${SECTOR_CONFIG[n.area]?.color||'sector-env'}`;
    document.getElementById('m-badge').textContent=n.sector;
    document.getElementById('m-province').textContent=n.province;

    // ★ v7.2: Plan_ID 뱃지 (모달)
    const existing=document.getElementById('m-plan-badge');
    if (existing) existing.remove();
    if (n.plan_id && n.plan_id.trim()) {
        const badge=document.createElement('span');
        badge.id='m-plan-badge';
        badge.style.cssText='display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#FEF3C7;color:#D97706;border:1px solid #F59E0B;margin-left:4px;font-family:monospace;';
        const gr=(n.grade||'').toUpperCase();
        const icon=gr==='HIGH'?'★':gr==='LOW'?'▾':'●';
        badge.textContent=`📌 ${n.plan_id}  ${icon}${gr}`;
        document.getElementById('m-province').after(badge);
    }

    const title=typeof n.title==='object'?(n.title[modalLang]||n.title.en||''):n.title;
    const summary=typeof n.summary==='object'?(n.summary[modalLang]||n.summary.en||''):n.summary;
    document.getElementById('m-title').textContent=title;
    document.getElementById('m-meta').textContent=`${n.date} | ${n.source}`;
    document.getElementById('m-summary').textContent=summary;
    document.getElementById('m-link').href=n.url||'#';
    updateModalLangBtns();
    stopTTS();
    document.getElementById('m-tts-bar').style.width='0%';
    document.getElementById('m-tts-status').textContent='준비';
    document.getElementById('m-tts-icon').setAttribute('data-lucide','play');
    document.getElementById('modal').classList.remove('hidden');
    document.body.style.overflow='hidden';
    lucide.createIcons();
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); document.body.style.overflow=''; stopTTS(); }
function setModalLang(l) {
    modalLang=l; updateModalLangBtns();
    if (currentArticle) {
        const t=typeof currentArticle.title==='object'?(currentArticle.title[l]||currentArticle.title.en||''):currentArticle.title;
        const s=typeof currentArticle.summary==='object'?(currentArticle.summary[l]||currentArticle.summary.en||''):currentArticle.summary;
        document.getElementById('m-title').textContent=t;
        document.getElementById('m-summary').textContent=s;
    }
}
function updateModalLangBtns() {
    document.querySelectorAll('.modal-lang').forEach(b=>{
        b.className=`modal-lang flex-1 py-1 rounded text-xs font-medium ${b.dataset.lang===modalLang?'bg-white text-teal-700 shadow-sm':'text-slate-600'}`;
    });
}
function mTTSToggle() {
    if (!currentArticle) return;
    if (ttsPlaying) {
        stopTTS();
        document.getElementById('m-tts-icon').setAttribute('data-lucide','play');
        document.getElementById('m-tts-status').textContent='일시정지';
        document.getElementById('m-tts-btn').classList.remove('tts-active');
    } else {
        document.getElementById('m-tts-icon').setAttribute('data-lucide','pause');
        document.getElementById('m-tts-status').textContent='재생중';
        document.getElementById('m-tts-btn').classList.add('tts-active');
        const t=typeof currentArticle.title==='object'?(currentArticle.title[modalLang]||currentArticle.title.en||''):currentArticle.title;
        const s=typeof currentArticle.summary==='object'?(currentArticle.summary[modalLang]||currentArticle.summary.en||''):currentArticle.summary;
        let prog=0;
        const iv=setInterval(()=>{if(!ttsPlaying){clearInterval(iv);return;}prog+=2;document.getElementById('m-tts-bar').style.width=Math.min(prog,95)+'%';},100);
        speak(t+'. '+s, modalLang, ()=>{
            document.getElementById('m-tts-icon').setAttribute('data-lucide','play');
            document.getElementById('m-tts-status').textContent='완료';
            document.getElementById('m-tts-bar').style.width='100%';
            document.getElementById('m-tts-btn').classList.remove('tts-active');
            lucide.createIcons();
        });
    }
    lucide.createIcons();
}
function mTTSStop() {
    stopTTS();
    document.getElementById('m-tts-icon').setAttribute('data-lucide','play');
    document.getElementById('m-tts-status').textContent='준비';
    document.getElementById('m-tts-bar').style.width='0%';
    document.getElementById('m-tts-btn').classList.remove('tts-active');
    lucide.createIcons();
}
function mTTSRestart() { mTTSStop(); setTimeout(mTTSToggle,100); }

// ============================================================
// UTILS
// ============================================================
function toggleVoice() { document.getElementById('voice-panel').classList.toggle('hidden'); }
function showToast(msg) {
    const t=document.getElementById('toast');
    document.getElementById('toast-msg').textContent=msg;
    t.classList.remove('translate-y-16','opacity-0');
    setTimeout(()=>t.classList.add('translate-y-16','opacity-0'),2500);
}
document.addEventListener('click', e=>{
    if(!document.getElementById('voice-panel').contains(e.target)&&!e.target.closest('[onclick*="toggleVoice"]'))
        document.getElementById('voice-panel').classList.add('hidden');
});
</script>
</body>
</html>
