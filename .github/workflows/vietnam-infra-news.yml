name: Vietnam Infrastructure News Pipeline Weekly

on:
  schedule:
    - cron: '0 9 * * 6'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - collect-only
          - dashboard-only
      hours_back:
        description: 'Hours to collect'
        required: false
        default: '168'
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  weekly-pipeline:
    name: Weekly Infrastructure News Collection
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      HOURS_BACK:        ${{ github.event.inputs.hours_back || '168' }}
      RUN_MODE:          ${{ github.event.inputs.mode || 'full' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PYTHONIOENCODING:  utf-8
      PYTHONUNBUFFERED:  "1"
      TZ:                "Asia/Seoul"

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser pandas openpyxl anthropic pydantic lxml python-dateutil pytz deep-translator
          pip show deep-translator | grep -E "Name|Version"
          echo "packages installed OK"

      - name: Prepare Working Directories
        run: |
          mkdir -p data/raw data/database docs
          echo "directories ready"

      - name: Run Weekly Pipeline
        run: |
          echo "=== pipeline start mode=${{ env.RUN_MODE }} hours=${{ env.HOURS_BACK }} ==="
          python scripts/main.py --mode ${{ env.RUN_MODE }} --hours-back ${{ env.HOURS_BACK }}
          echo "=== pipeline done ==="

      - name: Commit Excel Database
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/database/ || true
          if git diff --staged --quiet; then
            echo "no excel changes"
          else
            git commit -m "Weekly DB Update Run#${{ github.run_number }}"
            git push
            echo "excel committed"
          fi

      - name: Batch translate old articles
        run: python3 scripts/batch_translate.py --batch 20

      - name: Commit Dashboard to GitHub Pages
        if: always()
        run: |
          git add docs/ || true
          if git diff --staged --quiet; then
            echo "no dashboard changes"
          else
            git commit -m "Weekly Dashboard Run#${{ github.run_number }}"
            git push
            echo "dashboard committed"
          fi

      - name: Send Email Notification
        if: always()
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python3 scripts/send_email.py

      - name: Upload Pipeline Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pipeline-log-${{ github.run_number }}
          path: |
            pipeline.log
            data/raw/
          retention-days: 14

      - name: Final Summary Report
        if: always()
        run: |
          echo "Vietnam Infra News Weekly Pipeline Done"
          echo "Run ${{ github.run_number }}"
          echo "Dashboard https://hms4792.github.io/vietnam-infra-news/"
