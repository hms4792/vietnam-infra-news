# ============================================================
# Vietnam Infrastructure News — 주간 수집 워크플로
# 파일: .github/workflows/collect_weekly.yml
#
# 용도: v5.3 RSS 보강 반영 후 1회성 주간 수집 검증
#   - 오늘(2026-03-29) KST 18:00 자동 실행 (UTC 09:00)
#   - hours_back=168 (7일치 소급 수집)
#   - 결과 확인 후 이 파일은 비활성화(disabled) 처리
#
# 전환 계획:
#   1단계 (오늘): 이 파일로 주간 수집 1회 실행 → 결과 확인
#   2단계 (내일~): collect_daily.yml 활성화, 이 파일 스케줄 제거
# ============================================================

name: 🗓️ Weekly News Collection (v5.3 검증용)

on:
  # 오늘 KST 18:00 = UTC 09:00 자동 실행 (1회)
  schedule:
    - cron: '0 9 * * 6'   # 매주 토요일 UTC 09:00 (KST 18:00)

  # 수동 실행 버튼 (Actions 탭에서 즉시 테스트 가능)
  workflow_dispatch:
    inputs:
      hours_back:
        description: '소급 수집 시간 (기본 168 = 7일)'
        required: false
        default: '168'

# 동일 워크플로 중복 실행 방지
concurrency:
  group: news-collection
  cancel-in-progress: false

jobs:
  collect:
    name: 📡 뉴스 수집 및 DB 업데이트
    runs-on: ubuntu-latest
    timeout-minutes: 55   # 주간 수집은 시간이 더 걸림

    steps:
      # ── 1. 레포지토리 체크아웃 ───────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 환경 설정 ──────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 의존성 설치 ──────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 openpyxl lxml

      # ── SQLite DB 동기화 (Excel 기준 재동기화 — 중복 문제 방지)
      - name: 🔄 Sync SQLite DB from Excel (prevent duplicate skip)
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
        run: |
          if [ -f scripts/reset_sqlite_db.py ]; then
            python3 scripts/reset_sqlite_db.py
          else
            echo "reset_sqlite_db.py not found, skipping sync"
          fi

      # ── 4. 뉴스 수집 실행 ───────────────────────────────
      - name: 📰 Run news collector (v5.3)
        env:
          HOURS_BACK: ${{ github.event.inputs.hours_back || '168' }}
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
          LANGUAGE_FILTER: all
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          ENABLE_GNEWS: ${{ secrets.GNEWS_API_KEY != '' && 'true' || 'false' }}
        run: |
          echo "=== Vietnam Infra News Collector v5.3 ==="
          echo "Hours back: $HOURS_BACK"
          echo "Mode: WEEKLY (7-day lookback)"
          python3 scripts/news_collector.py --hours-back $HOURS_BACK

      # ── 5. 번역/요약 처리 ────────────────────────────────
      - name: 🌐 Translate & summarize articles
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
        run: |
          if [ -f scripts/ai_summarizer.py ]; then
            python3 scripts/ai_summarizer.py
          else
            echo "ai_summarizer.py not found, skipping"
          fi

      # ── 6. Excel DB 업데이트 ────────────────────────────
      - name: 📊 Update Excel database
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
        run: |
          if [ -f scripts/excel_updater.py ]; then
            python3 scripts/excel_updater.py
          else
            echo "excel_updater.py not found — collector handles Excel directly"
          fi

      # ── 7. 대시보드 재생성 ───────────────────────────────
      - name: 🖥️ Generate dashboard
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: |
          if [ -f scripts/dashboard_updater.py ]; then
            python3 scripts/dashboard_updater.py
          else
            echo "dashboard_updater.py not found, skipping"
          fi

      # ── 8. 변경사항 Git 커밋 & 푸시 ─────────────────────
      - name: 💾 Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          # 변경사항이 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🗓️ Weekly collection (v5.3) — $(date '+%Y-%m-%d %H:%M') KST"
            git push
          fi

      # ── 9. 이메일 알림 ──────────────────────────────────
      - name: 📧 Send email notification
        if: always()
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          if [ -f scripts/email_notifier.py ]; then
            python3 scripts/email_notifier.py || echo "Email notification skipped"
          else
            echo "email_notifier.py not found, skipping"
          fi
