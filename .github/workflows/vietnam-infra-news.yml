# ════════════════════════════════════════════════════════════════════════
# Vietnam Infrastructure News Pipeline — WEEKLY (보존용 비활성화)
#
# ⚠️  현재 상태: DISABLED (비활성화)
#     자동 실행이 중단되어 있으며, 수동 실행(workflow_dispatch)만 가능합니다.
#
# 재활성화 방법:
#   1. 아래 schedule 블록의 주석(#)을 제거하세요.
#   2. daily_pipeline.yml의 schedule 블록을 주석 처리하세요.
#
# 주간 실행 스케줄 (재활성화 시):
#   - 매주 토요일 KST 18:00 (UTC 09:00)
#   - Cron: '0 9 * * 6'
# ════════════════════════════════════════════════════════════════════════

name: Vietnam Infra News — Weekly Pipeline (DISABLED)

on:
  # ─────────────────────────────────────────────────────────────────────
  # 아래 schedule 블록 전체가 주석 처리되어 자동 실행이 비활성화된 상태
  # 재활성화 시: 아래 4줄의 '#' 를 제거하세요
  # ─────────────────────────────────────────────────────────────────────
  # schedule:
  #   - cron: '0 9 * * 6'   # UTC 09:00 = KST 18:00, 매주 토요일

  # 수동 실행은 항상 가능 (GitHub Actions 탭 → Run workflow)
  workflow_dispatch:
    inputs:
      hours_back:
        description: '수집 기간 (시간 단위, 기본값: 168 = 7일치)'
        required: false
        default: '168'
        type: string
      mode:
        description: '실행 모드'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - collect-only
          - dashboard-only

permissions:
  contents: write

jobs:
  weekly-pipeline:
    name: Weekly News Collection & Dashboard Update
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 주간 수집 + 번역 처리 → 최대 60분

    env:
      HOURS_BACK: ${{ github.event.inputs.hours_back || '168' }}
      RUN_MODE:   ${{ github.event.inputs.mode || 'full' }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      TZ: "Asia/Seoul"

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            requests \
            beautifulsoup4 \
            feedparser \
            pandas \
            openpyxl \
            lxml \
            python-dateutil \
            pytz \
            deep-translator
          echo "패키지 설치 완료"

      - name: Prepare Working Directories
        run: |
          mkdir -p data/database
          mkdir -p docs
          echo "디렉토리 준비 완료"

      - name: Run Weekly Pipeline
        run: |
          echo "=== 주간 파이프라인 시작 ==="
          echo "수집 기간: ${{ env.HOURS_BACK }}시간 (7일치)"
          echo "실행 시각: $(date '+%Y-%m-%d %H:%M:%S KST')"
          python3 scripts/main.py \
            --mode ${{ env.RUN_MODE }} \
            --hours-back ${{ env.HOURS_BACK }}
          echo "=== 주간 파이프라인 완료 ==="

      - name: Commit Excel Database to Repository
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/database/ || true
          if git diff --staged --quiet; then
            echo "Excel DB 변경 없음 — 커밋 생략"
          else
            git commit -m "Weekly DB Update [$(date '+%Y-%m-%d')] Run#${{ github.run_number }}"
            git push
            echo "Excel DB 커밋 완료"
          fi

      - name: Commit Dashboard to GitHub Pages (docs/)
        if: always()
        run: |
          git add docs/ || true
          if git diff --staged --quiet; then
            echo "대시보드 변경 없음 — 커밋 생략"
          else
            git commit -m "Weekly Dashboard [$(date '+%Y-%m-%d')] Run#${{ github.run_number }}"
            git push
            echo "대시보드 커밋 완료"
          fi

      - name: Send Email Notification
        if: always()
        run: python3 scripts/send_email.py

      - name: Upload Pipeline Log (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-log-${{ github.run_number }}
          path: |
            *.log
            logs/
          retention-days: 30   # 주간 로그는 30일 보관
          if-no-files-found: ignore
