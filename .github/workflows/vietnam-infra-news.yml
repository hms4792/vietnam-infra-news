# ============================================================
# collect_weekly.yml — 주간 수집 파이프라인
# .github/workflows/collect_weekly.yml
#
# 스케줄: 매주 토요일 KST 10:00 (UTC 01:00)
# 역할: 7일치 수집 + SA-6 품질검증 + SA-7 맥락분석 +
#        SA-8 MI 보고서(docx) + SA-8 PPT + 이메일 발송
#
# v6.4 수정사항 (2026-04-26):
#   - Step 14/15 순서 교체: 보고서 이동 → MI Dashboard 빌드 순서로 수정
#     (이전: 빌드 후 이동 → 스캔 항상 0개 / 수정: 이동 후 빌드 → 정상 스캔)
# v6.3 수정사항 (2026-04-26):
#   - git push 충돌 수정: git pull --rebase origin main 추가
#   - SA-7 context_analyzer.py 스텝 추가 (누락 복구)
#   - Node.js 패키지: cd scripts && npm install (로컬 설치)
#   - generate_mi_report.py: ANTHROPIC_API_KEY 개행문자 제거는
#     스크립트 내부 .strip() 처리로 해결 (v1.1)
#
# 영구 제약 (절대 변경 금지):
#   - 이메일 시크릿: EMAIL_USERNAME / EMAIL_PASSWORD
#   - GitHub Pages: main 브랜치 /docs (gh-pages 금지)
#   - YAML inline python3 -c 금지 → 별도 .py 파일만 호출
#   - Anthropic API: 번역 금지, SA-7/SA-8 분석에만 사용
# ============================================================

name: Weekly Collection v6.4

on:
  schedule:
    - cron: '0 1 * * 6'    # 매주 토요일 KST 10:00 (UTC 01:00)
  workflow_dispatch:
    inputs:
      hours_back:
        description: '소급 수집 시간 (기본 168=7일)'
        required: false
        default: '168'
      skip_sa8:
        description: 'SA-8 MI 보고서 생성 건너뜀 (true/false)'
        required: false
        default: 'false'
      rule_only:
        description: 'SA-7 규칙기반만 실행 (Haiku 미사용, true/false)'
        required: false
        default: 'false'

concurrency:
  group: weekly-collection
  cancel-in-progress: false

jobs:
  weekly:
    name: 주간 수집 + SA-6/7/8 MI 보고서
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── Step 1: 체크아웃 ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0          # ★ v6.2: 전체 히스토리 필요 (rebase용)

      # ── Step 2: Python 설정 ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3: Node.js 설정 (SA-8 docx/pptx 빌더) ─────────────
      - name: Set up Node.js 18 (SA-8 builder)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # ── Step 4: Python 패키지 설치 ──────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests openpyxl feedparser beautifulsoup4 \
                      lxml deep-translator

      # ── Step 5: Node.js 패키지 설치 (로컬 설치 — 영구 제약) ─────
      # YAML inline python 금지 준수 — 별도 스크립트 경유
      - name: Install Node.js dependencies (SA-8)
        run: |
          cd scripts
          npm install pptxgenjs docx
          cd ..
        continue-on-error: true

      # ── Step 6: SA-1~4 메인 파이프라인 ──────────────────────────
      # Step1: collect_news(hours_back) → Step2: AISummarizer
      # Step3: ExcelUpdater.update_all() → Step4: build_dashboard
      # 실행 순서 영구 고정 (main.py 내부 순서 변경 금지)
      - name: SA-1~4 News + Translate + Excel + Dashboard
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          EMAIL_USERNAME:   ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python3 scripts/main.py --hours ${{ github.event.inputs.hours_back || '168' }}

      # ── Step 8: SA-6 품질검증 + 정책매핑 ───────────────────────
      - name: SA-6 Quality Context Agent (정책 매핑)
        run: python3 scripts/quality_context_agent.py
        continue-on-error: true
        
      - name: Rebuild Dashboard (SA-6 sum_ko 반영)
        run: python3 scripts/build_dashboard.py
        env:
          EXCEL_PATH: ${{ env.EXCEL_PATH }}
        continue-on-error: true

      # ── Step 9: SA-4 대시보드 재빌드 (SA-6 결과 반영) ──────────
      # build_dashboard.py v7.2: plan_id/grade 필드 포함
      - name: SA-4 Rebuild dashboard (SA-6 결과 반영)
        run: python3 scripts/build_dashboard.py
        continue-on-error: true

      # ── Step 10: Genspark 공유 파일 내보내기 ────────────────────
      - name: Export shared files for Genspark
        run: python3 scripts/export_shared.py
        continue-on-error: true

      # ── Step 11: SA-7 맥락분석 ──────────────────────────────────
      # context_analyzer.py v1.1:
      #   - api_key.strip() 으로 GitHub Secret 개행문자 제거
      #   - COL 딕셔너리 tit_ko/sum_ko/sum_en/grade/plan_id 별칭 완전 반영
      #   - 빈 결과도 context_output.json 생성
      #   - --rule-only: Haiku 미사용 (ANTHROPIC_API_KEY 불필요)
      - name: SA-7 Context Analyzer (맥락 기반 진행단계 분석)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -f scripts/context_analyzer.py ]; then
            if [ "${{ github.event.inputs.rule_only }}" = "true" ]; then
              python3 scripts/context_analyzer.py --rule-only --days=7
            else
              python3 scripts/context_analyzer.py --days=7
            fi
          else
            echo "context_analyzer.py 없음 — 건너뜀"
          fi
        continue-on-error: true

      # ── Step 12: SA-8 MI 보고서 (Word docx) ─────────────────────
      # generate_mi_report.py:
      #   - knowledge_index.json Layer1 로드
      #   - Excel DB 최신 7일 기사 추출
      #   - Claude Haiku API → 플랜별 분석문 생성
      #   - docs/VN_Infra_MI_Weekly_Report_YYYYMMDD.docx 생성
      #   - --send-email: 이메일 첨부 발송
      - name: SA-8 MI Report (docx) — Haiku AI analysis + 이메일
        if: ${{ github.event.inputs.skip_sa8 != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_USERNAME:    ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
        run: |
          if [ -f scripts/generate_mi_report.py ]; then
            python3 scripts/generate_mi_report.py --send-email
          else
            echo "generate_mi_report.py 없음 — SA-8 건너뜀"
          fi
        continue-on-error: true

      # ── Step 13: SA-8 PPT 보고서 ────────────────────────────────
      # build_mi_ppt.js v1.1:
      #   - 동적 BASE_DIR (하드코딩 /home/claude 제거)
      #   - docs/shared/knowledge_index.json 우선 탐색
      #   - sa8_report_payload.json AI 분석 결과 연동
      - name: SA-8 MI Report (pptx) — Visual deck
        if: ${{ github.event.inputs.skip_sa8 != 'true' }}
        run: |
          if [ -f scripts/build_mi_ppt.js ]; then
            node scripts/build_mi_ppt.js
          else
            echo "build_mi_ppt.js 없음 — PPT 생성 건너뜀"
          fi
        continue-on-error: true

      # ── Step 14: 보고서 파일 docs/reports/ 이동 ─────────────────
      # ★ v6.4: Step 15(이동) → Step 14로 앞당김
      #   (MI Dashboard 빌드가 파일 이동 후 스캔해야 0개 방지)
      - name: Move reports to docs/reports/
        run: |
          mkdir -p docs/reports
          DOCX=$(ls docs/VN_Infra_MI_Weekly_Report_*.docx 2>/dev/null | tail -1)
          if [ -z "$DOCX" ]; then
            DOCX=$(ls VN_Infra_MI_Weekly_Report_*.docx 2>/dev/null | tail -1)
          fi
          if [ -n "$DOCX" ]; then
            mv "$DOCX" docs/reports/ 2>/dev/null || true
            echo "docx 이동: $DOCX"
          else
            echo "신규 docx 없음 — 이전 파일 유지"
          fi
          PPTX=$(ls docs/VN_Infra_MI_Weekly_Report_*.pptx 2>/dev/null | tail -1)
          if [ -z "$PPTX" ]; then
            PPTX=$(ls VN_Infra_MI_Weekly_Report_*.pptx 2>/dev/null | tail -1)
          fi
          if [ -n "$PPTX" ]; then
            mv "$PPTX" docs/reports/ 2>/dev/null || true
            echo "pptx 이동: $PPTX"
          else
            echo "신규 pptx 없음 — 이전 파일 유지"
          fi
          echo "현재 docs/reports/ 보고서 목록:"
          ls docs/reports/VN_Infra_MI_Weekly_Report_*.* 2>/dev/null || echo "  (없음)"
        continue-on-error: true

      # ── Step 15: MI Dashboard 데이터 빌드 ───────────────────────
      # ★ v6.4: 파일 이동(Step 14) 후 실행해야 보고서 스캔이 정상 동작
      - name: MI Dashboard 데이터 빌드
        run: |
          if [ -f scripts/build_mi_dashboard_data.py ]; then
            python3 scripts/build_mi_dashboard_data.py
          else
            echo "build_mi_dashboard_data.py 없음 — 건너뜀"
          fi
        continue-on-error: true

      # ── Step 16: 커밋 & 푸시 ─────────────────────────────────────
      # ★ v6.2 핵심 수정: git pull --rebase 로 push 충돌 방지
      # daily_pipeline과 동시 실행 시 remote 변경사항 먼저 통합 후 push
      - name: Commit and push all changes
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add data/ docs/ || true
          git diff --staged --quiet && echo "변경사항 없음" && exit 0
          git commit -m \
            "chore: weekly pipeline $(date +'%Y-%m-%d') — SA-6/7/8 MI report [automated]"
          # ★ v6.2: rebase 후 push (fetch first 오류 방지)
          git pull --rebase origin main || true
          git push origin main
