# ============================================================
# Vietnam Infrastructure News — 일일 수집 워크플로
# 파일: .github/workflows/collect_daily.yml
#
# 활성화 시점: 2026-03-30(내일)부터
# 스케줄: 매일 KST 20:00 = UTC 11:00
#
# [주의] 오늘(2026-03-29)은 collect_weekly.yml 이 먼저 실행됨
#        내일부터 이 파일이 매일 자동 실행
#
# 영구 제약 (변경 금지):
#   - EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
#   - GitHub Pages: main 브랜치 /docs 폴더
#   - EMAIL_USERNAME / EMAIL_PASSWORD (GMAIL_* 사용 금지)
#   - YML 내 python3 -c "..." 인라인 코드 금지
# ============================================================

name: 📅 Daily News Collection (v5.3)

on:
  # 매일 KST 20:00 = UTC 11:00 자동 실행
  schedule:
    - cron: '0 11 * * *'

  # 수동 실행 (Actions 탭 → Run workflow)
  workflow_dispatch:
    inputs:
      hours_back:
        description: '소급 수집 시간 (기본 24)'
        required: false
        default: '24'
      force_weekly:
        description: '주간 모드 강제 실행 (168시간)'
        required: false
        default: 'false'
        type: boolean

# 동일 워크플로 중복 실행 방지
concurrency:
  group: news-collection
  cancel-in-progress: false

jobs:
  collect:
    name: 📡 일일 뉴스 수집 및 DB 업데이트
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 일일 수집은 30분 제한

    steps:
      # ── 1. 레포지토리 체크아웃 ───────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 환경 설정 ──────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 의존성 설치 ──────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 openpyxl lxml

      # ── 4. 수집 시간 결정 ────────────────────────────────
      # force_weekly=true 이면 168, 아니면 inputs 값 또는 기본 24
      - name: ⏱️ Set hours_back
        id: set_hours
        run: |
          if [ "${{ github.event.inputs.force_weekly }}" = "true" ]; then
            echo "hours=168" >> $GITHUB_OUTPUT
            echo "Mode: FORCED WEEKLY (168h)"
          else
            HOURS="${{ github.event.inputs.hours_back || '24' }}"
            echo "hours=$HOURS" >> $GITHUB_OUTPUT
            echo "Mode: DAILY (${HOURS}h)"
          fi

      # ── 5. 뉴스 수집 실행 ───────────────────────────────
      - name: 📰 Run news collector (v5.3)
        env:
          HOURS_BACK: ${{ steps.set_hours.outputs.hours }}
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
          LANGUAGE_FILTER: all
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          ENABLE_GNEWS: ${{ secrets.GNEWS_API_KEY != '' && 'true' || 'false' }}
        run: |
          echo "=== Vietnam Infra News Collector v5.3 ==="
          echo "Hours back: $HOURS_BACK"
          python3 scripts/news_collector.py --hours-back $HOURS_BACK

      # ── 6. 번역/요약 처리 ────────────────────────────────
      - name: 🌐 Translate & summarize articles
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
        run: |
          if [ -f scripts/ai_summarizer.py ]; then
            python3 scripts/ai_summarizer.py
          else
            echo "ai_summarizer.py not found, skipping"
          fi

      # ── 7. Excel DB 업데이트 ────────────────────────────
      - name: 📊 Update Excel database
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
        run: |
          if [ -f scripts/excel_updater.py ]; then
            python3 scripts/excel_updater.py
          else
            echo "excel_updater.py not found — collector handles Excel directly"
          fi

      # ── 8. 대시보드 재생성 ───────────────────────────────
      - name: 🖥️ Generate dashboard
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: |
          if [ -f scripts/dashboard_updater.py ]; then
            python3 scripts/dashboard_updater.py
          else
            echo "dashboard_updater.py not found, skipping"
          fi

      # ── 9. 변경사항 Git 커밋 & 푸시 ─────────────────────
      - name: 💾 Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📅 Daily collection (v5.3) — $(date '+%Y-%m-%d %H:%M') KST"
            git push
          fi

      # ── 10. 이메일 알림 ─────────────────────────────────
      - name: 📧 Send email notification
        if: always()
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          if [ -f scripts/email_notifier.py ]; then
            python3 scripts/email_notifier.py || echo "Email notification skipped"
          else
            echo "email_notifier.py not found, skipping"
          fi
