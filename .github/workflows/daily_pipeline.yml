# daily_pipeline.yml — v7.2
# 매일 KST 20:00 (= UTC 11:00) 자동 실행
#
# 변경사항 (v7.2):
#   - SA-7 맥락 매핑 스텝 추가: python3 scripts/quality_context_agent.py
#     (이슈2 해결: Matched_Plan 0건 / 이메일 "정책연계 0건" 문제)
#   - Commit 대상에 docs/shared/ 추가 (Genspark 공유 파일)
#
# 영구 제약:
#   - YAML inline python3 -c "..." 절대 금지
#   - GitHub Pages: main 브랜치 /docs (gh-pages 금지)
#   - 이메일 시크릿: EMAIL_USERNAME / EMAIL_PASSWORD

name: Daily Vietnam Infra News Pipeline v7.2

on:
  schedule:
    - cron: '0 11 * * *'   # 매일 UTC 11:00 = KST 20:00
  workflow_dispatch:
    inputs:
      hours_back:
        description: '수집 기간 (시간, 기본 24)'
        required: false
        default: '24'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 \
                      pandas openpyxl deep-translator lxml

      - name: Validate environment
        run: python3 scripts/validate_env.py
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          EMAIL_USERNAME:   ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}

      - name: Run pipeline
        run: python3 scripts/main.py --hours ${{ github.event.inputs.hours_back || '24' }}
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          EMAIL_USERNAME:   ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}

      - name: Rebuild dashboard (failsafe)
        if: always()
        run: python3 scripts/build_dashboard.py
        continue-on-error: true

      # ── 이슈2 해결: SA-7 맥락 매핑 ──────────────────────
      # quality_context_agent.py → docs/shared/knowledge_index.json 읽어
      # 기사↔마스터플랜 매핑 → Matched_Plan 업데이트 + quality_report.json 생성
      # 이메일 제목 "정책연계 N건" 정상화
      - name: SA-7 context matching
        run: python3 scripts/quality_context_agent.py
        continue-on-error: true

      - name: Export shared files for Genspark
        run: python3 scripts/export_shared.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/database/Vietnam_Infra_News_Database_Final.xlsx
          git add docs/index.html
          git add docs/shared/ || true
          git add data/shared/  || true
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 건너뜀"
          else
            DATE_KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
            git commit -m "Daily update: ${DATE_KST}"
            git push origin main
          fi

      - name: Send notification
        if: success()
        run: python3 scripts/send_email.py
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        continue-on-error: true
