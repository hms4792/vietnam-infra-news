# ============================================================
# Vietnam Infrastructure News — 일일 수집 파이프라인
# .github/workflows/daily_pipeline.yml
#
# 스케줄: 매일 KST 20:00 (UTC 11:00)
# v5.9: SA-6 실행 순서 변경 (Excel 업데이트 전으로 이동)
#       → policy_highlighted_articles.json 생성 후 Excel에 노란색 반영
# ============================================================

name: Daily Pipeline v5.9

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      hours_back:
        description: '수집 시간 범위 (기본 24)'
        required: false
        default: '24'

concurrency:
  group: news-collection
  cancel-in-progress: false

jobs:
  daily:
    name: 일일 수집 및 대시보드 업데이트
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests openpyxl feedparser beautifulsoup4 lxml deep-translator deepl

      - name: Check Excel file
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: |
          python3 scripts/check_excel.py

      - name: Collect news
        env:
          HOURS_BACK: ${{ github.event.inputs.hours_back || '24' }}
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
          LANGUAGE_FILTER: all
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          DEEPL_API_KEY:    ${{ secrets.DEEPL_API_KEY }}
        run: |
          echo "=== News Collection (hours_back=$HOURS_BACK) ==="
          python3 scripts/news_collector.py --hours-back $HOURS_BACK --agent-mode

      - name: Batch translate (40건 소급 — 매핑 우선)
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          if [ -f scripts/batch_translate.py ]; then
            python3 scripts/batch_translate.py
          else
            echo "batch_translate.py not found, skipping"
          fi

      - name: Run Quality Context Agent SA-6 (정책 매핑 + 노란색 플래그 생성)
        env:
          REPORT_MODE: daily
        run: |
          python3 scripts/quality_context_agent.py
          echo "=== 정책 연계 기사 하이라이트 플래그 생성 완료 ==="

      - name: Update Excel with policy highlights (SA-4)
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
        run: |
          python3 scripts/run_excel_updater.py

      - name: Build dashboard
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: |
          echo "=== Dashboard Build ==="
          python3 scripts/build_dashboard.py
          echo "index.html size: $(wc -c < docs/index.html) bytes"

      - name: Inject policy highlights into dashboard
        run: |
          python3 scripts/inject_policy_highlights.py
          echo "=== Policy highlight injection 완료 ==="

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/database/Vietnam_Infra_News_Database_Final.xlsx
          git add data/vietnam_infrastructure_news.db || true
          git add docs/index.html
          git add data/agent_output/ || true
          git add docs/shared/quality_report_daily.json || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Daily update $(date '+%Y-%m-%d') KST"
            git push
            echo "Pushed successfully"
          fi

      - name: Send email notification
        if: always()
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: |
          if [ -f scripts/send_email.py ]; then
            python3 scripts/send_email.py || echo "Email skipped"
          else
            echo "send_email.py not found"
          fi

      - name: Export shared files for Genspark
        run: python3 scripts/export_shared.py

      - name: Commit and push shared files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/shared/
          git diff --cached --quiet || git commit -m "Daily shared export $(date +%Y-%m-%d)"
          git push
