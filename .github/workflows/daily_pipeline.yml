# daily_pipeline.yml — v7.1
# 매일 KST 20:00 (= UTC 11:00) 자동 실행
#
# 영구 제약:
#   - YAML 내 inline python3 -c "..." 절대 금지 → 별도 .py 파일만 사용
#   - GitHub Pages: main 브랜치 /docs 폴더 (gh-pages 금지)
#   - 이메일 시크릿: EMAIL_USERNAME / EMAIL_PASSWORD (GMAIL_* 없음)
#   - 번역: Google Translate (Anthropic API 절대 금지)
#   - 대상 파일: data/database/Vietnam_Infra_News_Database_Final.xlsx

name: Daily Vietnam Infra News Pipeline v7.1

on:
  schedule:
    - cron: '0 11 * * *'   # 매일 UTC 11:00 = KST 20:00
  workflow_dispatch:
    inputs:
      hours_back:
        description: '수집 기간 (시간, 기본 24)'
        required: false
        default: '24'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. Python 설정
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 패키지 설치
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 \
                      pandas openpyxl deep-translator lxml

      # 4. 환경변수 검증 (별도 .py 파일 — inline python 금지)
      - name: Validate environment
        run: python3 scripts/validate_env.py
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          EMAIL_USERNAME:   ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}

      # 5. 파이프라인 실행 (Step1→2→3→4)
      - name: Run pipeline
        run: python3 scripts/main.py --hours ${{ github.event.inputs.hours_back || '24' }}
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          EMAIL_USERNAME:   ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}

      # 6. Dashboard 재생성 (Step4 실패 시 백업)
      - name: Rebuild dashboard (failsafe)
        if: always()
        run: python3 scripts/build_dashboard.py
        continue-on-error: true

      # 7. Git 커밋 & 푸시
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/database/Vietnam_Infra_News_Database_Final.xlsx
          git add docs/index.html
          git add data/shared/ || true

          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 건너뜀"
          else
            DATE_KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
            git commit -m "Daily update: ${DATE_KST}"
            git push origin main
          fi

      # 8. 이메일 알림
      - name: Send notification
        if: success()
        run: python3 scripts/send_email.py
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        continue-on-error: true
