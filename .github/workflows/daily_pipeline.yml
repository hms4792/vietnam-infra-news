# ============================================================
# Vietnam Infrastructure News — 일일 수집 파이프라인
# 파일: .github/workflows/daily_pipeline.yml
#
# 스케줄: 매일 KST 20:00 = UTC 11:00
#
# ★ 영구 제약 (절대 변경 금지):
#   [1] 번역: Google Translate만 (MyMemory API). Anthropic API 금지
#   [2] 대시보드: templates/dashboard_template.html 템플릿 사용
#   [4] 이메일 Secret: EMAIL_USERNAME / EMAIL_PASSWORD (GMAIL_* 사용 금지)
#   [7] 실행순서: main.py → Step1(collect)→Step2(번역)→Step3(Excel)→Step4(대시보드)
#       순서 절대 변경 금지 — 번역 전 Excel 저장 시 title_ko 빈값으로 고정됨
#  [12] yml 내 python3 -c "..." 인라인 코드 금지 → 별도 .py 파일 호출
# ============================================================

name: 📅 Daily News Pipeline (v5.3)

on:
  # 매일 KST 20:00 = UTC 11:00
  schedule:
    - cron: '0 11 * * *'

  # 수동 실행 (Actions 탭 → Run workflow)
  workflow_dispatch:
    inputs:
      hours_back:
        description: '소급 수집 시간 (기본 24, 주간=168)'
        required: false
        default: '24'
      force_weekly:
        description: '주간 모드 강제 실행 (168시간)'
        required: false
        default: 'false'
        type: boolean

# 동일 워크플로 중복 실행 방지
concurrency:
  group: news-collection
  cancel-in-progress: false

jobs:
  pipeline:
    name: 📡 수집 → 번역 → Excel → 대시보드
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. 레포지토리 체크아웃 ───────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 환경 설정 ──────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 의존성 설치 ──────────────────────────────────
      # deep-translator: Google Translate (MyMemory API) 번역용 [메모리항목1]
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 openpyxl lxml deep-translator

      # ── 4. 수집 시간 결정 ────────────────────────────────
      # [메모리항목12] python3 -c "..." 인라인 금지 → 별도 set_hours.py 사용
      - name: ⏱️ Set hours_back
        id: set_hours
        run: |
          if [ "${{ github.event.inputs.force_weekly }}" = "true" ]; then
            echo "hours=168" >> $GITHUB_OUTPUT
            echo "Mode: FORCED WEEKLY (168h)"
          else
            HOURS="${{ github.event.inputs.hours_back || '24' }}"
            echo "hours=$HOURS" >> $GITHUB_OUTPUT
            echo "Mode: DAILY (${HOURS}h)"
          fi

      # ── 5. SQLite DB 동기화 ──────────────────────────────
      # Excel DB 기준으로 SQLite 재동기화 — 잘못된 실행으로 오염된 url_hash 제거
      # [메모리항목12] 별도 .py 파일 호출
      - name: 🔄 Sync SQLite from Excel DB
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
        run: |
          python3 scripts/reset_sqlite_db.py

      # ── 6. 메인 파이프라인 실행 ──────────────────────────
      # [메모리항목7] main.py가 Step1→2→3→4 순서 보장:
      #   Step1: collect_news(hours_back)  ← news_collector.py의 collect_news()
      #   Step2: AISummarizer              ← Google Translate (MyMemory API) 번역
      #   Step3: ExcelUpdater.update_all() ← 번역 완료 후 Excel 저장
      #   Step4: DashboardUpdater.generate() ← dashboard_template.html 사용
      - name: 🚀 Run main pipeline (collect→translate→excel→dashboard)
        env:
          HOURS_BACK: ${{ steps.set_hours.outputs.hours }}
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH: data/vietnam_infrastructure_news.db
          LANGUAGE_FILTER: all
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          ENABLE_GNEWS: 'false'
          # [메모리항목4] 이메일 Secret 변수명 준수
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          echo "=== Vietnam Infra News Pipeline v5.3 ==="
          echo "Hours back  : $HOURS_BACK"
          echo "Excel path  : $EXCEL_PATH"
          echo "Step order  : collect → translate(Google) → excel → dashboard"
          python3 main.py

      # ── 7. 변경사항 Git 커밋 & 푸시 ─────────────────────
      # [메모리항목8] GitHub Pages: main 브랜치 /docs 폴더
      - name: 💾 Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📅 Daily pipeline (v5.3) — $(date '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      # ── 8. 이메일 알림 ──────────────────────────────────
      # [메모리항목4] EMAIL_USERNAME / EMAIL_PASSWORD 사용 (GMAIL_* 금지)
      - name: 📧 Send email notification
        if: always()
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python3 scripts/email_notifier.py || echo "Email notification skipped"
