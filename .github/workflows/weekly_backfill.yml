# ============================================================
# Vietnam Infrastructure News — 주간 백필 파이프라인
# .github/workflows/weekly_backfill.yml
#
# 스케줄: 매주 수·일 KST 10:00 (UTC 01:00)
# 역할: NewsData.io Latest API로 7섹터 기사 보완 수집
# ============================================================

name: Weekly Backfill

on:
  # ── 자동 스케줄 비활성화 ──────────────────────────────────────────────
  # weekly_collection(토 22:00) + daily_pipeline(매일 20:00)으로 정기 수집 충분
  # NewsData.io 크레딧 충돌 방지 (200건/일 한도)
  # 소급 필요 시: Actions → Run workflow → 날짜 직접 지정
  # schedule:
  #   - cron: '0 1 * * 0'   # 비활성화
  #   - cron: '0 1 * * 3'   # 비활성화
  workflow_dispatch:
    inputs:
      backfill_from:
        description: '소급 시작 날짜 YYYY-MM-DD (예: 2025-01-01) — 비워두면 최신 기사'
        required: false
        default: ''
      backfill_to:
        description: '소급 종료 날짜 YYYY-MM-DD (예: 2025-06-30) — 비워두면 오늘'
        required: false
        default: ''

concurrency:
  group: backfill
  cancel-in-progress: false

jobs:
  backfill:
    name: 주간 백필 수집
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests openpyxl feedparser deep-translator deepl

      - name: Run backfill
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          EXCEL_PATH:       data/database/Vietnam_Infra_News_Database_Final.xlsx
          DEEPL_API_KEY:    ${{ secrets.DEEPL_API_KEY }}
          BACKFILL_FROM:    ${{ github.event.inputs.backfill_from }}
          BACKFILL_TO:      ${{ github.event.inputs.backfill_to }}
        run: python3 scripts/backfill_newsdata.py

      - name: Specialist media crawler (전문미디어 소급)
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH:    data/vietnam_infrastructure_news.db
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          if [ -f scripts/specialist_crawler.py ]; then
            echo "=== Specialist Media Crawl ==="
            python3 scripts/specialist_crawler.py --from-date 2025-01-01
          else
            echo "specialist_crawler.py not found, skipping"
          fi

      - name: Rebuild dashboard
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: python3 scripts/build_dashboard.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/database/Vietnam_Infra_News_Database_Final.xlsx
          git add data/agent_output/ || true
          git add docs/index.html || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly backfill $(date '+%Y-%m-%d') UTC"
            git push
          fi
