# ============================================================
# Vietnam Infrastructure News — 수동 소급 수집 파이프라인
# .github/workflows/weekly_backfill.yml
#
# ★ 자동 실행 없음 — 수동(workflow_dispatch)으로만 실행
#
# 사용 목적:
#   과거 특정 기간의 누락 기사를 소급 수집할 때 사용
#   예) 파이프라인 중단 기간, AI 수집 오류 기간 복구
#
# 실행 방법:
#   GitHub → Actions → "수동 소급 수집" → Run workflow
#   → backfill_from: 시작일 (예: 2025-01-01)
#   → backfill_to:   종료일 (예: 2025-06-30)
#   ※ 날짜 비워두면 NewsData /latest (최신 기사) 수집
#
# 대상 기간:
#   backfill_from ~ backfill_to 지정 시 해당 기간 소급
#   미지정 시 최신 기사 (daily/weekly와 중복 가능)
# ============================================================

name: 수동 소급 수집 (과거 누락 기간 지정 가능)

on:
  # ── 자동 스케줄 비활성화 ──────────────────────────────────────────────
  # weekly_collection(토 22:00) + daily_pipeline(매일 20:00)으로 정기 수집 충분
  # NewsData.io 크레딧 충돌 방지 (200건/일 한도)
  # 소급 필요 시: Actions → Run workflow → 날짜 직접 지정
  # schedule:
  #   - cron: '0 1 * * 0'   # 비활성화
  #   - cron: '0 1 * * 3'   # 비활성화
  workflow_dispatch:
    inputs:
      backfill_from:
        description: '소급 시작 날짜 YYYY-MM-DD (예: 2025-01-01) — 비워두면 최신 기사'
        required: false
        default: ''
      backfill_to:
        description: '소급 종료 날짜 YYYY-MM-DD (예: 2025-06-30) — 비워두면 오늘'
        required: false
        default: ''

concurrency:
  group: backfill
  cancel-in-progress: false

jobs:
  backfill:
    name: 소급 수집 (backfill_from ~ backfill_to)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests openpyxl feedparser deep-translator deepl

      - name: Run backfill
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          EXCEL_PATH:       data/database/Vietnam_Infra_News_Database_Final.xlsx
          DEEPL_API_KEY:    ${{ secrets.DEEPL_API_KEY }}
          BACKFILL_FROM:    ${{ github.event.inputs.backfill_from }}
          BACKFILL_TO:      ${{ github.event.inputs.backfill_to }}
        run: python3 scripts/backfill_newsdata.py

      - name: Specialist media crawler (전문미디어 소급)
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
          DB_PATH:    data/vietnam_infrastructure_news.db
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          if [ -f scripts/specialist_crawler.py ]; then
            echo "=== Specialist Media Crawl ==="
            python3 scripts/specialist_crawler.py --from-date 2025-01-01
          else
            echo "specialist_crawler.py not found, skipping"
          fi

      - name: Rebuild dashboard
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: python3 scripts/build_dashboard.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/database/Vietnam_Infra_News_Database_Final.xlsx
          git add data/agent_output/ || true
          git add docs/index.html || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "수동 소급 수집 $(date '+%Y-%m-%d') (from=$BACKFILL_FROM to=$BACKFILL_TO)"
            git push
          fi
