# ============================================================
# Vietnam Infrastructure News — 대시보드 단독 재빌드
# 파일: .github/workflows/rebuild_dashboard.yml
#
# 용도: Excel DB 업로드 후 대시보드만 단독 재빌드
# [메모리항목2] dashboard_template.html -> docs/index.html
# [메모리항목12] yml 내 python3 -c "..." 인라인 코드 금지
# ============================================================

name: Rebuild Dashboard Only

on:
  workflow_dispatch:

jobs:
  rebuild:
    name: dashboard_updater.py 단독 실행
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests openpyxl feedparser beautifulsoup4 lxml

      - name: Check Excel file
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: |
          python3 scripts/check_excel.py

      - name: Rebuild dashboard
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: |
          echo "=== Dashboard Rebuild ==="
          python3 scripts/dashboard_updater.py
          ls -lh docs/index.html

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html"
          else
            git commit -m "Rebuild dashboard $(date '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Dashboard updated successfully"
          fi
