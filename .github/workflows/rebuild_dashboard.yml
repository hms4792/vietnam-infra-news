# ============================================================
# Vietnam Infrastructure News — 대시보드 단독 재빌드
# .github/workflows/rebuild_dashboard.yml
#
# v3 수정 (2026-03-30):
#   - dashboard_updater.py 우회
#   - Python으로 직접 Excel 읽기 → /*__BACKEND_DATA__*/[] 주입
#   - 별도 check_excel.py, build_dashboard.py 활용
# ============================================================

name: Rebuild Dashboard Only

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install openpyxl

      - name: Check Excel file
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: |
          python3 scripts/check_excel.py

      - name: Build dashboard directly
        env:
          EXCEL_PATH: data/database/Vietnam_Infra_News_Database_Final.xlsx
        run: |
          python3 scripts/build_dashboard.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html"
          else
            git commit -m "Rebuild dashboard $(date '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Dashboard updated successfully"
          fi
