name: Vietnam Infrastructure News Pipeline

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 평일 18:00 KST (11:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  GNEWS_API_KEY:      ${{ secrets.GNEWS_API_KEY }}
  ENABLE_GNEWS:       "true"
  LANGUAGE_FILTER:    "all"
  HOURS_BACK:         "24"
  DB_PATH:            "data/vietnam_infrastructure_news.db"
  EXCEL_PATH:         "data/database/Vietnam_Infra_News_Database_Final.xlsx"
  EMAIL_SMTP_SERVER:  "smtp.gmail.com"
  EMAIL_SMTP_PORT:    "587"
  EMAIL_USERNAME:     ${{ secrets.EMAIL_USERNAME }}
  EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
  EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Excel DB
        run: |
          if [ -f "$EXCEL_PATH" ]; then
            echo "✓ Excel DB: $(du -sh $EXCEL_PATH)"
            python3 -c "
          import openpyxl
          wb = openpyxl.load_workbook('$EXCEL_PATH', read_only=True)
          ws = wb.active
          n = sum(1 for r in ws.iter_rows(min_row=2,values_only=True) if any(r))
          print(f'  Rows: {n:,}')
          wb.close()
          "
          else
            echo "⚠ Excel DB not found at $EXCEL_PATH"
          fi

      # ── 핵심: main.py 단일 실행 ──────────────────────────────
      # news_collector를 별도 실행하지 않음
      # main.py 내부에서 collect → 번역 → 대시보드 → 이메일 순서로 실행
      - name: Run full pipeline (collect → translate → dashboard → email)
        run: |
          echo "=== Running main pipeline ==="
          python scripts/main.py
          echo "=== Pipeline complete ==="
          echo "Output files:"
          ls -lh outputs/*.html 2>/dev/null || echo "  No HTML"

      - name: Commit & push databases
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "data/database/*.xlsx" || true
          git add "$EXCEL_PATH"          || true
          git add "data/*.db"            || true
          if git diff --cached --quiet; then
            echo "No DB changes"
          else
            COUNT=$(python3 -c "
          import sqlite3
          try:
            c=sqlite3.connect('data/vietnam_infrastructure_news.db')
            n=c.execute('SELECT COUNT(*) FROM articles').fetchone()[0]
            c.close(); print(n)
          except: print('?')
          " 2>/dev/null || echo "?")
            git commit -m "Auto-update DB $(date +'%Y-%m-%d'): ${COUNT} articles"
            git push
            echo "✓ Pushed"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:    ./outputs
          publish_branch: gh-pages

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_number }}
          path: |
            outputs/
            data/vietnam_infrastructure_news.db
          retention-days: 7
