# .github/workflows/vietnam-infra-news.yml
# 수정사항:
# 1. peaceiris/actions-gh-pages v3 → v4 (Node.js 24 대응)
# 2. python scripts/main.py 실행 step 추가 (AI 요약 + 대시보드)
# 3. 환경변수 GNEWS_ENV_QUERY 추가

name: Vietnam Infrastructure News Pipeline

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 평일 18:00 KST (11:00 UTC)
  workflow_dispatch:           # 수동 실행

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
  ENABLE_GNEWS: "true"
  LANGUAGE_FILTER: "all"
  
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Collect news
        run: |
          HOURS_BACK="24"
          echo "Collecting news from last $HOURS_BACK hours"
          python scripts/news_collector.py --hours-back $HOURS_BACK
        env:
          HOURS_BACK: "24"

      - name: Run AI summarizer & generate dashboard
        run: |
          echo "Running main pipeline (summarizer + dashboard + notifications)"
          python scripts/main.py
        env:
          SKIP_NOTIFY: "false"

      - name: Commit updated Excel DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/database/Vietnam_Infra_News_Database_Final.xlsx || true
          git add data/*.db || true
          git diff --cached --quiet || git commit -m "Auto-update DB: $(date +'%Y-%m-%d')"
          git push || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4    # ← v3 → v4 변경 (Node.js 24 대응)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./outputs
          publish_branch: gh-pages

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_number }}
          path: outputs/
          retention-days: 7
