name: Vietnam Infrastructure News Pipeline

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 평일 18:00 KST (11:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  GNEWS_API_KEY:      ${{ secrets.GNEWS_API_KEY }}
  ENABLE_GNEWS:       "true"
  LANGUAGE_FILTER:    "all"
  HOURS_BACK:         "24"
  DB_PATH:            "data/vietnam_infrastructure_news.db"
  EXCEL_PATH:         "data/database/Vietnam_Infra_News_Database_Final.xlsx"
  EMAIL_SMTP_SERVER:  "smtp.gmail.com"
  EMAIL_SMTP_PORT:    "587"
  EMAIL_USERNAME:     ${{ secrets.EMAIL_USERNAME }}
  EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
  EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 저장소 체크아웃 ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 환경 설정 ────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Excel DB 존재 확인 (없으면 오류 출력) ───────────────
      - name: Verify Excel DB exists
        run: |
          if [ -f "$EXCEL_PATH" ]; then
            echo "✓ Excel DB: $(du -sh $EXCEL_PATH)"
            python3 -c "
          import openpyxl
          wb = openpyxl.load_workbook('$EXCEL_PATH', read_only=True)
          ws = wb.active
          count = sum(1 for r in ws.iter_rows(min_row=2, values_only=True) if any(r))
          wb.close()
          print(f'  Rows: {count:,}')
          "
          else
            echo "⚠ Excel DB not found: $EXCEL_PATH"
            echo "  Checking data/ folder:"
            find data/ -name "*.xlsx" 2>/dev/null || echo "  No xlsx files found"
          fi

      # ── 4. 뉴스 수집 (SQLite + Excel 동시 업데이트) ────────────
      - name: Collect news
        run: |
          echo "=== Collecting news (last $HOURS_BACK hours) ==="
          python scripts/news_collector.py --hours-back $HOURS_BACK
          echo "=== Collection complete ==="

      # ── 5. AI 요약 + 대시보드 생성 + 이메일 발송 ─────────────
      - name: Run main pipeline (summarizer + dashboard + email)
        run: |
          echo "=== Running main pipeline ==="
          python scripts/main.py
          echo "=== Pipeline complete ==="
          # 생성된 파일 확인
          echo "Output files:"
          ls -lh outputs/*.html 2>/dev/null || echo "  No HTML files"

      # ── 6. 변경된 DB 파일 커밋 & 푸시 ────────────────────────
      - name: Commit & push updated databases
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 변경 파일 스테이징
          git add "$EXCEL_PATH"                         || true
          git add "data/vietnam_infrastructure_news.db" || true

          # 변경사항 있을 때만 커밋
          if git diff --cached --quiet; then
            echo "No DB changes to commit"
          else
            # SQLite에서 총 기사 수 조회
            ARTICLE_COUNT=$(python3 -c "
          import sqlite3
          try:
              c = sqlite3.connect('data/vietnam_infrastructure_news.db')
              n = c.execute('SELECT COUNT(*) FROM articles').fetchone()[0]
              c.close()
              print(n)
          except Exception as e:
              print('?')
          " 2>/dev/null || echo "?")
            git commit -m "Auto-update DB $(date +'%Y-%m-%d'): ${ARTICLE_COUNT} total articles"
            git push
            echo "✓ DB files pushed (Excel + SQLite)"
          fi

      # ── 7. GitHub Pages 배포 ───────────────────────────────────
      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:    ./outputs
          publish_branch: gh-pages
          commit_message: "Deploy dashboard $(date +'%Y-%m-%d')"

      # ── 8. 아티팩트 저장 ──────────────────────────────────────
      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_number }}
          path: |
            outputs/
            data/vietnam_infrastructure_news.db
          retention-days: 7
